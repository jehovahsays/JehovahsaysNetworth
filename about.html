<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge;chrome=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="Clear-Site-Data" content="*">
  <meta name="referrer" content="same-origin">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Resource-Policy" content="same-site">
  <meta http-equiv="Connection" content="Keep-alive">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="description" content="MEV Leaderboard" />
  <meta name="keywords" content="MEV, Leaderboard, Cash App, Voice Search" />
  <title>About Leaderboard</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    h1 {
      color: #00ffcc;
      text-align: center;
    }

    #aboutText {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 1rem;
    }

    footer {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(0, 0, 0, 0.8);
      border-top: 1px solid #333;
    }

    button {
      background: #00ffcc;
      color: #000;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      flex: 1;
      margin: 0 5px;
      transition: background 0.3s;
    }

    button:hover {
      background: #00e6b8;
    }
  </style>

  <!-- Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "MEV Leaderboard",
      "description": "MEV Leaderboard",
      "url": "https://jehovahsays.github.io/mev/"
    }
  </script>
</head>
<body>
  <main>
    <h1>About MEV Leaderboard</h1>
    <p id="aboutText">
How to Play:
1. View the current top amount on the leaderboard.
2. Send $1 more than the top amount to <strong>$morgansbyers</strong> on Cash App.
3. Wait for the timer to finish.
4. The webmaster will manually verify the total and send all collected funds back to you as your winnings.
    </p>
  </main>

  <footer>
    <button onclick="readAloud()">Read Aloud</button>
    <button onclick="location.href='index.html'">Back</button>
  </footer>

  <script>
    function readAloud() {
      const text = document.getElementById('aboutText').textContent;
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'en-US';
      msg.rate = 1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(msg);
    }
  </script>
</body>
</html>
