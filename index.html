<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MEV Wiki Gateway</title>
    <script>
        (function() {
            // 1. Detect Environment & Set Base Path
            const isGitHub = window.location.hostname.includes('github.io');
            // GitHub: /mev/  |  Localhost: /
            const repoPath = isGitHub ? "/mev/" : "/";

            let hasBreach = false;
            let isVerified = false;

            // 2. Safely check Storage (prevents crash if cookies/storage are disabled)
            try {
                hasBreach = localStorage.getItem('mev_breach_detected') === 'true';
                isVerified = localStorage.getItem('mev_human_verified') === 'true';
            } catch (e) {
                console.warn("Storage access denied. Proceeding as guest.");
            }

            // 3. Redirection Logic
            if (hasBreach) {
                // Redirect to the CSS status page if banned
                window.location.href = repoPath + "mev/less.html";
            } else if (isVerified) {
                // Send to the Internal Brain (External Conscious)
                window.location.href = repoPath + "mev/#main";
            } else {
                // First visit or cookies off: stay at the root splash screen
                // We use a check to prevent infinite loops if already at root
                if (window.location.pathname !== repoPath) {
                    window.location.href = repoPath;
                }
            }
        })();
    </script>
</head>
<body>
<noscript>
    <meta http-equiv="refresh" content="0;url=mev/less.html"> 
</noscript>
    <p>Loading MEV Subconscious... If you are not redirected, <a href="mev/less.html">click here</a>.</p>
</body>
</html>
