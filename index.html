<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEV - Gateway</title>
    <link rel="manifest" href="mev/manifest.json">
    <link rel="icon" href="mev/assets/icons/icon-192.png" type="image/png">
    
    <style>
body { 
    background: #000; 
    color: peru; 
    font-family: monospace; 
    display: flex; 
    flex-direction: column; /* Stack items vertically */
    justify-content: flex-start; /* Move alignment to the top */
    align-items: center; 
    height: 100vh; 
    margin: 0; 
    padding-top: 20vh; /* This pushes content up to the top 20% of the screen */
}

button { 
    background: transparent; 
    border: 2px solid peru; 
    color: peru; 
    padding: 15px 30px; 
    font-size: 1.2rem; 
    cursor: pointer; 
    font-family: inherit;
    z-index: 10; /* Ensure it stays above the banner logic */
}
    </style>
</head>
<body>

    <button onclick="enterMEV()">ENTER SOVEREIGN BRAIN</button>
	
	<div id="cookie-banner" style="position:fixed; bottom:0; width:100%; background:#111; color:peru; padding:15px; text-align:center; border-top:1px solid peru; display:none;">
    We use local storage to verify humanity and secure your session. 
    Read our <a href="privacy.html" style="color:white;">Privacy Policy</a>.
    <button onclick="acceptPrivacy()" style="margin-left:20px; border:1px solid peru; background:transparent; color:peru; cursor:pointer;">I ACCEPT</button>
</div>

<div id="cookie-banner" style="position:fixed; bottom:0; width:100%; background:#111; color:peru; padding:15px; text-align:center; border-top:1px solid peru; display:none;">
    We use local storage to verify humanity and secure your session. 
    Read our <a href="privacy.html" style="color:white;">Privacy Policy</a>.
    <button onclick="acceptPrivacy()" style="margin-left:20px; border:1px solid peru; background:transparent; color:peru; cursor:pointer;">I ACCEPT</button>
</div>

<script>
    // Show banner if not yet accepted
    if (!localStorage.getItem('mev_privacy_consent')) {
        document.getElementById('cookie-banner').style.display = 'block';
    }

    function acceptPrivacy() {
        localStorage.setItem('mev_privacy_consent', 'true');
        document.getElementById('cookie-banner').style.display = 'none';
    }
</script>

    <script>
// Register the centralized Service Worker from the root
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // Pointing to the /mev/ folder assets
        navigator.serviceWorker.register('mev/sw.js', { scope: '/mev/' })
            .then(reg => console.log('MEV: Centralized Brain Synced'))
            .catch(err => console.log('MEV: Sync Failed', err));
    });
}

function enterMEV() {
    // Check if cookies/privacy were accepted before allowing entry
    if (localStorage.getItem('mev_privacy_consent') !== 'true') {
        alert("Please review and accept the Privacy Policy before entering.");
        return;
    }
    localStorage.setItem('mev_human_verified', 'true');
    window.location.href = './mev/#main';
}
    </script>
</body>
</html>
