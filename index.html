<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEV Wiki - Gateway</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' blob:; object-src 'none'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:;">
    <meta http-equiv="Referrer-Policy" content="no-referrer">

    <style>
        body { background-color: black; color: white; font-family: monospace; padding: 20px; }
        .menu-container { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; text-align: center; }
        #searchBox { width: 250px; padding: 8px; background: #111; border: 1px solid #333; color: peru; outline: none; }
        .titleInput { margin-bottom: 40px; display: none; border-left: 3px solid peru; padding-left: 15px; }
        .titleInput:target, body:not(:has(:target)) #main { display: block !important; }
        button { background: #222; color: peru; border: 1px solid #444; padding: 10px; cursor: pointer; margin: 5px; }
    </style>

    <script src="./purify.min.js"></script>
    <script src="./sw.js"></script>
</head>
<body>

    <div class="menu-container">
        <input id="searchBox" type="text" placeholder="search database" autocomplete="off">
        <div style="margin-top:10px; font-size:10px; color:#666;">#MAIN | #ABOUT</div>
    </div>

    <ul id="linkList" style="list-style:none; margin-top:100px;">
        <li class="titleInput" id="main">
            <h2>#MAIN</h2>
            <p>Welcome to the Internal Subconscious Gateway.</p>
            <button onclick="enableJSAndEnter()">🚀 Enter Wiki Search</button>
            <button onclick="forceVersionSync()">🔄 Sync System</button>
        </li>
        <li class="titleInput" id="about">
            <h2>#ABOUT</h2>
            <p>MEV Security Lab Environment - Localhost Root.</p>
        </li>
    </ul>

<script>
    (function() {
        "use strict";

        const GOOD_ROBOTS = ['github', 'googlebot', 'bingbot'];
        const isBot = () => GOOD_ROBOTS.some(r => navigator.userAgent.toLowerCase().includes(r));
        const searchBox = document.getElementById('searchBox');

        // Secure Search
        searchBox.addEventListener('keyup', () => {
            const cleanInput = DOMPurify.sanitize(searchBox.value.toLowerCase());
            const items = document.getElementsByClassName('titleInput');
            for (let item of items) {
                item.style.display = item.textContent.toLowerCase().includes(cleanInput) ? "block" : "none";
            }
        });

        // Secure Enter Navigation
        searchBox.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = DOMPurify.sanitize(searchBox.value.toLowerCase().replace(/#/g, ''));
                if (document.getElementById(val)) { window.location.hash = val; searchBox.value = ''; }
            }
        });

        // UPDATED REDIRECTS
        window.enableJSAndEnter = () => {
            localStorage.setItem('mev_human_verified', 'true');
            window.location.href = './mev/#search';
        };

        window.forceVersionSync = async () => {
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for(let r of regs) await r.unregister();
            }
            localStorage.clear();
            localStorage.setItem('mev_human_verified', 'true');
            window.location.href = './mev/#search';
        };

        window.addEventListener('load', () => {
            if (isBot()) console.log("MEV: Maintenance Whitelist Active.");
            if (!window.location.hash) window.location.hash = 'main';
        });
    })();
</script>
</body>
</html>
