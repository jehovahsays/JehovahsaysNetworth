<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting to MEV Wiki...</title>
    <script>
        (function() {
            // Define your targets
            const githubURL = "https://jehovahsays.github.io/mev/mev/#main";
            const localPath = "/mev/#main";

            // If the hostname includes github.io, use the full online URL
            if (window.location.hostname.includes('github.io')) {
                window.location.href = githubURL;
            } else {
                // Otherwise (localhost/127.0.0.1), use the local relative path
                window.location.href = localPath;
            }
        })();
    </script>
    
    <noscript>
        <meta http-equiv="refresh" content="0;url=/mev/#main">
    </noscript>
</head>
<body>
    <p>Redirecting to MEV Wiki... If nothing happens, <a href="/mev/#main">click here</a>.</p>
</body>
</html>
