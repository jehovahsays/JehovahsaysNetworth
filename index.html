<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="keyword search">
    <title>index</title>
    <!-- Security and Performance -->
    <link rel="stylesheet" href="styles.min.css">
</head>
<body>
<header class="navbar">
    <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
    </nav>
</header>

<main class="content">
    <h1>Search Keywords</h1>
    <form id="secure-form" action="script.php" method="POST">
        <!-- Removed duplicate secure-form-answer-Human input -->
        <!-- Keyword input field for the actual search term -->
        <input type="text" name="keyword" id="keyword" placeholder="search" required>
        <button type="submit">Search</button>
        <noscript>
            <!-- If JavaScript is disabled, display the honeypot field for human verification -->
            <label for="secure-form-answer-Human">Enter "Human":</label>
            <input type="text" name="secure-form-answer-Human" id="secure-form-answer-Human">
        </noscript>
    </form>
</main>

<script src="script.min.js" defer></script>

<!-- JavaScript Security -->
<script>
    // Enforce strict CSP dynamically (if applicable)
    document.addEventListener("DOMContentLoaded", function() {
        let metaCSP = document.createElement('meta');
        metaCSP.httpEquiv = "Content-Security-Policy";
        metaCSP.content = "default-src 'self'; script-src 'self' http: https:; style-src 'self'; img-src 'self' data:;";
        document.head.appendChild(metaCSP);
        
        // If JS is enabled, add a hidden honeypot field with the expected value ("Human")
        // This avoids duplicate fields since the noscript block won’t be processed
        var form = document.getElementById("secure-form");
        var honeypot = document.createElement("input");
        honeypot.type = "hidden";
        honeypot.name = "secure-form-answer-Human";
        honeypot.value = "Human";
        form.appendChild(honeypot);
        
        // In case a noscript field exists (it won't when JS is enabled), remove it
        var noscriptField = document.getElementById("secure-form-answer-Human");
        if(noscriptField) {
            noscriptField.parentNode.removeChild(noscriptField);
        }
    });

    // Prevent pasting malicious code into input fields
    document.addEventListener("paste", (event) => {
        event.preventDefault();
        alert("Pasting is disabled for security reasons.");
    });

    // Disable right-click (optional)
    document.addEventListener("contextmenu", (event) => event.preventDefault());

    // Prevent keystroke logging attempts (disable some keyboard shortcuts)
    document.addEventListener("keydown", function(event) {
        if (event.ctrlKey && (event.key === "U" || event.key === "S" || event.key === "H")) {
            event.preventDefault();
            alert("Keyboard shortcuts are disabled for security.");
        }
    });
</script>

</body>
