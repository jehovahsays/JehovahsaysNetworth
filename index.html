<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MEV Voice Search</title>
  <meta name="theme-color" content="#000000">
  <meta name="description" content="MEV Voice Search Leaderboard - AI Powered Voice Search App">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root {
      --bg: #000;
      --accent: gold;
      --card-bg: #121212;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--accent);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 1rem;
      background: #111;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      -webkit-overflow-scrolling: touch;
    }

    .marquee {
      overflow: hidden;
      white-space: nowrap;
      background: #222;
      color: white;
      padding: 8px;
      border-radius: 6px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: scroll-left 20s linear infinite;
    }
    @keyframes scroll-left {
      from { transform: translateX(0%); }
      to { transform: translateX(-100%); }
    }

    .entry {
      background: var(--card-bg);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.05);
    }

    .entry small {
      color: #bbb;
      display: block;
      margin-top: 4px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .controls button {
      background: #333;
      color: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .controls button:hover {
      background: var(--accent);
      color: #000;
    }

    footer {
      background: #111;
      color: #888;
      text-align: center;
      padding: 0.5rem;
      font-size: 0.9rem;
    }

    /* Floating search bar */
    .search-bar {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 50px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      padding: 8px 15px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      padding: 8px;
      border-radius: 50px;
    }

    .mic-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: black;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <header>🎙️ MEV Voice Search</header>

  <main>
    <div class="marquee"><span id="leaderboard">Loading top searches...</span></div>
    <div id="history"></div>
  </main>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Say or type something..." />
    <button id="micBtn" class="mic-btn">🎤</button>
  </div>

  <footer id="statusFooter">Offline</footer>

  <script>
    const footer = document.getElementById('statusFooter');
    const input = document.getElementById('searchInput');
    const historyDiv = document.getElementById('history');
    const marquee = document.getElementById('leaderboard');
    const micBtn = document.getElementById('micBtn');
    let history = JSON.parse(localStorage.getItem('searchHistory') || '[]');

    function updateStatus() {
      footer.textContent = navigator.onLine ? 'Online' : 'Offline';
      footer.style.color = navigator.onLine ? '#00ff00' : '#ff4444';
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    function escapeHTML(text) {
      return text.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }

    function saveSearch(text) {
      const entry = { text, timestamp: new Date().toISOString() };
      history.unshift(entry);
      history = history.slice(0, 50);
      localStorage.setItem('searchHistory', JSON.stringify(history));
      updateHistory();
      updateLeaderboard();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && input.value.trim()) {
        e.preventDefault();
        saveSearch(input.value.trim());
        speak(input.value.trim());
        input.value = '';
      }
    });

    function speak(text) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(msg);
    }

    function updateHistory() {
      historyDiv.innerHTML = '';
      if (!history.length) {
        historyDiv.innerHTML = '<p>No searches yet.</p>';
        return;
      }
      history.forEach((entry, index) => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
          <strong>${escapeHTML(entry.text)}</strong>
          <small>${new Date(entry.timestamp).toLocaleString()}</small>
          <div class="controls">
            <button onclick="speak('${entry.text.replace(/'/g, "\\'")}')">🔊 Speak</button>
            <button onclick="removeEntry(${index})">🗑️ Delete</button>
          </div>
        `;
        historyDiv.appendChild(div);
      });
    }

    function updateLeaderboard() {
      const counts = {};
      for (const entry of history) {
        const term = entry.text.toLowerCase();
        counts[term] = (counts[term] || 0) + 1;
      }
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 5);
      marquee.textContent = sorted.length
        ? 'Top searches: ' + sorted.map(([term, count], i) => `${i + 1}. ${term} (${count})`).join(' • ')
        : 'No searches yet.';
    }

    window.removeEntry = function(index) {
      history.splice(index, 1);
      localStorage.setItem('searchHistory', JSON.stringify(history));
      updateHistory();
      updateLeaderboard();
    };

    // Voice recognition support
    if ('webkitSpeechRecognition' in window) {
      const recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      micBtn.onclick = () => {
        recognition.start();
        micBtn.textContent = '🎧';
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.trim();
        input.value = transcript;
        saveSearch(transcript);
        speak(transcript);
        micBtn.textContent = '🎤';
      };

      recognition.onerror = () => {
        micBtn.textContent = '🎤';
      };
    } else {
      micBtn.style.display = 'none';
    }

    updateHistory();
    updateLeaderboard();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
