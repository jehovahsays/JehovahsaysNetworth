<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEV AI Wiki – Offline AI Encyclopedia</title>
  <meta name="description" content="MEV AI Wiki – Offline AI Encyclopedia. Learn, edit, explore." />
  <meta name="theme-color" content="#3366cc" />
  <meta name="color-scheme" content="light dark" />
  <link rel="manifest" href="manifest.json" />

  <!-- iOS PWA Support -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MEV Wiki">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Security -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self';
    img-src 'self' data:;
    font-src 'self';
    connect-src 'self' https://api.duckduckgo.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
  ">
</head>

<body>
  <div id="banner" class="banner"></div>

  <header>
    <button id="menu-btn" aria-label="Toggle menu navigation">☰</button>
    <h1>MEV AI Wiki</h1>
  </header>

  <div id="container">
    <nav id="sidebar">
      <div id="auth-links">
        <div id="user-status">Not logged in</div>
        <a href="#" id="create-account-link">Create Account</a><br>
        <a href="#" id="login-link">Log In</a><br>
        <a href="#" id="profile-link">My Profile</a><br>
        <a href="#" id="logout-link" style="display:none;">Log Out</a>
      </div>

      <h3>Pages</h3>
      <ul id="page-list"></ul>
      <button id="create-page-btn">+ New Page</button>

      <hr />
      <ul>
        <li><a href="#" id="recent-link">Recent Changes</a></li>
        <li><a href="#" id="settings-link">Settings</a></li>
        <li><a href="#" id="about-link">About</a></li>
      </ul>

      <div id="storage-bar">
        <div id="storage-bar-inner"></div>
      </div>
    </nav>

    <main id="main">
      <div id="ai-bar">
        <input type="text" id="ai-input" placeholder="Ask AI or search wiki…" aria-label="AI search or question input" />
        <button id="ai-button">Ask AI</button>
      </div>
      <div id="page-container"></div>
    </main>
  </div>

  <footer>
    <div id="status-indicator">🔴 Offline</div>
    <div id="ticker"><span id="ticker-content"></span></div>
    <div id="app-version">v1.1.0-alpha1</div>
  </footer>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="auth-modal-title">Create Account</h2>
      <label for="auth-username">Username:</label>
      <input id="auth-username" type="text" />
      <div class="modal-actions">
        <button id="submit-auth">Submit</button>
        <button id="cancel-auth">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Scripts at bottom for better load performance -->
  <script src="main.js" defer></script>
  <script src="auth.js" defer></script>
  <script src="wiki.js" defer></script>
</body>
</html>
