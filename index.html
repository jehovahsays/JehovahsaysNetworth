<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Support this project by sending $1 through Cash App. Every contribution helps. Thank you!" />
    <meta name="keywords" content="$morgansbyers" />
    <title>Support Morgan Shatee Byers</title>

    <!-- Load external CSS -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Support Morgan Shatee Byers",
        "description": "Support this project by sending $1 through Cash App. Every contribution helps.",
        "url": "http://morgansbyers.scienceontheweb.net"
    }
    </script>
	
</head>
<body>
    <div class="search-container">
        <div class="centered">
            <strong>Send $1</strong><br>
            <a href="https://cash.app/$morgansbyers">https://cash.app/$morgansbyers</a>
        </div>
        <br />
        <form id="search-form">
            <input
                id="filterInput"
                autocomplete="on"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="true"
                type="text"
                name="searchQuery"
                maxlength="500"
                aria-label="comment"
                placeholder="comment"
                required
            />
        </form>
    </div>
<br><br><br>
    <div class="history-container" id="searchHistory"></div>

    <div class="footer">homepage</div>

    <!-- External JS -->
    <script src="script.js" defer></script>		
	
</body>
</html>
