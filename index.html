<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<http-equiv="X-UA-Compatible" content="IE=Edge;chrome=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<http-equiv="Pragma" content="no-cache">
<http-equiv="Expires" content="0">

<style>
    body {
        background-color: black;
        margin: 0;
        overflow: hidden; /* Prevent scrolling on mobile */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
    }

    /* The Gravitational Core (#main button) */
    .core {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
    }

    .core button {
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid #3366cc;
        border-radius: 50%;
        font-family: monospace;
        cursor: pointer;
        box-shadow: 0 0 15px #3366cc;
    }

    /* The Orbital Container */
    .content {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none; /* Allow clicks to pass to the core button if needed */
    }

    /* Individual Orbiting Titles */
    .titleInput {
        pointer-events: auto;
        font-size: 16px;
        color: white;
        font-family: monospace;
        animation: fadeIn 0.8s ease-in-out;
    }

    /* Search Box Styles */
    #inputWrapper {
position: fixed;
        top: 50%;
        left: 35%;
        width: 10px;
        display: flex;
        justify-content: center;
        z-index: 100;
    }

    input[type="text"] {
        font-family: monospace;
        font-size: 12px;
        color: peru;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid peru;
        padding: 5px 10px;
        width: 200px;
        text-align: center;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.5); }
        to { opacity: 1; transform: scale(1); }
    }
</style>

<title>MEV</title>

<script src="/mev/wiki/TagCloud.js"></script>

</head>
<body>

<a href="#" class="core">
<div id="inputWrapper">
    <input
        id="filterInput"
        onkeyup="titleInput()"
        type="text" 
        placeholder="search database" 
        x-webkit-speech
        autocomplete="off">
		<a href="/mev/wiki/#main">
		<button>search</button>
		</a>
		
</div>
</a>

<div class="content"></div>

<script>
// --- 1. Database Connection & Replay Logic ---
async function startMevWikiReplay() {
    const container = '.content';
    
    // System pages and User pages from localStorage
    const systemTags = ["#main", "#recent", "#settings", "#about", "#formatting"];
    const userPages = [];
    
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('mev-page-')) {
            userPages.push('#' + key.replace('mev-page-', '').replace(/_/g, ' '));
        }
    }

    const allData = [...systemTags, ...userPages];

    // Configure the TagCloud for a perfect spherical orbit
    const options = {
        radius: 180, // Radius around the center button
        maxSpeed: 'normal',
        initSpeed: 'fast',
        direction: 135,
        keep: true,
        useContainerInlineStyles: true,
        useItemInlineStyles: true,
        containerClass: 'filterInput', 
        itemClass: 'titleInput',       
        useHTML: true
    };

    // Initialize the Replay
    let currentDisplay = [];
    const tc = TagCloud(container, currentDisplay, options);

    // Sequential appearance (Replay)
    for (const word of allData) {
        await new Promise(resolve => setTimeout(resolve, 600));
        currentDisplay.push(word);
        tc.update(currentDisplay); // Dynamically injects into the sphere
    }

    // Initialization voice feedback
    var msg = new SpeechSynthesisUtterance('Updated'); 
    window.speechSynthesis.speak(msg);
}

// --- 2. Integrated Search & Voice Function ---
function titleInput() {
    let input = document.getElementById('filterInput').value.toLowerCase();
    let tags = document.getElementsByClassName('titleInput');
    
    for (let i = 0; i < tags.length; i++) {
        if (!tags[i].innerHTML.toLowerCase().includes(input)) {
            tags[i].style.display = "none";
        } else {
            tags[i].style.display = "inline-block";
        }
    }
    
    // Voice feedback on search
    if(input.length > 2) {
        var msg = new SpeechSynthesisUtterance(input); 
        window.speechSynthesis.speak(msg);
    }
}

window.addEventListener('load', startMevWikiReplay);
</script>

</body>
</html>
