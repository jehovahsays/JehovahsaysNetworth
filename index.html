<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perimeter Breach</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline';">
</head>
<noscript>
<p id="noscript-warning" style="text-align: center; color: red; padding: 20px;">
  This application requires JavaScript. <br>
  Please enable JavaScript for MEV Wiki to function.
</p>
<meta http-equiv="refresh" content="0;url=./css.html#main">
</noscript>
<body style="background: #000; color: #f00; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    
    <div style="border: 1px solid #f00; padding: 20px; text-align: center;">
        <h1>PERIMETER BREACH</h1>
        <p>Unauthorized Application Access Logged.</p>
        <p>Redirecting to Recovery Sentinel...</p>
    </div>

    <script>
        (function() {
            "use strict";

            const BREACH_KEY = 'mev_breach_detected';
            const HUMAN_KEY = 'mev_human_verified';
            const agent = navigator.userAgent.toLowerCase();

            // 1. Identify Friendly Robots - Expanded for GitHub and Search Maintenance
            const friendlyBots = [
                'github',
                'googlebot',
                'dependabot',
                'github-crawlers',
                'github-hookshot',
                'bingbot',
                'duckduckbot'
            ];

            const isFriendly = friendlyBots.some(bot => agent.includes(bot));

            if (isFriendly) {
                window.location.replace('./wiki.html#main');
                return;
            }

            // 2. Identify Returning Verified Humans
            if (localStorage.getItem(HUMAN_KEY) === 'true' && !localStorage.getItem(BREACH_KEY)) {
                window.location.replace('./wiki.html#search');
                return;
            }

            // 3. Identification Failure: Trigger Breach Logic
            try {
                localStorage.setItem(BREACH_KEY, 'true');
                localStorage.removeItem(HUMAN_KEY);
                
                setTimeout(() => {
                    window.location.replace('./css.html?reason=perimeter_breach');
                }, 1000);
            } catch (e) {
                window.location.replace('./css.html?reason=perimeter_breach');
            }
        })();
    </script>
</body>
</html>
