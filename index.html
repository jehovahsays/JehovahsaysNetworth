    * {

    body, html {

      background-color: #000;
      overflow: hidden;

    .intro-container {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;

      align-items: center;
      background-color: #000;
    }
    
    .logo {
      position: absolute;
      font-size: 1rem;

      color: #fff;
      opacity: 0;

      letter-spacing: 0.5rem;
      text-align: center;
      z-index: 10;
      transform: scale(0.5);
      transition: transform 0.5s, opacity 0.5s;
    }
    
    .flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fff;
      opacity: 0;
      z-index: 5;
    }
    
    .particle {
      position: absolute;
      background-color: #fff;
      border-radius: 50%;
      opacity: 0;
    }
    
    .main-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #111;
      color: #fff;
      opacity: 0;
      z-index: 20;
      transition: opacity 1s;
    }
    
    .main-content h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.2rem;
    }
    
    .main-content p {
      font-size: 1.2rem;
      max-width: 800px;
      text-align: center;
      margin-bottom: 2rem;
      padding: 0 2rem;
    }
    
    .cta-button {
      padding: 1rem 2rem;
      background-color: #ff3e3e;
      color: #fff;
      border: none;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .cta-button:hover {
      background-color: #ff5e5e;
    }
    
    .skip-intro {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      padding: 0.5rem 1rem;
      background-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: none;
      cursor: pointer;
      z-index: 30;
      transition: background-color 0.3s;
    }
    
    .skip-intro:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }
    
    /* Audio control styles */
    .audio-control {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      z-index: 30;
      color: #fff;
      background-color: rgba(255, 255, 255, 0.2);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .audio-control:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }
    
    .audio-control i {
      font-size: 1rem;
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const introContainer = document.querySelector('.intro-container');
      const logo = document.querySelector('.logo');
      const flash = document.querySelector('.flash');
      const mainContent = document.querySelector('.main-content');
      const skipIntro = document.querySelector('.skip-intro');
      const backgroundMusic = document.getElementById('background-music');
      const audioToggle = document.getElementById('audio-toggle');
      const audioIcon = document.getElementById('audio-icon');
      
      // Audio controls
      let isPlaying = false;
      
      // Function to play music
      function playMusic() {
        backgroundMusic.play().then(() => {
          isPlaying = true;
          audioIcon.className = 'fas fa-volume-up';
        }).catch(error => {
          console.error('Failed to play audio:', error);
          // Many browsers require user interaction before playing audio
          audioIcon.className = 'fas fa-volume-mute';
        });
      }
      
      // Function to toggle music
      function toggleMusic() {
        if (isPlaying) {
          backgroundMusic.pause();
          isPlaying = false;
          audioIcon.className = 'fas fa-volume-mute';
        } else {
          playMusic();
        }
      }
      
      // Add click event to toggle button
      audioToggle.addEventListener('click', toggleMusic);
      
      // Skip intro button functionality
      skipIntro.addEventListener('click', () => {
        showMainContent();
      });
      
      // Function to show main content
      function showMainContent() {
        introContainer.style.display = 'none';
        mainContent.style.opacity = '1';
      }
      
      // Create particles
      function createParticles() {
        const particleCount = 100;
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          
          const size = Math.random() * 10 + 5;
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          
          // Random position
          const posX = Math.random() * window.innerWidth;
          const posY = Math.random() * window.innerHeight;
          particle.style.left = `${posX}px`;
          particle.style.top = `${posY}px`;
          
          introContainer.appendChild(particle);
          
          // Animate particle
          setTimeout(() => {
            particle.style.opacity = '1';
            
            // Random movement
            const moveX = (Math.random() - 0.5) * 200;
            const moveY = (Math.random() - 0.5) * 200;
            particle.style.transform = `translate(${moveX}px, ${moveY}px)`;
            particle.style.transition = `transform ${Math.random() * 2 + 1}s ease-out, opacity 0.5s`;
            
            // Fade out
            setTimeout(() => {
              particle.style.opacity = '0';
            }, 1000);
          }, Math.random() * 1000 + 500);
        }
      }
      
      // Start intro animation
      function startIntro() {
        // Try to play audio when intro starts (this might not work due to browser autoplay policies)
        playMusic();
        
        // First show logo
        setTimeout(() => {
          logo.style.opacity = '1';
          logo.style.transform = 'scale(1)';
          
          // Flash
          setTimeout(() => {
            flash.style.opacity = '1';
            
            // Create particles
            createParticles();
            
            setTimeout(() => {
              flash.style.opacity = '0';
              
              // Zoom in logo
              setTimeout(() => {
                logo.style.transform = 'scale(2)';
                logo.style.opacity = '0';
                
                // Show main content
                setTimeout(showMainContent, 1000);
              }, 1000);
            }, 200);
          }, 1500);
        }, 500);
      }
      
      // Start the intro
      startIntro();
    });
  </script>
