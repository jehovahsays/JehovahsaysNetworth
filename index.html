<body class="page" style="background-color:white;">

    <div class="cli-window">
        <div class="cli-header">
            <span>CLI Emulator - Fallback Mode</span>
        </div>
        <div id="cli-output">
            <p>$ <span id="command"></span></p>
            <p id="response"></p>
        </div>
        <form action="index.html" method="get">
            <label for="cli-input">$</label>
            <input type="text" id="cli-input" name="command" list="commands" autocomplete="off"
			id="filterInput"
onkeyup="titleInput()"
autocomplete="true"
autocorrect="off"  
autocapitalize="off" 
spellcheck="true"
aria-label="search"  
placeholder="" 
required>
            <datalist id="commands">
                <option value="ls">
                <option value="pwd">
                <option value="whoami">
                <option value="date">
                <option value="help">
            </datalist>
            <input type="submit" value="Run">
        </form>
    </div>	
	
<script>
        function titleInput() {
            let input = document.getElementById('filterInput').value.trim().toLowerCase();
            let items = document.getElementsByClassName('titleInput');
            for (let i = 0; i < items.length; i++) {
                items[i].style.display = items[i].innerHTML.toLowerCase().includes(input) ? "list-item" : "none";
            }
            if (input !== "titleInput") {
                let msg = new SpeechSynthesisUtterance(input);
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
	
<!-- JavaScript Security -->
    <script>
        // Enforce strict CSP dynamically (if applicable)
        document.addEventListener("DOMContentLoaded", function() {
            let metaCSP = document.createElement('meta');
            metaCSP.httpEquiv = "Content-Security-Policy";
            metaCSP.content = "default-src 'self'; script-src 'self';  style-src 'self'; img-src 'self' data:;";
            document.head.appendChild(metaCSP);
        });

        // Prevent pasting malicious code into input fields
        document.addEventListener("paste", (event) => {
            event.preventDefault();
            alert("Pasting is disabled for security reasons.");
        });

        // Disable right-click (optional)
        document.addEventListener("contextmenu", (event) => event.preventDefault());

        // Prevent keystroke logging attempts
        document.addEventListener("keydown", function(event) {
            if (event.ctrlKey && (event.key === "U" || event.key === "S" || event.key === "H")) {
                event.preventDefault();
                alert("Keyboard shortcuts are disabled for security.");
            }
        });
		</script>		

    <script>
        const params = new URLSearchParams(window.location.search);
        const command = params.get("command") || "unknown";
        document.getElementById("command").innerText = command;
        const responses = {
            "ls": "Documents  Downloads  Pictures  Music  Videos",
            "pwd": "/home/user",
            "whoami": "user",
            "date": new Date().toString(),
            "help": "Available commands: ls, pwd, whoami, date",
        };
        document.getElementById("response").innerText = responses[command] || "Command not found.";
    </script>
