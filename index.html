<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Leaderboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      height: 100%;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: linear-gradient(#87CEEB, #228B22);
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 12px;
      border-radius: 8px;
    }
    button {
      padding: 10px;
      font-size: 1rem;
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>
<body>
  <canvas id="treeCanvas" width="400" height="600"></canvas>
  <div id="ui">
    <div>Current Top: <span id="topAmount">$0</span></div>
    <div>Send <strong id="nextAmount">$1</strong> to <code>$morgansbyers on cash app</code></div>
    <button id="confirmBtn">I sent <span id="btnAmount">$1</span></button>
  </div>

  <script>
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    let topAmount = 0;
    let birds = [], sunX = 0, sunDir = 1;
    let birdInterval = null;

    async function loadTopAmount() {
      try {
        const res = await fetch('/seed.json');
        const json = await res.json();
        topAmount = json.topAmount || 0;
      } catch {
        topAmount = 0;
      }
      updateUI();
      drawTree(topAmount);
      if (topAmount >= 7) {
        startBirdsAnimation();
        startSunAnimation();
      }
    }

    function updateUI() {
      document.getElementById('topAmount').innerText = '$' + topAmount;
      const next = topAmount + 1;
      document.getElementById('nextAmount').innerText = '$' + next;
      document.getElementById('btnAmount').innerText = '$' + next;
    }

document.getElementById('confirmBtn').addEventListener('touchstart', () => {
  launchGrandFinale();
});
    function drawTree(stage) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Sky and sun
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (stage >= 7) {
        ctx.fillStyle = 'yellow';
        ctx.beginPath();
        ctx.arc(sunX, 60, 20, 0, 2 * Math.PI);
        ctx.fill();
      }

      // Planet
      ctx.fillStyle = '#2e8b57';
      ctx.beginPath();
      ctx.arc(canvas.width / 2, canvas.height - 60, 100, 0, Math.PI, true);
      ctx.fill();

      const centerX = canvas.width / 2;
      let y = canvas.height - 160;

      if (stage >= 1) {
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.arc(centerX, y, 6, 0, 2 * Math.PI);
        ctx.fill();
      }

      if (stage >= 2) {
        ctx.strokeStyle = '#A0522D';
        ctx.beginPath();
        ctx.moveTo(centerX, y + 6);
        ctx.lineTo(centerX, y + 25);
        ctx.stroke();
      }

      if (stage >= 3) {
        ctx.strokeStyle = '#228B22';
        ctx.beginPath();
        ctx.moveTo(centerX, y - 6);
        ctx.lineTo(centerX, y - 25);
        ctx.stroke();
        y -= 25;
      }

      if (stage >= 4) {
        ctx.beginPath();
        ctx.moveTo(centerX, y);
        ctx.lineTo(centerX - 10, y - 10);
        ctx.moveTo(centerX, y);
        ctx.lineTo(centerX + 10, y - 10);
        ctx.stroke();
      }

      if (stage >= 5) {
        ctx.beginPath();
        ctx.moveTo(centerX, canvas.height - 54);
        ctx.lineTo(centerX - 10, canvas.height - 40);
        ctx.moveTo(centerX, canvas.height - 54);
        ctx.lineTo(centerX + 10, canvas.height - 40);
        ctx.stroke();
      }

      if (stage >= 6) {
        ctx.fillStyle = '#ff69b4';
        ctx.beginPath();
        ctx.arc(centerX - 10, y - 15, 4, 0, 2 * Math.PI);
        ctx.arc(centerX + 10, y - 15, 4, 0, 2 * Math.PI);
        ctx.fill();
      }

      if (stage >= 7) {
        ctx.fillStyle = '#fff';
        birds.forEach(bird => {
          ctx.beginPath();
          ctx.moveTo(bird.x, bird.y);
          ctx.lineTo(bird.x + 10, bird.y - 5);
          ctx.lineTo(bird.x + 20, bird.y);
          ctx.stroke();
        });
      }
    }

    function startBirdsAnimation() {
      birds = [];
      for (let i = 0; i < 3; i++) {
        birds.push({
          x: Math.random() * canvas.width,
          y: 100 + i * 30,
          speed: 1 + Math.random()
        });
      }

      if (!birdInterval) {
        birdInterval = setInterval(() => {
          birds.forEach(bird => {
            bird.x += bird.speed;
            if (bird.x > canvas.width) bird.x = -20;
          });
          drawTree(topAmount);
        }, 50);
      }
    }

    function startSunAnimation() {
      setInterval(() => {
        sunX += sunDir * 2;
        if (sunX > canvas.width || sunX < 0) sunDir *= -1;
      }, 60);
    }

    loadTopAmount();
	
class Firework {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height;
    this.targetY = Math.random() * canvas.height / 2;
    this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
    this.exploded = false;
    this.particles = [];
  }
  update() {
    if (!this.exploded) {
      this.y -= 10;
      if (this.y <= this.targetY) {
        this.exploded = true;
        for (let i = 0; i < 50; i++) {
          this.particles.push(new Particle(this.x, this.y, this.color));
        }
      }
    } else {
      this.particles.forEach(p => p.update());
    }
  }
  draw() {
    if (!this.exploded) {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      this.particles.forEach(p => p.draw());
    }
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8;
    this.alpha = 1;
    this.color = color;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= 0.02;
  }
  draw() {
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

let finaleFireworks = [];

function launchGrandFinale() {
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      finaleFireworks.push(new Firework());
    }, i * 300);
  }
}

function animateFireworks() {
  requestAnimationFrame(animateFireworks);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawTree(topAmount);
  finaleFireworks.forEach(fw => {
    fw.update();
    fw.draw();
  });
  finaleFireworks = finaleFireworks.filter(fw =>
    !fw.exploded || fw.particles.some(p => p.alpha > 0)
  );
}

animateFireworks();	
  </script>
</body>
</html>
