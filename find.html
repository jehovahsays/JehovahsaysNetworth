<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge, chrome=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="private, no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Clear-Site-Data" content="*">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta http-equiv="X-Content-Type-Options" content="nosniff">

<title>Search Wiki Pages</title>

<style>
/* Basic Styles from your submission, adjusted for clarity and compatibility */
body {
    background-color: black;
    color: white;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
}
#search-container {
    max-width: 600px;
    margin: 0 auto;
}
#filterInput {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 1em;
    border-radius: 5px;
    border: 1px solid #333;
    box-sizing: border-box; /* Important for width calculation */
    background-color: #222;
    color: peru; /* Keeping your color choice */
}
#page-list {
    list-style: none;
    padding: 0;
    margin: 0;
}
/* Styling for the dynamically generated wiki page buttons */
.titleInput {
    margin: 5px 0;
    animation: fadeIn 0.5s ease-in-out;
}
.titleInput button {
    width: 100%;
    padding: 10px;
    text-align: left;
    background-color: #3366cc; /* Matching the main wiki's theme color */
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1.0em;
    transition: background-color 0.2s;
}
.titleInput button:hover {
    background-color: #254a9e;
}

@keyframes fadeIn {
   from { opacity: 0; transform: translateY(-10px); }
   to   { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>

<div id="search-container">
    <form action="#search">	
        <input
            id="filterInput"
            onkeyup="titleInput()"
            autocomplete="off"
            autocorrect="off"  
            autocapitalize="off" 
            spellcheck="false"
            type="text" 
            placeholder="Search wiki pages..." 
            aria-label="#search" 
            required>
    </form>
    
    <ul id="page-list">
        </ul>
    
    <div id="status-message" style="color: #ccc; margin-top: 10px;"></div>
</div>

<script>
    const STORAGE_KEYS = {
        pages: 'wiki_pages',
        // Note: No need for other keys, as we only need the page list
    };

    /**
     * Loads the stored wiki pages from LocalStorage.
     * @returns {Object} Dictionary of page titles and content.
     */
    function loadData(key, defaultVal) {
        try {
            const v = localStorage.getItem(key);
            return v ? JSON.parse(v) : defaultVal;
        } catch {
            return defaultVal;
        }
    }

    /**
     * Dynamically generates the list of buttons for all wiki pages.
     */
    function generatePageButtons() {
        const listEl = document.getElementById('page-list');
        listEl.innerHTML = '';
        const pages = loadData(STORAGE_KEYS.pages, {});
        
        // 1. Add static navigation buttons first
        const staticLinks = [
            { title: "Main Page", hash: "main" },
            { title: "Recent Changes", hash: "recent" },
            { title: "Settings", hash: "settings" },
            { title: "About", hash: "about" }
        ];

        staticLinks.forEach(link => {
            listEl.appendChild(createButtonElement(link.title, link.hash, true));
        });

        // 2. Add dynamic wiki pages
        const titles = Object.keys(pages).sort();
        
        titles.forEach(title => {
            // Encode the title for the hash, essential for multi-word titles
            listEl.appendChild(createButtonElement(title, encodeURIComponent(title), false));
        });

        document.getElementById('status-message').textContent = 
            `Total Wiki Pages Found: ${titles.length}`;
        
        // Call filter function once to ensure display
        titleInput();
    }
    
    /**
     * Helper to create a list item containing a clickable button.
     * @param {string} title - The text on the button.
     * @param {string} hash - The hash fragment (e.g., 'Page%20Title').
     * @param {boolean} isStatic - True if it's a fixed navigation link.
     */
    function createButtonElement(title, hash, isStatic) {
        const li = document.createElement('li');
        li.className = 'titleInput';
        // Add a marker for filtering static vs dynamic pages if needed later
        li.setAttribute('data-static', isStatic); 

        // Use a button for styling and clarity
        const button = document.createElement('button');
        button.textContent = title;
        
        // When clicked, navigate to the main wiki page using the hash
        button.onclick = () => {
             // Redirect the user to the main app (index.html) with the page hash
             // This assumes search.html is in the same directory as index.html
             window.location.href = `./index.html#${hash}`;
        };

        li.appendChild(button);
        return li;
    }

    /**
     * Filters the list of buttons based on input.
     */
    function titleInput() {
        const input = document.getElementById('filterInput').value.toLowerCase().trim();
        const items = document.querySelectorAll('#page-list .titleInput');
        let visibleCount = 0;

        items.forEach(li => {
            const buttonText = li.querySelector('button').textContent.toLowerCase();
            
            if (buttonText.includes(input)) {
                li.style.display = "list-item";
                visibleCount++;
            } else {
                li.style.display = "none";
            }
        });

        document.getElementById('status-message').textContent = 
            `Pages Matching "${input}": ${visibleCount}`;
        
        // Ensure the current page hash is always #search
        if (window.location.hash !== '#search') {
            window.location.hash = '#search';
        }
    }
    
    // Expose globally for the onkeyup attribute
    window.titleInput = titleInput;

    // Initialize the page on load
    document.addEventListener('DOMContentLoaded', () => {
        // Set the initial hash to #search immediately
        if (window.location.hash !== '#search') {
            // Using replaceState to avoid adding an extra entry to the history
            history.replaceState(null, null, `${window.location.pathname}#search`);
        }
        
        generatePageButtons();
    });

</script>



</body>
</html>
