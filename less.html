<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MEV Wiki | Less Interface</title>
  <meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' blob: 'unsafe-inline'; object-src 'none'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';">

  <link rel="stylesheet" href="./styles.css" type="text/css">
<script src="./dompurify.js" defer></script>

<script src="js/config_vars.js"></script>
<script src="js/storage_core.js"></script>
<script src="js/core_functions.js"></script>
<script src="js/event_listeners.js"></script>
  <style>
    /* "Less" Theme Overrides - High Performance & Legacy Clarity */
    body.less-mode { background: #000 !important; color: #0f0 !important; font-family: monospace !important; }
    #container { background: #000 !important; }
    nav#sidebar { border-right: 1px solid #0f0 !important; background: #111 !important; }
    .mev-button, .edit-btn, #ai-button { background: #0f0 !important; color: #000 !important; border: 1px solid #0f0 !important; font-weight: bold; }
    input[type="text"], input[type="password"], textarea { background: #000 !important; color: #0f0 !important; border: 1px solid #0f0 !important; }
    .modal-box { background: #111 !important; border: 2px solid #0f0 !important; color: #0f0 !important; }
    #status-indicator { color: #0f0 !important; }
    header { border-bottom: 1px solid #0f0; padding: 10px; }
  </style>
</head>

<body class="subconscious-state less-mode">

<header>
  <button id="menu-btn" aria-label="Toggle menu navigation">☰</button>
  <div id="ai-bar">
    <input 
      type="text" 
      id="ai-input" 
      placeholder="search or speak your query…" 
      aria-label="Search or question input"
      data-action="filter-sidebar"
      list="search-suggestions">
    <datalist id="search-suggestions">
      <option value="Main_Page">
      <option value="Formatting_Examples">
    </datalist>
    <button id="ai-button">OK</button>
  </div>
</header>

<section id="find-view" aria-labelledby="search-note">
    <div id="search-container">
        <p id="search-note"></p>
        <input id="filterInput-find" data-action="filter-findview" type="text" placeholder="Search wiki pages..." required>
        <ul id="page-list-find"></ul>
        <div id="status-message-find">Filtering Subconscious...</div>
    </div>
</section>

<div id="container">
  <nav id="sidebar">
    <div id="auth-links">
      <div id="user-status">Not logged in</div>
      <a href="#create" id="create-account-link" style="color:#0f0;">Create Account</a><br>
      <a href="#login" id="login-link" style="color:#0f0;">Log In</a><br>
      <a href="#profile" id="profile-link" style="color:#0f0;">My Profile</a><br>
      <a href="#logout" id="logout-link" class="hidden" style="color:#f00;">Log Out</a> 
    </div>
    <br>
    <center>  
        <a href="./#search" class="mev-button" style="text-decoration:none; padding: 5px;">Back to Main</a>
    </center>
    <hr/>
    <ul id="quick-filters">
        <li class="titleInput"><button data-page-target="Main_Page">Main_Page</button></li>
        <li class="titleInput"><button data-nav-target="about">About</button></li>
    </ul>
    <hr />
    <h3>Wiki Pages</h3>
    <ul id="page-list"></ul>
    <button id="create-page-btn" class="edit-btn">+ New Page</button>
  </nav>

  <main id="main-content-wrapper">
    <div id="page-container"></div> 
  </main>
</div>

<div id="auth-modal" class="modal-overlay" aria-hidden="true">
  <div class="modal-box">
    <h2 id="auth-modal-title">Enter Username</h2>
    <label for="auth-username">Username:</label>
    <input id="auth-username" type="text" autocomplete="username"><br><br>
    <label for="auth-pin">PIN/Passphrase:</label>
    <input id="auth-pin" type="password" maxlength="12">
    <div class="modal-actions">
      <button id="submit-auth" class="mev-button">Submit</button>
      <button id="cancel-auth" class="mev-button">Cancel</button>
    </div>
  </div>
</div>

<footer>
  <div id="status-indicator">● Local Mode</div>
  <div id="ticker"><span id="ticker-content">MEV Sovereign Perimeter Active</span></div>
</footer>

<script>
  // Bridge for manual interaction if specialized needs arise
  function wikiAction(type) {
    const user = document.getElementById('auth-username').value;
    if (type === 'auth') {
      console.log("Authenticating User via Less Interface: " + user);
      // a.js handles the heavy lifting here
    }
  }
</script>

</body>
</html>
