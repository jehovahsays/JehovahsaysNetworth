<!DOCTYPE html>
<html lang="en">
<head>
    <title>player</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link type="text/css" rel="stylesheet" href="./main.css">
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        
        /* Joystick */
        #joystick {
            position: fixed;
            bottom: 50px;
            left: 50px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            touch-action: none;
        }
        #joystick-handle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 255, 0.8);
            border-radius: 50%;
            left: 30px;
            top: 30px;
            transition: 0.1s;
        }

        /* Minimap */
        #minimap {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 125px;
            height: 150px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
        }
        #minimap-content {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.5);
        }
        #player-marker {
            position: absolute;
            width: 10px;
            height: 10px;
            background: blue;
            border-radius: 50%;
            left: 145px;
            top: 145px;
        }
		
        /* Action Buttons */
        .action-button {
            position: fixed;
            bottom: 50px;
            right: 50px;
            width: 60px;
            height: 60px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            font-size: 16px;
            text-align: center;
            line-height: 60px;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
        }

        #jump-btn { right: 150px; bottom: 100px; background: yellow; }
        #punch-btn { right: 80px; bottom: 100px; background: red; }
        #pickup-btn { right: 150px; bottom: 30px; background: green; }
        #swap-btn { right: 80px; bottom: 30px; background: blue; }
		
    </style>
		<style>
			body {
				color: #222;
			}

			a {
				color: #2fa1d6;
			}

			p {
				max-width: 600px;
				margin-left: auto;
				margin-right: auto;
				padding: 0 2em;
			}
		</style>	
</head>

<body>
    <!-- Minimap -->
    <div id="minimap">
        <div id="minimap-content">
            <div id="player-marker"></div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div id="jump-btn" class="action-button">Jump</div>
    <div id="punch-btn" class="action-button">Punch</div>
    <div id="pickup-btn" class="action-button">Pick</div>
    <div id="swap-btn" class="action-button">Swap</div>
	
			<script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>


    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
			import Stats from 'three/addons/libs/stats.module.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let camera, scene, renderer, model, mixer, clock
        let moveX = 0, moveZ = 0;
                let hasWeapon = true;
        let weaponIndex = 6;
        const speed = 0.1;


        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.25, 100);
            camera.position.set(-5, 13, -25);
            camera.lookAt(0, -2, 0);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e0e0);

            const light = new THREE.DirectionalLight(0xffffff, 3);
            light.position.set(0, 20, 10);
            scene.add(light);

            const loader = new GLTFLoader();
            loader.load('./models/gltf/RobotExpressive/RobotExpressive.glb', function (gltf) {
                model = gltf.scene;
                scene.add(model);

                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[1]);
                action.play();
            });

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (model) {
                model.position.x += moveX * speed;
                model.position.z += moveZ * speed;

                // Update minimap
                document.getElementById("player-marker").style.left = (145 + model.position.x * -2) + "px";
                document.getElementById("player-marker").style.top = (145 - model.position.z * 2) + "px";
            }

            if (mixer) mixer.update(clock.getDelta());
            renderer.render(scene, camera);
        }
		
        // Action Button Controls
        document.getElementById("jump-btn").addEventListener("click", () => {
            console.log("Jump action triggered");
        });

        document.getElementById("punch-btn").addEventListener("click", () => {
            if (hasWeapon) {
                console.log("Weapon attack triggered");
            } else {
                console.log("Punch action triggered");
            }
        });

        document.getElementById("pickup-btn").addEventListener("click", () => {
            hasWeapon = true;
            console.log("Weapon picked up");
        });

        document.getElementById("swap-btn").addEventListener("click", () => {
            if (hasWeapon) {
                weaponIndex = (weaponIndex + 1) % 3; // Example: 3 weapons to switch between
                console.log(`Weapon swapped to index ${weaponIndex}`);
            }
        });
		

        // Joystick Controls
        let joystick = document.createElement("div");
        joystick.id = "joystick";
        document.body.appendChild(joystick);

        let handle = document.createElement("div");
        handle.id = "joystick-handle";
        joystick.appendChild(handle);

        let touchStartX = 0, touchStartY = 0;

        joystick.addEventListener("touchstart", (event) => {
            const touch = event.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        });

        joystick.addEventListener("touchmove", (event) => {
            const touch = event.touches[0];
            //let deltaX = touch.clientX - touchStartX;
            //let deltaY = touch.clientY - touchStartY;

            moveZ = -deltaY / 50;

            handle.style.transform = `translate(${moveX * 20}px, ${moveZ * 20}px)`;
        });

        joystick.addEventListener("touchend", () => {
            moveX = 0;
            moveZ = 0;
            handle.style.transform = "translate(0px, 0px)";
        });

        init();
    </script>
	

	
</body>
</html>
