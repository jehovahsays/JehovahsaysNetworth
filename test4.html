<!DOCTYPE html>
<html lang="en">
<head>
    <title>MEV - Final Cosmic AI</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/mev/m/files/main.css">
    <style>
        /* Farthest distance is Gray as requested */
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Courier New', monospace; }
        
        #time-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        /* Search Bar Styles from test0.html */
        #inputWrapper {
            position: fixed;
            top: 25px;
            left: 90px;
            z-index: 1001;
        }
        #filterInput {
            width: 150px;
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 5px;
        }

        #nav-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            text-align: center;
        }

        .infobox-link {
            display: inline-block;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 12px 24px;
            border: 1px solid #0f0;
            border-radius: 5px;
            text-decoration: none;
            margin: 5px;
            text-transform: uppercase;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="time-container">
        <strong>AI INTERNAL CLOCK</strong>
        <input type="datetime-local" id="ai-datetime">
        <div id="display-time" style="margin-top:10px; font-size: 11px;">Syncing Subconscious...</div>
    </div>

    <div id="inputWrapper">
        <input id="filterInput" type="text" placeholder="search database" onkeyup="handleSearch(event)">
    </div>

    <div id="nav-overlay">
        <a href="#" id="zoom-sun-btn" class="infobox-link" style="display:none;">View Solar System</a>
        <a href="/mev/m/index.html" id="zoom-earth-btn" class="infobox-link" style="display:none;">Land on Earth</a>
        <a href="/mev/m/players.html" id="play-btn" class="infobox-link" style="display:none;">Play Scene</a>
    </div>

    <div class="content"></div> <script src="TagCloud.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "./examples/build/three.webgpu.js",
                "three/webgpu": "./examples/build/three.webgpu.js",
                "three/tsl": "./examples/build/three.tsl.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls;
        let sun, earth, blackHole, particles;
        const particleData = [];
        const texts = ["mercury", "venus", "earth", "mars", "jupiter", "saturn", "uranus", "neptune", "pluto"];

        // Speech Function exactly as in test0.html
        window.handleSearch = function(event) {
            let input = document.getElementById('filterInput').value.toLowerCase();
            
            // Filtering logic
            let x = document.getElementsByClassName('titleInput');
            for (let i = 0; i < x.length; i++) {
                x[i].style.display = x[i].innerHTML.toLowerCase().includes(input) ? "list-item" : "none";
            }

            // Speak on Enter
            if (event.key === "Enter") {
                var msg = new SpeechSynthesisUtterance(input + ". Initializing tutorial. Zoom out to see the galaxy, or click land on earth to enter the city.");
                window.speechSynthesis.speak(msg);
            }
        };

        init();

        function init() {
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 1500, 3000);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); // Gray farthest distance

            // Black Hole (Milky Way Center)
            blackHole = new THREE.Mesh(new THREE.SphereGeometry(80, 32, 32), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            scene.add(blackHole);

            // Particles (Each word becomes a star)
            const starCount = texts.length * 100; 
            const starGeom = new THREE.BufferGeometry();
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i<starCount; i++) {
                particleData.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: 300 + Math.random() * 1500,
                    speed: 0.005 + Math.random() * 0.01,
                    isFalling: true
                });
            }
            starGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particles = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 2 }));
            scene.add(particles);

            // Sun & Green Glow Earth
            sun = new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            earth = new THREE.Mesh(new THREE.SphereGeometry(18, 32, 32), new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 }));
            scene.add(sun);
            scene.add(earth);

            // TagCloud Initialization
            TagCloud('.content', texts, { radius: 350, keep: true, itemClass: 'titleInput' });

            renderer = new THREE.WebGPURenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            // Nav Buttons
            document.getElementById('zoom-sun-btn').onclick = () => { camera.position.set(0, 500, 1200); };
            document.getElementById('zoom-earth-btn').onclick = () => { camera.position.set(100, 50, 100); };
        }

        function animate() {
            const time = Date.now() * 0.0005;
            const dist = camera.position.length();

            // Update UI based on zoom
            document.getElementById('zoom-sun-btn').style.display = (dist > 1800) ? 'inline-block' : 'none';
            document.getElementById('zoom-earth-btn').style.display = (dist <= 1800 && dist > 350) ? 'inline-block' : 'none';
            document.getElementById('play-btn').style.display = (dist <= 350) ? 'inline-block' : 'none';

            // Orbits
            sun.position.set(Math.cos(time * 0.2) * 1200, 0, Math.sin(time * 0.2) * 1200);
            earth.position.set(sun.position.x + Math.cos(time * 2) * 250, 0, sun.position.z + Math.sin(time * 2) * 250);

            // Black Hole Queue Physics
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<particleData.length; i++) {
                let p = particleData[i];
                if(p.isFalling) {
                    p.radius -= 2; 
                    if(p.radius < 90) { p.isFalling = false; p.radius = 2000; }
                } else {
                    p.radius -= 0.5;
                    if(p.radius < 1800) p.isFalling = true;
                }
                p.angle += p.speed;
                positions[i*3] = Math.cos(p.angle) * p.radius;
                positions[i*3+1] = Math.sin(p.angle * 2) * 50;
                positions[i*3+2] = Math.sin(p.angle) * p.radius;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
