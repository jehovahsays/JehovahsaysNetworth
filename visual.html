<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Heated Procedural City</title>
    <style>
        body { margin: 0; background: #020205; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; cursor: move; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.85); padding: 20px;
            border-left: 4px solid #ff4400; border-radius: 4px;
            pointer-events: none; user-select: none;
        }
        .stat { color: #ffbb00; font-family: monospace; }
        .glow { text-shadow: 0 0 10px #ff4400; color: #ff4400; }
    </style>
</head>
<body>

<div id="overlay">
    <h3 style="margin:0">Thermal Grid v1.0</h3>
    <p>Source: <span class="stat">Central Power Plant</span></p>
    <p>Road Temp: <span id="temp" class="glow">0°C</span></p>
    <p style="font-size: 0.7em; color: #666;">DRAG TO ORBIT | PINCH TO ZOOM</p>
</div>

<canvas id="renderCanvas"></canvas>

<script>
/**
 * CUSTOM 3D ENGINE - VANILLA JS
 * No 3rd party links. Pure Geometry & Canvas.
 */

const canvas = document.getElementById('renderCanvas');
const ctx = canvas.getContext('2d');
let width, height;

// Simulation Config
const buildings = [];
const snowflakes = [];
const roadGrid = [];
let angleY = 0.5; // Orbit
let angleX = 0.6; // Pitch
let zoom = 1.2;
let targetZoom = 1.2;
let targetAngleY = 0.5;
let targetAngleX = 0.6;

// Interaction
let isDragging = false;
let lastX, lastY, lastDist;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

// --- 3D MATH CORE ---

function project(x, y, z) {
    // Rotate Y (Orbit)
    let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
    let x1 = x * cosY - z * sinY;
    let z1 = x * sinY + z * cosY;

    // Rotate X (Pitch)
    let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
    let y2 = y * cosX - z1 * sinX;
    let z2 = y * sinX + z1 * cosX;

    // Perspective projection
    let scale = (zoom * 800) / (z2 + 2500);
    return {
        x: width / 2 + x1 * scale,
        y: height / 2 - y2 * scale,
        scale: scale,
        depth: z2
    };
}

// --- INITIALIZATION ---

function init() {
    // Generate Buildings
    for (let x = -1500; x <= 1500; x += 500) {
        for (let z = -1500; z <= 1500; z += 500) {
            if (x === 0 && z === 0) continue; // Reserved for Power Plant
            buildings.push({
                x, z,
                w: 150, 
                h: 100 + Math.random() * 400,
                d: 150,
                type: 'office'
            });
        }
    }
    // Power Plant (Central)
    buildings.push({ x: 0, z: 0, w: 200, h: 250, d: 200, type: 'power' });

    // Snow
    for (let i = 0; i < 200; i++) {
        snowflakes.push({
            x: Math.random() * 4000 - 2000,
            y: Math.random() * 2000,
            z: Math.random() * 4000 - 2000,
            v: 2 + Math.random() * 3
        });
    }
}

// --- RENDERING ---

function drawBox(b, color, isHeated = false) {
    let hw = b.w / 2, hd = b.d / 2;
    
    // Define 8 vertices of a cube
    const vertices = [
        {x: b.x-hw, y: 0, z: b.z-hd}, {x: b.x+hw, y: 0, z: b.z-hd},
        {x: b.x+hw, y: b.h, z: b.z-hd}, {x: b.x-hw, y: b.h, z: b.z-hd},
        {x: b.x-hw, y: 0, z: b.z+hd}, {x: b.x+hw, y: 0, z: b.z+hd},
        {x: b.x+hw, y: b.h, z: b.z+hd}, {x: b.x-hw, y: b.h, z: b.z+hd}
    ];

    const p = vertices.map(v => project(v.x, v.y, v.z));

    const drawFace = (indices, fillColor) => {
        ctx.fillStyle = fillColor;
        ctx.beginPath();
        ctx.moveTo(p[indices[0]].x, p[indices[0]].y);
        for(let i=1; i<indices.length; i++) ctx.lineTo(p[indices[i]].x, p[indices[i]].y);
        ctx.closePath();
        ctx.fill();
    };

    // Sort and draw faces (Simplified Painters Algorithm)
    drawFace([0,1,2,3], '#111122'); // Front
    drawFace([4,5,6,7], '#0a0a15'); // Back
    drawFace([1,5,6,2], '#151525'); // Right
    drawFace([0,4,7,3], '#050510'); // Left
    
    // Roof (Snowy)
    drawFace([3,2,6,7], b.type === 'power' ? '#330000' : '#ffffff');
}

function render() {
    ctx.clearRect(0, 0, width, height);

    // Update rotation
    angleY += (targetAngleY - angleY) * 0.05;
    angleX += (targetAngleX - angleX) * 0.05;
    zoom += (targetZoom - zoom) * 0.05;

    const pulse = (Math.sin(Date.now() * 0.002) + 1) / 2;
    document.getElementById('temp').innerText = Math.round(pulse * 40) + "°C";

    // 1. Draw Grid Roads
    ctx.lineCap = 'round';
    for(let i = -2000; i <= 2000; i += 500) {
        drawRoad(i, -2000, i, 2000, pulse);
        drawRoad(-2000, i, 2000, i, pulse);
    }

    // 2. Sort buildings by depth
    buildings.sort((a, b) => {
        let az = a.x * Math.sin(angleY) + a.z * Math.cos(angleY);
        let bz = b.x * Math.sin(angleY) + b.z * Math.cos(angleY);
        return bz - az;
    });

    buildings.forEach(b => drawBox(b));

    // 3. Snowflakes
    ctx.fillStyle = "white";
    snowflakes.forEach(s => {
        s.y -= s.v; if(s.y < 0) s.y = 1500;
        let p = project(s.x, s.y, s.z);
        if(p.scale > 0) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.scale * 1.5, 0, 7);
            ctx.fill();
        }
    });

    requestAnimationFrame(render);
}

function drawRoad(x1, z1, x2, z2, pulse) {
    let p1 = project(x1, 0, z1);
    let p2 = project(x2, 0, z2);
    
    // Icy Base
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 15 * p1.scale;
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

    // Heating Element
    ctx.strokeStyle = `rgba(255, ${50 + pulse*100}, 0, ${0.2 + pulse*0.8})`;
    ctx.lineWidth = 4 * p1.scale;
    if(pulse > 0.8) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = "orange";
    }
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    ctx.shadowBlur = 0;
}

// --- INTERACTION ---

window.addEventListener('pointerdown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('pointerup', () => isDragging = false);
window.addEventListener('pointermove', e => {
    if(isDragging) {
        targetAngleY += (e.clientX - lastX) * 0.005;
        targetAngleX += (e.clientY - lastY) * 0.005;
        lastX = e.clientX; lastY = e.clientY;
    }
});

window.addEventListener('wheel', e => {
    targetZoom -= e.deltaY * 0.001;
    targetZoom = Math.min(Math.max(targetZoom, 0.3), 3);
});

// Pinch Zoom Logic
window.addEventListener('touchmove', e => {
    if(e.touches.length === 2) {
        let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        if(lastDist) targetZoom += (dist - lastDist) * 0.005;
        lastDist = dist;
    }
});
window.addEventListener('touchend', () => lastDist = 0);

window.addEventListener('resize', resize);
resize();
init();
render();

</script>
</body>
</html>
