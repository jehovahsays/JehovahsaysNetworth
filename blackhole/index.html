<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEV - Lockdown</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline';">
    <style>
        body { background: #000; color: #f00; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #f00; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="lockdown-ui" class="box">
        <h1>BREACH DETECTED</h1>
        <p>Security Perimeter Violated.</p>
        <p>Redirecting to Sentinel Gateway...</p>
    </div>

    <script>
        (function() {
            "use strict";
            const agent = navigator.userAgent.toLowerCase();
            if (agent.includes('github') || agent.includes('googlebot')) {
                window.location.replace('../index.html');
                return;
            }

            const CONFIG = Object.freeze({
                B_KEY: 'mev_breach_detected',
                DEST: '../index.html?reason=perimeter_breach'
            });

            const observer = new MutationObserver(() => window.location.replace(CONFIG.DEST));
            observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });

            localStorage.setItem(CONFIG.B_KEY, 'true');
            localStorage.removeItem('mev_human_verified');
            setTimeout(() => window.location.replace(CONFIG.DEST), 1500);
        })();
    </script>
</body>
</html>
