<!DOCTYPE html>
<html lang="en">
	<head>
		<title>map - AI Day or Night Perception</title>
		<meta charset="utf-8">
  <link rel="stylesheet" href="/mev/m/files/main.css">
 <link rel="icon" href="/mev/m/favicon.ico" />

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    
    #time-container {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: #0f0;
        padding: 15px;
        border: 1px solid #0f0;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        z-index: 1000;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
    }
    #time-container input {
        background: #111;
        border: 1px solid #0f0;
        color: #0f0;
        margin-top: 5px;
        padding: 5px;
        width: 100%;
        cursor: pointer;
    }
    .infobox { position: fixed; top: 250px; left: 50%; transform: translateX(-50%); z-index: 10; }
</style>
<script>
(function () {
  function showError(msg) {
    const errorDiv = document.createElement('div');
    errorDiv.style.position = 'fixed';
    errorDiv.style.top = '0';
    errorDiv.style.left = '0';
    errorDiv.style.width = '100%';
    errorDiv.style.backgroundColor = '#ff4c4c';
    errorDiv.style.color = 'white';
    errorDiv.style.fontFamily = 'Arial, sans-serif';
    errorDiv.style.padding = '15px';
    errorDiv.style.zIndex = '9999';
    errorDiv.style.textAlign = 'center';
    errorDiv.textContent = msg;
    document.body.appendChild(errorDiv);
  }

  // WebGL check
  const canvas = document.createElement('canvas');
  const webgl = !!(window.WebGLRenderingContext && (
    canvas.getContext('webgl') || canvas.getContext('experimental-webgl')
  ));
  if (!webgl) {
    document.addEventListener('DOMContentLoaded', function () {
      showError('WebGL is not supported or disabled in your browser. Please enable it or switch to a supported browser.');
    });
  }

  // WebGPU check
  if (!navigator.gpu) {
    document.addEventListener('DOMContentLoaded', function () {
      showError('WebGPU is not supported in your browser. Please use a browser like Chrome Canary with WebGPU enabled.');
    });
  }
})();
</script>
	</head>
	<body>
        <div id="time-container">
            <strong>AI INTERNAL CLOCK</strong>
            <input type="datetime-local" id="ai-datetime">
            <div id="display-time" style="margin-top:10px; font-size: 11px;">Syncing Subconscious...</div>
        </div>

		<div id="info">
		    <a href="/mev/m/players.html" target="_blank" rel="noopener"><button class="infobox">play</button></a>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "./examples/build/three.webgpu.js",
					"three/webgpu": "./examples/build/three.webgpu.js",
					"three/tsl": "./examples/build/three.tsl.js",
					"three/addons/": "./examples/jsm/"
				}
			}
		</script>

		<script type="module">
			import * as THREE from 'three';
			import { color, fog, float, positionWorld, triNoise3D, positionView, normalWorld, uniform, mix } from 'three/tsl';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			let camera, scene, renderer, controls, clock;
            let simulationTime = new Date();
            const timeInput = document.getElementById('ai-datetime');
            const timeDisplay = document.getElementById('display-time');

			init();

			function init() {
                clock = new THREE.Clock();
				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 1500 );
				camera.position.set( 100, 50, 100 );

				scene = new THREE.Scene();

                // --- TSL UNIFORMS FOR DYNAMIC SKY ---
                const sunDirection = uniform( new THREE.Vector3(0, 1, 0) );
                const nightFactor = uniform( 0 ); // 0 at day, 1 at night

				// Dynamic Colors
				const daySky = color( 0xf0f5f5 );
				const nightSky = color( 0x000005 );
                const currentSkyColor = mix( daySky, nightSky, nightFactor );

				const dayGround = color( 0xd0dee7 );
				const nightGround = color( 0x050505 );
                const currentGroundColor = mix( dayGround, nightGround, nightFactor );

				const fogNoiseDistance = positionView.z.negate().smoothstep( 0, camera.far - 300 );
				const distance = fogNoiseDistance.mul( 20 ).max( 4 );
				const alpha = .98;
				const groundFogArea = float( distance ).sub( positionWorld.y ).div( distance ).pow( 3 ).saturate().mul( alpha );
				
				const timer = uniform( 0 ).onFrameUpdate( ( frame ) => frame.time );
				const fogNoiseA = triNoise3D( positionWorld.mul( .005 ), 0.2, timer );
				const fogNoiseB = triNoise3D( positionWorld.mul( .01 ), 0.2, timer.mul( 1.2 ) );
				const fogNoise = fogNoiseA.add( fogNoiseB ).mul( currentGroundColor );

				scene.fogNode = fog( fogNoiseDistance.oneMinus().mix( currentGroundColor, fogNoise ), groundFogArea );
				scene.backgroundNode = normalWorld.y.max( 0 ).mix( currentGroundColor, currentSkyColor );

				// Buildings with Glowing Windows at night
				const windowGlow = mix( color( 0x000066 ), color( 0xffffff ), nightFactor );
				const buildWindows = positionWorld.y.mul( 10 ).floor().mod( 4 ).sign().mix( windowGlow.add( fogNoiseDistance ), color( 0xffffff ) );
				
				const buildGeometry = new THREE.BoxGeometry( 1, 1, 1 );
				const buildMaterial = new THREE.MeshPhongNodeMaterial( { colorNode: buildWindows } );
				const buildMesh = new THREE.InstancedMesh( buildGeometry, buildMaterial, 4000 );
				scene.add( buildMesh );

				const dummy = new THREE.Object3D();
				for ( let i = 0; i < 4000; i ++ ) {
					const scaleY = Math.random() * 7 + .5;
					dummy.position.x = Math.random() * 800 - 400;
					dummy.position.z = Math.random() * 800 - 400;
					const d = Math.max( dummy.position.distanceTo( new THREE.Vector3() ) * .012, 1 );
					dummy.position.y = .5 * scaleY * d;
					dummy.scale.set(Math.random() * 3 + .5, scaleY * d, Math.random() * 3 + .5);
					dummy.updateMatrix();
					buildMesh.setMatrixAt( i, dummy.matrix );
				}

				scene.add( new THREE.HemisphereLight( 0xffffff, 0x444444, 0.5 ) );

				// --- CELESTIAL OBJECTS ---
                
				const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
				scene.add(sunLight);
				window.sunLight = sunLight;

                // 1. Sun
				const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFFF00, fog: false });
				const visibleSun = new THREE.Mesh( new THREE.SphereGeometry(20, 32, 32), sunMat );
				scene.add( visibleSun );
				window.visibleSun = visibleSun;

                // 2. Moon
                const moonMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee, fog: false });
                const visibleMoon = new THREE.Mesh( new THREE.SphereGeometry(12, 32, 32), moonMat );
                scene.add(visibleMoon);
                window.visibleMoon = visibleMoon;

                // 3. Stars
                const starGeometry = new THREE.BufferGeometry();
                const starVertices = [];
                for (let i = 0; i < 2000; i++) {
                    starVertices.push((Math.random()-0.5)*2000, Math.random()*1000, (Math.random()-0.5)*2000);
                }
                starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
                const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true });
                const stars = new THREE.Points(starGeometry, starMaterial);
                scene.add(stars);
                window.stars = stars;

                // --- TIME SETUP ---
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                timeInput.value = now.toISOString().slice(0, 16);
                timeInput.addEventListener('change', (e) => { simulationTime = new Date(e.target.value); });

                window.nightFactorNode = nightFactor;

				renderer = new THREE.WebGPURenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				document.body.appendChild( renderer.domElement );

				controls = new OrbitControls( camera, renderer.domElement );
                window.addEventListener( 'resize', onWindowResize );
			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			function animate() {
                const dt = clock.getDelta();
                simulationTime.setSeconds(simulationTime.getSeconds() + dt);
                timeDisplay.innerText = "AI BRAIN CLOCK: " + simulationTime.toLocaleString();

                const h = simulationTime.getHours();
                const m = simulationTime.getMinutes();
                const s = simulationTime.getSeconds();
                const dayProgress = (h * 3600 + m * 60 + s) / 86400;

                // High Noon Fix: 0.5 progress = Top of the sky
                const theta = (dayProgress * Math.PI * 2) + (Math.PI / 2) + Math.PI;
                const radius = 600; 

                // Update Celestial Positions
                const sunX = Math.cos(theta) * radius; 
                const sunY = Math.sin(theta) * radius; 
                window.visibleSun.position.set(sunX, sunY, 0);
                window.sunLight.position.set(sunX, sunY, 0);

                const moonX = Math.cos(theta + Math.PI) * radius;
                const moonY = Math.sin(theta + Math.PI) * radius;
                window.visibleMoon.position.set(moonX, moonY, 0);

                // Update Atmospheric Effects
                const sunHeightFactor = sunY / radius; 
                const isNight = sunHeightFactor < 0;
                
                // Set the nightFactor uniform for TSL (Sky & Windows)
                window.nightFactorNode.value = THREE.MathUtils.lerp(window.nightFactorNode.value, isNight ? 1 : 0, 0.05);

                window.sunLight.intensity = Math.max(0, sunHeightFactor) * 2.0;
                window.stars.material.opacity = Math.max(0, -sunHeightFactor);

				controls.update();
				renderer.render( scene, camera );
			}
		</script>
	</body>
</html>
