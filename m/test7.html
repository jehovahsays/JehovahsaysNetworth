<!DOCTYPE html>
<html lang="en">
<head>
    <title>MEV - Final Cosmic AI Transition</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/mev/m/files/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Courier New', monospace; }
        
        #time-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 8px;
            z-index: 1000;
        }

        #inputWrapper { position: fixed; top: 25px; left: 100px; z-index: 1001; }
        #filterInput { width: 150px; background: #111; border: 1px solid #0f0; color: #0f0; padding: 5px; }

        #nav-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            text-align: center;
        }

        .infobox-link {
            display: inline-block;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 12px 24px;
            border: 1px solid #0f0;
            border-radius: 5px;
            text-decoration: none;
            margin: 5px;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* Subconscious Vault Styles from test8 */
        #word-vault { margin-top: 5px; max-height: 60px; overflow: hidden; border-top: 1px solid #050; }
        .captured-word { display: block; font-size: 10px; color: #f00; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="time-container">
        <strong>AI INTERNAL CLOCK</strong>
        <div id="word-vault"></div> 
        <input type="datetime-local" id="ai-datetime">
        <div id="display-time" style="margin-top:10px; font-size: 11px;">Syncing Subconscious...</div>
    </div>

    <div id="inputWrapper">
        <input id="filterInput" type="text" placeholder="search database" onkeyup="handleSearch(event)">
    </div>

    <div id="nav-overlay">
        <a id="zoom-sun-btn" class="infobox-link" style="display:none;">View Solar System</a>
        <a id="zoom-earth-btn" class="infobox-link" style="display:none;">Land on Earth</a>
        <a href="/mev/m/players.html" id="play-btn" class="infobox-link" style="display:none;">Enter Brain Core</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "./examples/build/three.webgpu.js",
                "three/webgpu": "./examples/build/three.webgpu.js",
                "three/tsl": "./examples/build/three.tsl.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { color, fog, float, positionWorld, triNoise3D, uniform, vec3 } from 'three/tsl';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls, clock;
        let sun, earth, blackHole, particles, cityGroup, bossAI;
        let magnetTop, magnetBottom; // The Magnet system from test8
        let simulationTime = new Date();
        let wordCaptureTimer = 0;
        const particleData = [];

        window.handleSearch = function(event) {
            let input = document.getElementById('filterInput').value.toLowerCase();
            if (event.key === "Enter") {
                var msg = new SpeechSynthesisUtterance(input + ". Initializing landing protocol.");
                window.speechSynthesis.speak(msg);
                landOnEarth(); 
            }
        };

        init();

        function init() {
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.set(0, 1500, 3000);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            // --- LAYER 1: GALAXY (Original test7) ---
            blackHole = new THREE.Mesh(new THREE.SphereGeometry(80, 32, 32), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            scene.add(blackHole);

            const starCount = 2000;
            const starGeom = new THREE.BufferGeometry();
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i<starCount; i++) {
                particleData.push({ 
                    angle: Math.random() * Math.PI * 2, 
                    radius: 300 + Math.random() * 1500, 
                    speed: 0.005 + Math.random() * 0.01, 
                    isFalling: true,
                    originalRadius: 300 + Math.random() * 1500 
                });
            }
            starGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particles = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 2 }));
            scene.add(particles);

            // --- LAYER 2: SOLAR ---
            sun = new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(18, 32, 32), 
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 2 })
            );
            scene.add(sun, earth);

            // --- THE MAGNETS (Subconscious from test8) ---
            const magnetGeom = new THREE.CylinderGeometry(60, 60, 15, 32);
            const magnetMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
            magnetTop = new THREE.Mesh(magnetGeom, magnetMat);
            magnetBottom = new THREE.Mesh(magnetGeom, magnetMat);
            magnetTop.visible = magnetBottom.visible = false; 
            scene.add(magnetTop, magnetBottom);

            // --- LAYER 3: THE CITY & BOSS AI ---
            cityGroup = new THREE.Group();
            cityGroup.visible = false;
            
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({ color: 0x555555 }));
            ground.rotation.x = -Math.PI / 2;
            cityGroup.add(ground);

            const boxGeom = new THREE.BoxGeometry(1, 1, 1);
            const buildingMat = new THREE.MeshPhongMaterial({ color: 0xadd8e6 });
            for (let i = 0; i < 500; i++) {
                const building = new THREE.Mesh(boxGeom, buildingMat);
                const h = Math.random() * Math.random() * 120 + 10;
                building.position.set(Math.random() * 800 - 400, h / 2, Math.random() * 800 - 400);
                building.scale.set(15, h, 15);
                cityGroup.add(building);
            }

            // The Red Block AI (Levitating Core from test8)
            bossAI = new THREE.Mesh(
                new THREE.BoxGeometry(40, 40, 40), 
                new THREE.MeshPhongMaterial({ color: 0xff0000 })
            );
            bossAI.position.set(0, 25, 0);
            cityGroup.add(bossAI);
            scene.add(cityGroup);

            // Lighting and Fog
            window.visibleSun = new THREE.Mesh(new THREE.SphereGeometry(20, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffddaa }));
            window.visibleMoon = new THREE.Mesh(new THREE.SphereGeometry(15, 32, 32), new THREE.MeshBasicMaterial({ color: 0xeeeeee }));
            cityGroup.add(window.visibleSun, window.visibleMoon);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            window.sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            scene.add(window.sunLight);

            window.nightFactorNode = uniform(0);
            scene.fogNode = fog(color(0x000000), triNoise3D(positionWorld.mul(.005), 0.2, uniform(0).onFrameUpdate((f)=>f.time)));

            renderer = new THREE.WebGPURenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            document.getElementById('zoom-sun-btn').onclick = () => { camera.position.set(0, 500, 1200); };
            document.getElementById('zoom-earth-btn').onclick = landOnEarth;
        }

        function landOnEarth() {
            cityGroup.visible = true;
            magnetTop.visible = true;
            magnetBottom.visible = true;
            
            // Positioning magnets to encompass the Red Block
            magnetTop.position.set(0, 180, 0);
            magnetBottom.position.set(0, -5, 0); 

            scene.background = new THREE.Color(0x000000);
            camera.position.set(400, 200, 400);
            controls.target.set(0, 0, 0);
            
            document.getElementById('ai-datetime').addEventListener('input', (e) => {
                simulationTime = new Date(e.target.value);
            });
        }

        function captureWordAction() {
            const input = document.getElementById('filterInput');
            const words = input.value.trim().split(' ');
            if (words.length > 0 && words[0] !== "") {
                const word = words.shift();
                input.value = words.join(' ');
                const vault = document.getElementById('word-vault');
                const entry = document.createElement('span');
                entry.className = 'captured-word';
                entry.innerText = `>> CAPTURED: ${word}`;
                vault.prepend(entry);
                if (vault.children.length > 5) vault.removeChild(vault.lastChild);
            }
        }

        function updateCelestialCycle() {
            if (!cityGroup.visible) return;
            const h = simulationTime.getHours();
            const m = simulationTime.getMinutes();
            const dayProgress = (h * 3600 + m * 60) / 86400;
            const theta = (dayProgress * Math.PI * 2) + Math.PI;
            const radius = 800;

            window.visibleSun.position.set(Math.cos(theta) * radius, Math.sin(theta) * radius, 0);
            window.sunLight.position.copy(window.visibleSun.position);
            window.visibleMoon.position.set(Math.cos(theta + Math.PI) * radius, Math.sin(theta + Math.PI) * radius, 0);

            const isNight = window.visibleSun.position.y < 0;
            window.nightFactorNode.value = THREE.MathUtils.lerp(window.nightFactorNode.value, isNight ? 1 : 0, 0.05);
            document.getElementById('display-time').innerText = "AI BRAIN CLOCK: " + simulationTime.toLocaleString();
        }

        function animate() {
            const time = performance.now() * 0.002;
            const delta = clock.getDelta();
            const dist = camera.position.length();

            // UI Visibility based on distance
            document.getElementById('zoom-sun-btn').style.display = (dist > 1800) ? 'inline-block' : 'none';
            document.getElementById('zoom-earth-btn').style.display = (dist <= 1800 && dist > 600) ? 'inline-block' : 'none';
            document.getElementById('play-btn').style.display = (dist <= 600) ? 'inline-block' : 'none';

            // Galaxy orbit logic
            sun.position.set(Math.cos(time * 0.1) * 1200, 0, Math.sin(time * 0.1) * 1200);
            earth.position.set(sun.position.x + Math.cos(time) * 250, 0, sun.position.z + Math.sin(time) * 250);

            // Levitating Physics and Subconscious Word Capture
            if (cityGroup.visible) {
                bossAI.position.y = 65 + Math.sin(time) * 45; 
                bossAI.rotation.y += 0.02;

                wordCaptureTimer += delta;
                if (wordCaptureTimer > 3) {
                    captureWordAction();
                    wordCaptureTimer = 0;
                }
            }

            // Particle/Star capture logic
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<particleData.length; i++) {
                let p = particleData[i];
                if (cityGroup.visible) {
                    if (p.isFalling) {
                        positions[i*3] *= 0.95; positions[i*3+1] *= 0.95; positions[i*3+2] *= 0.95;
                        if (Math.abs(positions[i*3]) < 10) p.isFalling = false;
                    } else {
                        p.angle += p.speed * 2;
                        positions[i*3] = Math.cos(p.angle) * p.originalRadius;
                        positions[i*3+1] = 50 + Math.sin(time + i) * 20;
                        positions[i*3+2] = Math.sin(p.angle) * p.originalRadius;
                        if (Math.random() > 0.99) p.isFalling = true;
                    }
                } else {
                    p.angle += p.speed;
                    positions[i*3] = Math.cos(p.angle) * p.radius;
                    positions[i*3+1] = Math.sin(p.angle * 2) * 50;
                    positions[i*3+2] = Math.sin(p.angle) * p.radius;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;

            updateCelestialCycle();
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
