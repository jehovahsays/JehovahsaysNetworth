<!DOCTYPE html>
<html lang="en">
<head>
    <title>MEV - Galactic Depth</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/mev/m/files/main.css">
    <style>
        /* The farthest distance color is Gray as requested */
        body { margin: 0; overflow: hidden; background-color: #222; } 
        
        .content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        
        /* Dynamic InfoBox for reliable clicking on mobile */
        #nav-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            text-align: center;
        }
        
        /* Using your original index.html infobox style */
        .infobox-link {
            display: inline-block;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 10px 20px;
            border: 1px solid #0f0;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            text-decoration: none;
            margin: 5px;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="time-container">
        <strong>AI INTERNAL CLOCK</strong>
        <input type="datetime-local" id="ai-datetime">
        <div id="display-time">Syncing Subconscious...</div>
    </div>

    <div id="nav-overlay">
        <a href="#" id="zoom-sun-btn" class="infobox-link" style="display:none;">VIEW SOLAR SYSTEM</a>
        <a href="#" id="zoom-earth-btn" class="infobox-link" style="display:none;">LAND ON EARTH</a>
        <a href="/mev/m/players.html" id="play-btn" class="infobox-link" style="display:none;">PLAY GAME</a>
    </div>

    <div class="content"></div>

    <script src="TagCloud.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "./examples/build/three.webgpu.js",
                "three/webgpu": "./examples/build/three.webgpu.js",
                "three/tsl": "./examples/build/three.tsl.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls;
        let sun, earth, blackHole, particles;
        const particleData = [];

        init();

        function init() {
            // High depth for the "Gray" farthest distance
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 1500, 3000); 

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); // Farthest distance is Gray

            // 1. THE MILKY WAY BLACK HOLE (Center)
            blackHole = new THREE.Mesh(
                new THREE.SphereGeometry(80, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x000000 })
            );
            scene.add(blackHole);

            // 2. SWIRLING DOTS (Black Hole Queue Physics)
            const starCount = 4000;
            const starGeom = new THREE.BufferGeometry();
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i<starCount; i++) {
                particleData.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: 300 + Math.random() * 1500,
                    speed: 0.005 + Math.random() * 0.01,
                    isFalling: true,
                    waitFactor: Math.random()
                });
            }
            starGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particles = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5 }));
            scene.add(particles);

            // 3. THE SUN (Yellow Sphere)
            sun = new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            scene.add(sun);

            // 4. THE EARTH (Green Glowing Sphere)
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(18, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 })
            );
            scene.add(earth);

            renderer = new THREE.WebGPURenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.addEventListener('change', updateUI);

            // Button Event Listeners
            document.getElementById('zoom-sun-btn').onclick = () => { controls.minDistance = 600; camera.position.set(0, 500, 1000); };
            document.getElementById('zoom-earth-btn').onclick = () => { controls.minDistance = 100; camera.position.set(100, 50, 150); };
        }

        function updateUI() {
            const dist = camera.position.length();
            const sunBtn = document.getElementById('zoom-sun-btn');
            const earthBtn = document.getElementById('zoom-earth-btn');
            const playBtn = document.getElementById('play-btn');

            // Zoom logic for UI Visibility
            sunBtn.style.display = (dist > 1500) ? 'inline-block' : 'none';
            earthBtn.style.display = (dist <= 1500 && dist > 400) ? 'inline-block' : 'none';
            playBtn.style.display = (dist <= 400) ? 'inline-block' : 'none';
        }

        function animate() {
            const time = Date.now() * 0.0005;

            // Sun orbits Black Hole
            sun.position.set(Math.cos(time * 0.2) * 1200, 0, Math.sin(time * 0.2) * 1200);

            // Earth orbits Sun
            earth.position.set(
                sun.position.x + Math.cos(time * 2) * 250,
                0,
                sun.position.z + Math.sin(time * 2) * 250
            );

            // Swirling Dot Physics (The Queue)
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<particleData.length; i++) {
                let p = particleData[i];
                if(p.isFalling) {
                    p.radius -= 2; 
                    if(p.radius < 90) { // Absorbed by Black Hole
                        p.isFalling = false;
                        p.radius = 2000; // Thrown to back of the line
                    }
                } else {
                    p.radius -= 0.5; // Slowly waiting turn
                    if(p.radius < 1800) p.isFalling = true;
                }
                p.angle += p.speed;
                positions[i*3] = Math.cos(p.angle) * p.radius;
                positions[i*3+1] = (Math.sin(p.angle * 2) * 50); // Galactic wave
                positions[i*3+2] = Math.sin(p.angle) * p.radius;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.setAnimationLoop(() => {
                controls.update();
                renderer.render(scene, camera);
            });
        }
        animate();
    </script>
</body>
</html>
