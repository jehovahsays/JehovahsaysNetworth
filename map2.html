<!DOCTYPE html>
<html lang="en">
<head>
    <title>Updated Map</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script type="importmap">
    {
        "imports": {
			"three": "./build/three.module.js",
            "three": "./build/three.webgpu.js",
            "three/webgpu": "./build/three.webgpu.js",
            "three/tsl": "./build/three.tsl.js",
            "three/addons/": "./examples/jsm/"
        }
    }
</script>	

<script type="module">
    import * as THREE from './build/three.module.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    let scene, camera, renderer, controls;
    let buildings = {};
    let aiPlayers = [];
    let aiCars = [];

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(50, 50, 50);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.update();

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(50, 50, 50);
        scene.add(light);

        // Ground with streets
        createGround();

        // Load buildings
        updateBuildings();

        // Add AI
        setInterval(moveAI, 100);

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function createGround() {
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
    }

    function createBuilding(fileName, x, z, isProtected) {
        let height = Math.random() * 20 + 5;
        let geometry = new THREE.BoxGeometry(5, height, 5);
        let material = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
        let building = new THREE.Mesh(geometry, material);
        building.position.set(x, height / 2, z);
        scene.add(building);

        // Add glowing shield if protected
        if (isProtected) {
            const shieldGeometry = new THREE.SphereGeometry(4, 32, 32);
            const shieldMaterial = new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.3,
                emissive: 0x00ffff
            });
            let shield = new THREE.Mesh(shieldGeometry, shieldMaterial);
            shield.position.set(x, height / 2, z);
            scene.add(shield);
        }

        // Label the building
        labelBuilding(fileName, x, height, z);

        buildings[fileName] = building;
    }

    function labelBuilding(text, x, y, z) {
        const loader = new FontLoader();
        loader.load('three/addons/examples/fonts/helvetiker_regular.typeface.json', function (font) {
            const textGeometry = new TextGeometry(text, {
                font: font,
                size: 1,
                height: 0.1
            });
            const textMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            let textMesh = new THREE.Mesh(textGeometry, textMaterial);
            textMesh.position.set(x, y + 2, z);
            scene.add(textMesh);
        });
    }

    function updateBuildings() {
        // Simulating reading files and checking for "protected"
        let files = ["BuildingA.txt", "BuildingB_protected.txt", "BuildingC.txt"];
        
        files.forEach((file, index) => {
            let isProtected = file.includes("protected");
            let x = (index % 10) * 10 - 30;
            let z = Math.floor(index / 10) * 10 - 30;
            createBuilding(file, x, z, isProtected);
        });

        // Spawn AI
        for (let i = 0; i < 5; i++) {
            spawnAI();
            spawnCar();
        }
    }

    function spawnAI() {
        let geometry = new THREE.SphereGeometry(1);
        let material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        let ai = new THREE.Mesh(geometry, material);
        ai.position.set(Math.random() * 50 - 25, 1, Math.random() * 50 - 25);
        scene.add(ai);
        aiPlayers.push(ai);
    }

    function spawnCar() {
        let geometry = new THREE.BoxGeometry(2, 1, 4);
        let material = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        let car = new THREE.Mesh(geometry, material);
        car.position.set(Math.random() * 50 - 25, 1, Math.random() * 50 - 25);
        scene.add(car);
        aiCars.push(car);
    }

    function moveAI() {
        aiPlayers.forEach(ai => {
            ai.position.x += (Math.random() - 0.5) * 0.5;
            ai.position.z += (Math.random() - 0.5) * 0.5;
        });

        aiCars.forEach(car => {
            car.position.x += (Math.random() - 0.5) * 1;
            car.position.z += (Math.random() - 0.5) * 1;
        });
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
