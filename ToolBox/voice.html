<style>
/* Original styles */

        margin: 0px;

		height: 300px;
	    position: fixed;		
	    top: 55px;
        left: 0px;

}
.blackhole {
        margin: 0px;
		width: 35px;
		height: 35px;
	    position: fixed;		
	    top: 188px;
        left: 165px;
		right: 0px;
        padding: 0px;
		opacity: 0.5;
}
input[type="text"] {
  font-family: monospace;
  font-size: 10px;
  color: peru;
}
/* Corrected fieldset syntax */
fieldset{
	position:absolute;
	top:0;
	left:0;
	width:99%;
	height:99%;
}
/* Updated 'filterInput' tag to class or used UL ID name for clarity */
#filterInputList {
        list-style: none;
        padding: 0px;
        margin: 0px;
		position: fixed;
	    top: 60px;
        left: 0px;
        /* Added display: flex to force items onto one line */
        display: flex;
        flex-direction: row;
        width: 100%;
}

.titleInput {
        margin: 0px;
	    /* Changed to relative positioning to allow flow on one line */
	    position: relative;		
	    top: 23px;
        /* Adjusted left position for flow */
        left: 70px; 
        font-size: 1.0em;
        padding: 0px;
        animation: fadeIn 0.5s ease-in-out;
} 

.titleInput:last-child {        
        margin: 0px;
	    position: relative;		
	    top: 23px;
        left: 70px;
        font-size: 1.0em;
        padding: 0px;
        border-bottom: none;
}

@keyframes fadeIn {
   from {
        opacity: 0;
        transform: translateY(-10px);
}
   to   {
        opacity: 1;
        transform: translateY(0);
}
}  
</style>

<title>
voice
</title>


</head>
<center>

<body style="background-color:black;">

<fieldset style="width:305px;">
<center>
<br>
<div id="inputWrapper">
<form
id="searchForm"
action="./#search" 
method="get"
>	
<div id="inputWrapper">
<input
style="position:absolute;top:25px;left:90px;width:150px;"
id="filterInput"
onkeyup="titleInput()"
autocomplete="true"
autocorrect="off"  
autocapitalize="off" 
spellcheck="true"
type="text" 
name="q"
maxlength="524288" 
value=""
aria-label="search"  
placeholder="search database" 
x-webkit-speech
required>
</div>		


</form>

<script>
// I. Set Initial URL Hash
if (window.location.hash === '') {
    window.location.hash = '#search';
}

// II. Original titleInput function (for fading text effects and voice speech)
function titleInput() {
	
  let input = document.getElementById('filterInput').value;

  input = input.toLowerCase();

  let x = document.getElementsByClassName('titleInput');
 
  for (i = 0; i < x.length; i++) {

    if (!x[i].innerHTML.toLowerCase().includes(input)) {

      x[i].parentNode.style.display = "none"; // Hide the LI parent

    }

    else {

      x[i].parentNode.style.display = "list-item"; // Show the LI parent

    }

  }
  
let msg = new SpeechSynthesisUtterance(input); 
window.speechSynthesis.speak(msg);   

  
}

// III. New function to add keyword button
function addKeywordButton(keyword) {
    if (keyword.trim() === '') return; // Don't add empty keywords

    const list = document.getElementById('filterInputList');
    
    // 1. Create the LI element
    const listItem = document.createElement('li');
    
    // 2. Create the A element
    const link = document.createElement('a');
    link.href = `#${encodeURIComponent(keyword)}`;
    link.className = 'titleInput'; // Crucial for filtering and styling
    
    // 3. Create the BUTTON element
    const button = document.createElement('button');
    button.textContent = keyword.trim();
    
    // Assemble the elements: <a> inside <li>, <button> inside <a>
    link.appendChild(button);
    listItem.appendChild(link);
    
    // Append the new <li> to the UL
    list.appendChild(listItem);

    // Optional: Voice utterance for confirmation
    let msg = new SpeechSynthesisUtterance("Keyword added: " + keyword.trim()); 
    window.speechSynthesis.speak(msg); 
}

// IV. Event Listener for 'Enter' key on the search input
document.getElementById('searchForm').addEventListener('submit', function(event) {
    event.preventDefault(); // Prevent the default form submission (page reload)
    
    const inputElement = document.getElementById('filterInput');
    const keyword = inputElement.value;
    
    if (keyword.trim() !== '') {
        addKeywordButton(keyword);
        inputElement.value = ''; // Clear the input after adding
    }
});
</script>
<br><br><br><br>
<ul id="filterInputList"> 
<li><a href="#recent" id="recent-link" class="titleInput"><button>Recent</button></a></li>
<li><a href="#settings" id="settings-link" class="titleInput"><button>Settings</button></a></li>
<li><a href="#about" id="about-link" class="titleInput"><button>About</button></a></li>
</ul>


</div>
</center>
</fieldset>

</body>
</center>
