<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure P2P Chat – MEV</title>
  <style>
    body { font-family: sans-serif; padding: 1em; max-width: 600px; margin: auto; }
    textarea, input { width: 100%; margin: 0.5em 0; padding: 0.5em; }
    #messages { border: 1px solid #ccc; height: 200px; overflow-y: scroll; padding: 0.5em; background: #f9f9f9; }
    .msg { margin-bottom: 0.5em; }
    button { padding: 0.5em 1em; }
    .codebox { font-family: monospace; font-size: 0.8em; white-space: pre-wrap; background: #eee; padding: 0.5em; border-radius: 5px; }
  </style>
</head>
<body>
  <a href="./#search" class="close-button">✖ - CLOSE</a>

  <h2>🔐 Secure Peer-to-Peer Chat</h2>
  <p>Use this to chat securely via WebRTC. Works offline on local network or globally using chat codes.</p>

  <div id="step1">
    <button onclick="startOffer()">1. Create Chat Offer</button>
    <div id="offerBox" style="display:none;">
      <p>Copy this code and send it to your peer:</p>
      <textarea id="offer" readonly rows="8" class="codebox"></textarea>
    </div>
  </div>

  <div id="step2">
    <p>2. Paste their Offer to generate your Answer:</p>
    <textarea id="remoteOffer" rows="8" placeholder="Paste their chat code (offer) here"></textarea>
    <button onclick="submitOffer()">Generate Answer</button>
    <div id="answerBox" style="display:none;">
      <p>Send this back to them:</p>
      <textarea id="answer" readonly rows="8" class="codebox"></textarea>
    </div>
  </div>

  <div id="step3">
    <p>3. Paste their Answer:</p>
    <textarea id="remoteAnswer" rows="8" placeholder="Paste their answer here"></textarea>
    <button onclick="submitAnswer()">Connect</button>
  </div>

  <hr/>

  <h3>🗨️ Chat</h3>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type a message..." disabled />
  <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>

  <script src="./chat.js"></script>
</body>
</html>
