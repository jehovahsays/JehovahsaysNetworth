<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEV Wiki Installer</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f9f9f9;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      color: #2a4b8d;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.3rem;
      font-size: 1rem;
    }
    button {
      margin-top: 2rem;
      padding: 0.7rem 1.5rem;
      background-color: #2a4b8d;
      color: white;
      border: none;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background-color: #1f355e;
    }
    .small {
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>

  <h1 id="title">Welcome to the MEV Wiki Installer</h1>
  <p id="subtitle">Let's configure your new wiki.</p>

  <form id="installer-form">
    <label for="siteName" id="siteNameLabel">Site Name</label>
    <input type="text" id="siteName" name="siteName" placeholder="e.g., VandalHunter Wiki" required />

    <label for="adminUser" id="adminUserLabel">Admin Display Name</label>
    <input type="text" id="adminUser" name="adminUser" placeholder="e.g., Morgan" required />

    <label for="mainPageTitle" id="mainPageLabel">Main Page Title</label>
    <input type="text" id="mainPageTitle" name="mainPageTitle" placeholder="e.g., Start Here" required />

    <label for="theme" id="themeLabel">Theme</label>
    <select id="theme" name="theme">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>

    <button type="submit" id="installButton">Install Wiki</button>
  </form>

  <p class="small">No data is stored externally. This is a secure, offline-only simulation.</p>

<script>
  document.getElementById('installer-form').addEventListener('submit', function (e) {
    e.preventDefault(); // Stop the form from refreshing the page

    const siteName = document.getElementById('siteName').value.trim();
    const adminUsername = document.getElementById('adminUser').value.trim();
    const mainPageTitle = document.getElementById('mainPageTitle').value.trim();
    const selectedTheme = document.getElementById('theme').value;

    if (!siteName || !adminUsername || !mainPageTitle) {
      alert("Please fill in all fields.");
      return;
    }

    // Save installer config
    localStorage.setItem("mev_siteName", siteName);
    localStorage.setItem("mev_adminUser", adminUsername);
    localStorage.setItem("mev_theme", selectedTheme);
    localStorage.setItem("mev_mainPageTitle", mainPageTitle);

    // Save live app settings (required by index.js logic)
    localStorage.setItem("wiki_theme", selectedTheme);
    localStorage.setItem("wiki_current_user", JSON.stringify({
      name: adminUsername,
      joined: new Date().toISOString(),
      edits: []
    }));

    // Create default page
    const pages = {};
    pages[mainPageTitle] = {
      title: mainPageTitle,
      content: "Welcome to your new MEV Wiki. Edit this page to get started!",
      lastEdited: new Date().toISOString(),
      createdBy: adminUsername
    };
    localStorage.setItem("wiki_pages", JSON.stringify(pages));

    // Redirect to main wiki interface
    window.location.href = "index.html";
  });
</script>

</body>
</html>
