<!DOCTYPE html>
<html lang="en">
	<head>
		<title>MEV Wiki 3D Map & Game</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="./files/main.css">
<style>
.infobox {
      position: fixed;
	  top: 250px;
    }

/* New container for the embedded control panel */
#play-controls-container {
    position: fixed;
    top: 0; 
    left: 0;
    width: 100%; 
    height: 100%;
    background: transparent;
    z-index: 100; /* Ensure controls are on top of the 3D scene */
    pointer-events: none; /* Allow clicks to pass through by default */
}

#play-controls-iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    /* Re-enable pointer events for the controls inside the iframe */
    pointer-events: auto; 
}
/* Hide the original info box */
#info { display: none; } 
</style>
	</head>
	<body>
		<div id="play-controls-container">
		    <iframe id="play-controls-iframe" src="/mev/play.html" frameborder="0" scrolling="no"></iframe>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "./examples/build/three.webgpu.js",
					"three/webgpu": "./examples/build/three.webgpu.js",
					"three/tsl": "./examples/build/three.tsl.js",
					"three/addons/": "./examples/jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { color, fog, float, positionWorld, triNoise3D, positionView, normalWorld, uniform } from 'three/tsl';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'; // Added for player model loading

			let camera, scene, renderer, controls;
			let clock = new THREE.Clock();
			
			// --- Game State Variables ---
			let model = null; // The loaded GLTF model (player)
			let mixer = null; // Animation mixer
			let actions = {}; // Animation actions
			let activeAction = null; 
			let orbitMode = false;
			let moveX = 0, moveZ = 0;
			
			let playerScore = 0;
			let playerHealth = 3;
			let gameActive = true;
			
			const playerSpeed = 15; // Speed factor for player movement
			const playerHeight = 5; // Player is at a fixed height above ground
			const playerScale = 5; // Player is scaled up to the size of a building

			// Store building metadata for interaction/exploration
			let buildData = [];
			let buildMesh;
			let lastExploredTitle = null; // To prevent constant notification spam
			
			// --- Cross-Frame Communication Handler ---
			window.addEventListener('message', (event) => {
				// Safety check: In a deployed env, replace '*' with the actual domain of the iframe.
				if (event.origin !== window.location.origin && event.origin !== 'null') {
                    return; 
                }

				if (event.data.type === 'controlMode') {
					// Toggle between walk mode (controls.enabled=false) and orbit mode (controls.enabled=true)
					orbitMode = event.data.orbitMode;
					controls.enabled = orbitMode;
					
					if (orbitMode && model) {
						controls.target.copy(model.position);
					}
					
				} else if (event.data.type === 'move') {
					// Movement input from joystick/keyboard
					moveX = event.data.x;
					moveZ = event.data.z;
				} else if (event.data.type === 'shoot') {
					// Implement actual game shooting logic here
					console.log("Player shot!");
				} else if (event.data.type === 'respawn') {
					respawnPlayer();
				}
			});
			
			// Function to send updated game data (like score/health) to the control panel iframe
			function sendGameDataToControls(message = null, showRespawn = false) {
				const iframe = document.getElementById('play-controls-iframe');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        type: 'gameData',
                        score: playerScore,
                        health: playerHealth
                    }, '*');
                    
                    if (message) {
                        iframe.contentWindow.postMessage({
                            type: 'notification',
                            message: message,
                            showRespawn: showRespawn
                        }, '*');
                    }
                }
			}
			
			function updateAnimations() {
				// Choose between Walking/Idle based on movement input
				const isMoving = Math.abs(moveX) > 0.01 || Math.abs(moveZ) > 0.01;
				const actionName = isMoving ? 'Walking' : 'Idle';

				if (model && activeAction && activeAction.getClip().name !== actionName) {
					fadeToAction(actionName, 0.5);
				}
			}
			
			function fadeToAction( name, duration ) {
				const previousAction = activeAction;
				activeAction = actions[ name ];

				if ( previousAction !== activeAction ) {
					previousAction.fadeOut( duration );
				}

				activeAction
					.reset()
					.setEffectiveTimeScale( 1 )
					.setEffectiveWeight( 1 )
					.fadeIn( duration )
					.play();
			}
			
			function respawnPlayer() {
				playerHealth = 3;
				gameActive = true;
				if (model) {
					model.position.set(0, playerHeight, 0); // Reset player position
				}
				sendGameDataToControls("Respawned!", false);
			}

			// --- Three.js Init/Setup ---
			init();

			function init() {

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 600 );
				camera.position.set( 30, 30, 30 ); // Initial high view
				camera.lookAt(0, 0, 0);

				scene = new THREE.Scene();

				// --- Fog and Background (Keep original TSL logic) ---
				const skyColor = color( 0xf0f5f5 );
				const groundColor = color( 0xd0dee7 );
				const fogNoiseDistance = positionView.z.negate().smoothstep( 0, camera.far - 300 );
				const distance = fogNoiseDistance.mul( 20 ).max( 4 );
				const alpha = .98;
				const groundFogArea = float( distance ).sub( positionWorld.y ).div( distance ).pow( 3 ).saturate().mul( alpha );
				const timer = uniform( 0 ).onFrameUpdate( ( frame ) => frame.time );
				const fogNoiseA = triNoise3D( positionWorld.mul( .005 ), 0.2, timer );
				const fogNoiseB = triNoise3D( positionWorld.mul( .01 ), 0.2, timer.mul( 1.2 ) );
				const fogNoise = fogNoiseA.add( fogNoiseB ).mul( groundColor );
				scene.fogNode = fog( fogNoiseDistance.oneMinus().mix( groundColor, fogNoise ), groundFogArea );
				scene.backgroundNode = normalWorld.y.max( 0 ).mix( groundColor, skyColor );

				// --- Builds (Data Stub) ---
				const buildWindows = positionWorld.y.mul( 10 ).floor().mod( 4 ).sign().mix( color( 0x000066 ).add( fogNoiseDistance ), color( 0xffffff ) );
				const buildGeometry = new THREE.BoxGeometry( 1, 1, 1 );
				const buildMaterial = new THREE.MeshPhongNodeMaterial( { colorNode: buildWindows } );

				buildMesh = new THREE.InstancedMesh( buildGeometry, buildMaterial, 4000 );
				scene.add( buildMesh );

				const dummy = new THREE.Object3D();
				const center = new THREE.Vector3();
				
				// Placeholder data for wiki pages/articles
				const wikiTitles = [
					"Decentralized Finance", "Blockchains", "Smart Contracts", "MEV", 
					"Ethereum", "Solana", "Lido", "Uniswap", "Governance", "The Merge",
					"Proof of Stake", "Validators", "Security", "Risk Analysis", "EIP-1559"
				];
				
				// Generate buildings and store data
				for ( let i = 0; i < buildMesh.count; i ++ ) {
					const scaleY = Math.random() * 7 + .5;

					dummy.position.x = Math.random() * 600 - 300;
					dummy.position.z = Math.random() * 600 - 300;

					const distance = Math.max( dummy.position.distanceTo( center ) * .012, 1 );

					dummy.position.y = .5 * scaleY * distance;
					dummy.scale.x = dummy.scale.z = Math.random() * 3 + .5;
					dummy.scale.y = scaleY * distance;

					dummy.updateMatrix();

					buildMesh.setMatrixAt( i, dummy.matrix );
					
					// Store data associated with this instance for exploration
					buildData.push({
						title: wikiTitles[i % wikiTitles.length],
						height: dummy.scale.y,
						position: dummy.position.clone()
					});
				}

				// --- Lights and Ground (Original) ---
				scene.add( new THREE.HemisphereLight( skyColor.value, groundColor.value, 0.5 ) );

				const planeGeometry = new THREE.PlaneGeometry( 2000, 2000 ); 
				const planeMaterial = new THREE.MeshPhongMaterial( { color: 0x999999 } );
				const ground = new THREE.Mesh( planeGeometry, planeMaterial );
				ground.rotation.x = - Math.PI / 2;
				ground.scale.multiplyScalar( 3 );
				ground.castShadow = true;
				ground.receiveShadow = true;
				scene.add( ground );

				// --- Renderer ---
				renderer = new THREE.WebGPURenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				document.body.appendChild( renderer.domElement );

				// --- Controls ---
				controls = new OrbitControls( camera, renderer.domElement );
				controls.target.set( 0, playerHeight, 0 ); // Initial look target is the player's ground height
				controls.minDistance = 7;
				controls.maxDistance = 600;
				controls.maxPolarAngle = Math.PI / 2;
				controls.enabled = false; // Start in walk mode
				controls.update();

				window.addEventListener( 'resize', resize );
				
				// --- Player Model Loading ---
				loadPlayerModel();
				
				// Start the animation loop
				renderer.setAnimationLoop( animate );
			}

			function loadPlayerModel() {
				const loader = new GLTFLoader();
				loader.load('./examples/models/gltf/RobotExpressive/RobotExpressive.glb', function (gltf) {
					model = gltf.scene;
					
					// 1. Set Scale: Robot player size of a building 
					model.scale.set(playerScale, playerScale, playerScale); 
					
					// 2. Set Initial Position
					model.position.set(0, playerHeight, 0); // Player on the ground
					
					scene.add(model);
					
					// 3. Setup Animations
					mixer = new THREE.AnimationMixer(model);
					gltf.animations.forEach(clip => {
						actions[clip.name] = mixer.clipAction(clip);
					});
					
					// Start with Idle animation
					activeAction = actions['Idle'];
					activeAction.play();
					
					sendGameDataToControls(); // Initial UI update
				}, undefined, function ( e ) {
					console.error( 'Error loading player model:', e );
				});
			}

			function resize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}
			
			// Update Camera Position and Player Movement (The "Walk Mode" logic)
			function updatePlayerAndCamera(dt) {
				if (!model) return;
				
				const isMoving = Math.abs(moveX) > 0.01 || Math.abs(moveZ) > 0.01;
				
				if (isMoving) {
					// --- 1. Player Movement ---
					
					const moveVector = new THREE.Vector3(moveX, 0, moveZ);
					moveVector.normalize();
					
					// Get the current camera's Y-rotation (horizontal direction)
					const camDirection = camera.getWorldDirection(new THREE.Vector3());
					camDirection.y = 0;
					camDirection.normalize();
					const angle = Math.atan2(camDirection.x, camDirection.z);
					
					// Rotate movement vector by camera's current yaw angle
					moveVector.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
					
					// Apply movement to model position
					model.position.addScaledVector(moveVector, playerSpeed * dt);
					
					// Rotate player model to face the direction of movement
					const targetAngle = Math.atan2(moveVector.x, moveVector.z);
					model.rotation.y = THREE.MathUtils.lerp(model.rotation.y, targetAngle, 0.1);

				}
				
				// Clamp player position to ground (Y-axis)
				model.position.y = playerHeight;
				
				// --- 2. Camera Follow ---
				
				// Calculate camera position relative to the player
				const cameraOffset = new THREE.Vector3(0, 20, -30); // View from high behind
				
				// Get the player's rotation
				const tempQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), model.rotation.y);
				cameraOffset.applyQuaternion(tempQuat);
				
				const targetPosition = model.position.clone().add(cameraOffset);
				
				// Smoothly move the camera
				camera.position.lerp(targetPosition, 0.05);
				
				// Smoothly update the point the camera is looking at (slightly ahead of the player)
				const lookAtTarget = model.position.clone().add(new THREE.Vector3(0, 10, 0));
				controls.target.lerp(lookAtTarget, 0.1);
				camera.lookAt(controls.target);

				updateAnimations();
				checkBuildingInteraction();
			}

			function checkBuildingInteraction() {
				if (!model) return;
				
				const playerPos = model.position;
				let closestBuilding = null;
				let minDistance = Infinity;
				const interactionRadius = 25; // Define how close the player must be

				for (let i = 0; i < buildData.length; i++) {
					const data = buildData[i];
					const distance = playerPos.distanceTo(data.position);
					
					if (distance < minDistance) {
						minDistance = distance;
						closestBuilding = data;
					}
				}
				
				// If the player is close enough, display the wiki article title
				if (closestBuilding && minDistance < interactionRadius) {
					if (closestBuilding.title !== lastExploredTitle) {
						const message = `Exploring: ${closestBuilding.title} (Height: ${closestBuilding.height.toFixed(1)} units)`;
						sendGameDataToControls(message);
						lastExploredTitle = closestBuilding.title;
					}
				} else if (minDistance >= interactionRadius && lastExploredTitle !== null) {
					// Clear the message when the player moves away
					sendGameDataToControls("Score: " + playerScore);
					lastExploredTitle = null;
				}
			}

			function animate() {
				const dt = clock.getDelta();
				
				if (mixer) mixer.update(dt);

				if (orbitMode) {
					controls.update();
				} else {
					updatePlayerAndCamera(dt); 
				}

				renderer.render( scene, camera );
			}

		</script>
	</body>
</html>
