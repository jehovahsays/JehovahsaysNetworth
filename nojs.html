<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEV Wiki</title>
  <meta name="description" content="MEV Wiki – Offline Encyclopedia. Learn, edit, explore." />
  <meta name="theme-color" content="#3366cc" />
  <meta name="color-scheme" content="light dark" />

  <style>
  html, body {
  overflow: hidden;
  height: 100%;
  width: 100%;
}

#main {
  overflow-y: auto;
  overflow-x: hidden;
  height: 80%;
  width: 100%;
}

#page-container {
  overflow: auto;
  height: 100%;
  width: 100%;
}
    /* ========== MEV Wiki Style (Hardened) ========== */
    * { box‑sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", Arial, sans‑serif;
      background: #fff;
      color: #000;
      transition: background 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    header {
      background: #3366cc;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }
    /* --- MODIFIED: menu-btn is now a label for the checkbox --- */
    #menu-btn {
      font-size: 28px;
      background: transparent;
      color: white;
      border: none;
      margin-right: 15px;
      cursor: pointer;
    }
    #menu-btn:focus, button:focus, input:focus, textarea:focus {
      outline: 2px solid #3366cc;
      outline-offset: 2px;
      border-color: #3366cc;
    }
    [hidden],[aria-hidden="true"],.invisible,.offscreen {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
      height: 0 !important;
      width: 0 !important;
      overflow: hidden !important;
    }
    .noselect { user-select: none; }
    .readonly { pointer-events: none; user-select: none; opacity: 0.6; }
    header h1 { margin: 0; font-size: 1.5rem; }

    #banner {
      background: #ffcc00;
      color: #000;
      padding: 10px;
      text-align: center;
      display: none;
      font-weight: bold;
    }

    #container {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 100px);
    }
    #sidebar {
      width: 250px;
      background: #f8f9fa;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      /* Original JS-controlled display: none; will be overridden by .js-sidebar-closed */
      display: none; 
    }
    #sidebar ul { list-style: none; padding: 0; }
    #sidebar li { margin: 5px 0; }
    #sidebar a {
      color: #3366cc;
      text-decoration: none;
      word-break: break-word;
    }
    #sidebar a:hover { text-decoration: underline; }

    #main {
      flex: 1 1 100%;
      padding: 20px;
      overflow-y: auto;
    }
    #ai-bar {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
	  margin-top: 10px; /* new line added */
    }
#ai-input {
  flex: 1;
  padding: 6px;
  font-size: 14px;
  border-radius: 4px;
  border: 1px solid #ccc;
}

#ai-button {
  margin-left: 6px;
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 4px;
  border: none;
  background: #fff;
  color: #3366cc;
  cursor: pointer;
    }
    #ai-button:hover { background: #254a9e; }

    section.page { margin-bottom: 40px; }
    section.page h2 {
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }
    section.page .content {
      margin-top: 10px;
      white-space: pre-wrap;
    }
    textarea.editor {
      width: 100%;
      height: 200px;
      padding: 10px;
      font-size: 16px;
      font-family: monospace;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      margin-top: 10px;
    }
    .edit-btn, .delete-btn {
      background: #3366cc;
      color: white;
      border: none;
      padding: 6px 12px;
      margin-top: 10px;
      margin-right: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .edit-btn:hover, .delete-btn:hover { background-color: #254a9e; }
    .delete-btn { background-color: #cc3333; }
    .delete-btn:hover { background-color: #a60000; }

    footer {
      height: 60px;
      background: #f1f1f1;
      border-top: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    #status-indicator { font-size: 14px; color: #555; }
    #ticker { white-space: nowrap; overflow: hidden; width: 100%; position: relative; }
    #ticker span {
      display: inline-block; padding-left: 100%; animation: scroll-left 20s linear infinite;
    }
    @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }

    #storage-bar {
      margin-top: 10px;
      background: #e9ecef;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
    }
    #storage-bar-inner {
      height: 10px;
      background: #3366cc;
      width: 0%;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: white;
      max-width: 400px;
      margin: 10% auto;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      text-align: left;
    }
    .modal-actions { margin-top: 20px; text-align: right; }

    body.dark {
      background: #121212;
      color: #e0e0e0;
    }
    body.dark header { background: #1f1f1f; }
    body.dark #sidebar {
      background: #1c1c1c;
      border-right: 1px solid #444;
    }
    body.dark #sidebar a { color: #80bfff; }
    body.dark #main { background: #181818; }
    body.dark #ai-button {
      background: #444;
    }
    body.dark #ai-button:hover {
      background: #666;
    }
    body.dark textarea, body.dark input {
      background: #2c2c2c; color: #e0e0e0; border: 1px solid #555;
    }
    body.dark .modal-box { background: #1f1f1f; }
    body.dark .edit-btn, body.dark .delete-btn {
      background: #444;
    }
    body.dark #storage-bar {
      background: #333; border-color: #555;
    }
    body.dark #storage-bar-inner {
      background: #80bfff;
    }
    body.dark footer {
      background: #181818; border-top: 1px solid #444;
    }

    #page-container {
      display: block;
      width: 100%;
      height: auto;
      min-height: calc(100vh - 160px);
      padding: 0 10px 30px 10px;
      overflow-x: hidden;
      overflow-y: auto;
      word-break: break-word;
      background-color: inherit;
      color: inherit;
    }
    body.dark #page-container {
      background-color: #181818;
      color: #e0e0e0;
    }
    #offline-message {
      display: none;
      background: #ffcc00;
      color: #000;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-family: inherit;
      z-index: 9999;
      border-bottom: 1px solid #aaa;
      position: relative;
    }
    body.dark #offline-message {
      background: #665500;
      color: #fff;
      border-bottom-color: #333;
    }
    .semantic-status {
      margin-top: 15px;
      color: green;
      font-weight: bold;
      font-size: 0.95em;
    }

    /* NEW STYLES for Voice/Filter component */
    #quick-filters {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }
    .titleInput button {
      /* Style for the buttons in the new component, inheriting MEV Wiki aesthetics */
      background: #e9ecef; 
      border: 1px solid #ccc;
      padding: 6px 10px;
      margin-top: 5px;
      border-radius: 4px;
      cursor: pointer;
      display: block; 
      width: 100%;
      text-align: left;
      color: #3366cc;
      font-weight: 500;
    }
    .titleInput button:hover {
      background: #d4d8db;
    }
    body.dark .titleInput button {
      background: #2c2c2c;
      color: #80bfff;
      border-color: #555;
    }
    body.dark .titleInput button:hover {
      background: #3c3c3c;
    }
    
    /* --- NEW CSS SECTION FOR NO-JS FALLBACK (CHECKBOX HACK) --- */
    /* Hide the actual checkbox */
    #sidebar-toggle {
      display: none;
    }
    
    /* Default state for sidebar (closed) */
    .js-sidebar-closed #sidebar {
        display: none;
        flex: 0 0 0;
    }
    /* Default state for main content (full width) */
    .js-sidebar-closed #main {
        flex: 1 1 100%;
    }

    /* State when checkbox is checked (No-JS fallback) */
    #sidebar-toggle:checked ~ #container #sidebar {
      display: block; /* Show sidebar */
    }
    
    /* State when checkbox is checked, main should shrink (No-JS fallback) */
    #sidebar-toggle:checked ~ #container #main {
      flex: 1; /* Allow main to shrink */
    }
    
    /* --- NEW CSS SECTION FOR NO-JS FALLBACK (SEARCH DROPDOWN) --- */
    /* The JS will hide this element if it is active */
    #no-js-quick-links {
        flex: 1;
        margin-left: 6px;
        /* Inherit or match the styling of ai-input/ai-button */
        font-size: 14px;
        padding: 0;
        display: none; /* Hide by default, JS will check for no-JS and show it if necessary */
    }
    
    /* The search bar elements should only be displayed if JS is active */
    #ai-input, #ai-button {
        display: block;
    }
    
    /* If JS is disabled, show the fallback links and hide the JS-dependent search box */
    /* The <noscript> tag will add a class to the body if JS is off, but for a simple file, we'll try to rely on JS hiding it. */
    
    /* Fallback: assuming JS is enabled by default, and we'll use JS to hide the links if it's active. 
       If you want a pure CSS fallback: */
    
    /* If JS is truly absent, we rely on the default HTML/CSS to manage the components.
       Let's assume the JS is robust and handles the show/hide of its elements, 
       and just make sure the <select> element looks okay. */
       
    #no-js-quick-links select {
        padding: 6px;
        font-size: 14px;
        border-radius: 4px;
        border: 1px solid #ccc;
        width: 100%;
        background: #fff;
        color: #000;
    }
    
    body.dark #no-js-quick-links select {
      background: #2c2c2c; color: #e0e0e0; border: 1px solid #555;
    }
    
  </style>
  
</head>
<body>

<div id="banner" class="banner"></div>

<div id="offline-message">
  ⚠️ You’re offline. Some features may be unavailable.
</div>

<input type="checkbox" id="sidebar-toggle" aria-hidden="true" class="offscreen" />

<header>
  <label for="sidebar-toggle" id="menu-btn" aria-label="Toggle menu navigation">☰</label>
  <div id="ai-bar">
    <input 
      type="text" 
      id="ai-input" 
      placeholder="search or speak your query…" 
      aria-label="Search or question input"
      onkeyup="titleInput()" 
      x-webkit-speech 
    >
    <button id="ai-button">Search</button>
    
    <form id="no-js-quick-links" action="" method="get">
        <select onchange="window.location.hash = this.value; window.location.reload()">
            <option value="">Select a Page or Link...</option>
            <option value="main">Main Page</option>
            <option value="recent">Recent Changes</option>
            <option value="settings">Settings</option>
            <option value="about">About</option>
            <option value="Formatting Examples">Formatting Help</option>
            </select>
    </form>
    
  </div>
</header>

<div id="container">
  <nav id="sidebar">
    <div id="auth-links">
      <div id="user-status">Not logged in</div>
      <a href="#create" id="create-account-link">Create Account</a><br>
      <a href="#login" id="login-link">Log In</a><br>
      <a href="#profile" id="profile-link">My Profile</a><br>
      <a href="#logout" id="logout-link" style="display:none;">Log Out</a>
    </div>

    <h3>Pages</h3>
    <ul id="page-list"></ul>
    <button id="create-page-btn">+ New Page</button>
    <button id="wiki-help-btn">Wiki Formatting Help</button>

    <hr />
    <ul>
      <li><a href="#main" id="main-page-link">Main Page</a></li>
      <li><a href="#recent" id="recent-link">Recent Changes</a></li>
      <li><a href="#settings" id="settings-link">Settings</a></li>
      <li><a href="#about" id="about-link">About</a></li>
	  </ul>

    <h3>Quick Filters (Voice Enabled)</h3>
    <ul id="quick-filters">
        <li class="titleInput"><button onclick="showRecent()">Recent Changes</button></li>
        <li class="titleInput"><button onclick="showSettings()">Settings</button></li>
        <li class="titleInput"><button onclick="showAbout()">About</button></li>
        <li class="titleInput"><button onclick="showPage('Formatting Examples')">Formatting Help</button></li>
    </ul>

    <div id="storage-bar">
      <div id="storage-bar-inner"></div>
    </div>
  </nav>

  <main id="main">

    <div id="page-container"></div>
  </main>
</div>

<footer>
</footer>

<div id="auth-modal" class="modal-overlay">
</div>

<script>
  // ... (Existing JS code) ...
  
  // ==========================================================
  // MODIFIED: Initial DOM Content Loaded setup
  // ==========================================================
  
  document.addEventListener('DOMContentLoaded', () => {
    // Add a class to the body to indicate JS is active
    document.body.classList.add('js-active');
    
    // Hide the No-JS quick links and show the JS-powered search bar
    const noJsLinks = document.getElementById('no-js-quick-links');
    const aiInput = document.getElementById('ai-input');
    const aiButton = document.getElementById('ai-button');
    if (noJsLinks) noJsLinks.style.display = 'none';
    if (aiInput) aiInput.style.display = 'block';
    if (aiButton) aiButton.style.display = 'block';
    
    // ... (rest of DOMContentLoaded remains the same) ...

    applyThemeFromStorage();
    restoreSidebarState();
    setupAuth();
    restoreSidebarState();
    updateConnectionStatus();
    updateStorageBar();
    createExampleWikiPage();
    ensureMainPage();
    
    // ... (rest of DOMContentLoaded remains the same) ...

    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('hashchange', () => {
      const h = location.hash.slice(1);
      if (h === "main") showPage("Main Page");
      else if (h === "settings") showSettings();
      else if (h === "about") showAbout();
      else if (h === "recent") showRecent();
      else if (h === "profile") showProfile();
    });

    window.addEventListener('offline', updateConnectionStatus);

    // REMOVED: document.getElementById('menu-btn')?.addEventListener('click', toggleSidebar); 
    // The toggleSidebar function is still used by the sidebar state restoration, but the click listener is now CSS-only.
    // We add a listener to ensure the JS functionality still works on top of the CSS fallback
    document.getElementById('menu-btn')?.addEventListener('click', toggleSidebar);

    // Updated listener to use the ai-input field
    document.getElementById('ai-button')?.addEventListener('click', () => {
      const inp = document.getElementById('ai-input');
      if (inp && inp.value.trim()) {
        answerAI(inp.value.trim());
        inp.value = '';
      }
    });
	
	  document.addEventListener("DOMContentLoaded", () => {
    const redirected = sessionStorage.getItem("redirected");
    const hashEmpty = !location.hash || location.hash === "#";
    const mainEl = document.getElementById("main");

    if (!redirected && hashEmpty && mainEl) {
      sessionStorage.setItem("redirected", "1");
      location.hash = "#main";
    }
  });
	
    // Updated listener to use the ai-input field
    document.getElementById('ai-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('ai-button')?.click();
      }
    });
	

document.getElementById('main-page-link')?.addEventListener('click', e => {
  e.preventDefault();
  showPage("Main Page");
  resetHashAndScroll("#main");
});

document.getElementById('recent-link')?.addEventListener('click', e => {
  e.preventDefault();
  showRecent();
  resetHashAndScroll("#recent");
});

document.getElementById('settings-link')?.addEventListener('click', e => {
  e.preventDefault();
  showSettings();
  resetHashAndScroll("#settings");
});

document.getElementById('about-link')?.addEventListener('click', e => {
  e.preventDefault();
  showAbout();
  resetHashAndScroll("#about");
});

document.getElementById('create-page-btn')?.addEventListener('click', e => {
  e.preventDefault();
  createPage();
});
    document.getElementById('profile-link')?.addEventListener('click', e => { e.preventDefault(); showProfile(); });
    document.getElementById('wiki-help-btn')?.addEventListener('click', e => {
  e.preventDefault();
  showPage("Formatting Examples");
});
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('✅ Service Worker registered'))
        .catch(err => console.error('❌ SW registration failed:', err));
    }
    
    // Initial page load based on hash
    const initialHash = location.hash.slice(1);
    if (initialHash) {
      if (initialHash === "main") showPage("Main Page");
      else if (initialHash === "settings") showSettings();
      else if (initialHash === "about") showAbout();
      else if (initialHash === "recent") showRecent();
      else if (initialHash === "profile") showProfile();
      else showPage(initialHash); // Attempt to load a wiki page by hash
    } else {
        showPage(localStorage.getItem("mev_mainPageTitle") || "Main Page");
    }
    
    // This is the fallback for JS-disabled state. If JS is active, it adds 'js-active'.
    // If you want a more robust solution, wrap the JS-dependent content in <noscript> tags.
    // For now, we will add 'js-sidebar-closed' to the body initially and let JS remove it/toggle it.
    // To ensure a closed state by default when JS is available:
    document.body.classList.add('js-sidebar-closed');

  });
  
  // Also updating restoreSidebarState and toggleSidebar to handle the 'js-active' class gracefully
  function restoreSidebarState() {
    const open = localStorage.getItem(STORAGE_KEYS.sidebar) === 'open';
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    if (sidebar && main) {
      // When JS is active, we use the display property for dynamic control and store state
      if (document.body.classList.contains('js-active')) {
          sidebar.style.display = open ? 'block' : 'none';
          main.style.flex = open ? '1' : '1 1 100%';
          document.body.classList.toggle('js-sidebar-closed', !open); // Keep the CSS hack in sync
      } else {
          // No-JS mode relies on CSS/Checkbox, no need for inline styles on load
      }
    }
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    if (!sidebar || !main) return;
    
    // Only proceed with JS toggle if JS is detected
    if (document.body.classList.contains('js-active')) {
        const isOpen = sidebar.style.display === 'block';
        if (isOpen) {
          sidebar.style.display = 'none';
          main.style.flex = '1 1 100%';
          localStorage.setItem(STORAGE_KEYS.sidebar, 'closed');
          document.body.classList.add('js-sidebar-closed');
        } else {
          sidebar.style.display = 'block';
          main.style.flex = '1';
          localStorage.setItem(STORAGE_KEYS.sidebar, 'open');
          document.body.classList.remove('js-sidebar-closed');
        }
    }
  }

</script>



<script>
document.addEventListener("DOMContentLoaded", () => {
  // ... (same as original to handle initial load) ...
});
</script>

</body>
</html>
