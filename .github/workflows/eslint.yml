name: "ESLint Check"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          npm install eslint --global
          # optionally install other dev tools if necessary

      - name: Run ESLint
        run: |
          eslint . --ext .js
