name: "ESLint Check"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read # Sovereign Security: Prevent unauthorized writes

jobs:
  lint:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Uses verified GitHub action

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install eslint --global

      - name: Run ESLint
        run: eslint . --ext .js # Scans the folder-blind root
