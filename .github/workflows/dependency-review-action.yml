name: "Dependency Review"

on:
  pull_request:
    types: [ opened, synchronize ]
    branches: [ main ]

# Secure the environment by only allowing read access to the AI's "internal" code
permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      # Use v4 to keep it stable with your current configuration
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          # FIXED: 'security-severity-threshold' is now 'fail-on-severity'
          fail-on-severity: 'high'
          
          # Optional: Add this to bypass checks if the GitHub-crawlers/Dependabot 
          # are having trouble with your self-hosted firewall whitelist
          retry-on-snapshot-warnings: true
