# .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: "github-actions"
    [span_1](start_span)directory: "/"  # Root directory logic[span_1](end_span)
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"  
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
