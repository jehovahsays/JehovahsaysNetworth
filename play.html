<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Controls</title>
	<style>
        body { 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
            background: transparent; /* Make background transparent */
        }
        
        /* Joystick */
        #joystick {
            position: fixed;
            bottom: 50px;
            left: 50px;
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.6); 
            border-radius: 50%;
            touch-action: none;
            z-index: 10;
        }

        #joystick-handle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 255, 0.8);
            border-radius: 50%;
            left: 30px;
            top: 30px;
            transition: 0.1s;
        }
        
        /* Orbital Controls UI */
        #orbit-controls-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 10;
            display: none; /* Hide until orbit mode is on */
        }

        /* Toggle button for orbit mode */
        #orbit-toggle {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            border: none;
            z-index: 10;
            cursor: pointer;
        }
        
        /* Score and Health UI */
        #scoreDisplay, #healthDisplay, #notification {
            position: fixed;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
            left: 10px;
            z-index: 10;
            min-width: 150px;
        }
        #scoreDisplay { 
            bottom: 10px;
            font-size: 18px;
        }
        #healthDisplay { 
            bottom: 45px; 
            font-size: 18px;
        }
        #notification {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            display: none;
            text-align: center;
        }
        #respawnButton {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 20px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 11;
            display: none;
        }
    </style>
</head>

<body>  
    <button id="orbit-toggle">Orbit Mode: OFF</button>
    
    <div id="scoreDisplay">Score: 0</div>
    
    <div id="healthDisplay">Health: 3</div>

    <div id="notification"></div>
    
    <button id="respawnButton" style="display:none;">Respawn</button>

    <div id="orbit-controls-info">
        <a href="/" target="_top" rel="noopener"><button>home</button></a><br><br>
        Orbital Controls:<br>
         1 finger: Rotate<br>
         2 fingers: Zoom<br>
         3 fingers: Pan
    </div>
    
    <div id="joystick">
        <div id="joystick-handle"></div>
    </div>
	
    <script type="module">
        
        let orbitMode = false;
        let moveX = 0, moveZ = 0;
        
        const joystick = document.getElementById('joystick');
        const handle = document.getElementById('joystick-handle');
        const toggleButton = document.getElementById('orbit-toggle');
        const infoPanel = document.getElementById('orbit-controls-info');

        // --- Cross-Frame Communication Setup ---
        
        function sendControlMessage(type, data) {
            // Send control commands to the parent frame (map.html)
            window.parent.postMessage({ type: type, ...data }, '*');
        }
        
        // --- UI Logic and Handlers ---

        function setupOrbitToggle() {
            toggleButton.addEventListener('click', () => {
                orbitMode = !orbitMode;
                toggleButton.textContent = `Orbit Mode: ${orbitMode ? 'ON' : 'OFF'}`;
                
                sendControlMessage('controlMode', { orbitMode: orbitMode });
                
                if (orbitMode) {
                    infoPanel.style.display = 'block';
                    joystick.style.display = 'none';
                } else {
                    infoPanel.style.display = 'none';
                    joystick.style.display = 'block';
                }
            });
        }
        
        // Joystick Control Logic
        
        joystick.addEventListener("touchstart", (event) => {
            event.preventDefault(); // Prevent touch from interacting with the iframe's parent
            const touch = event.touches[0];
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Set start position relative to the center of the joystick
            joystick.dataset.touchStartX = touch.clientX - centerX;
            joystick.dataset.touchStartY = touch.clientY - centerY;
        });

        joystick.addEventListener("touchmove", (event) => {
            event.preventDefault(); 
            const touch = event.touches[0];
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let diffX = touch.clientX - centerX;
            let diffY = touch.clientY - centerY;

            // Clamp handle movement within the joystick boundary (radius of 50)
            const maxRadius = 50;
            const distance = Math.sqrt(diffX * diffX + diffY * diffY);
            if (distance > maxRadius) {
                diffX = (diffX / distance) * maxRadius;
                diffY = (diffY / distance) * maxRadius;
            }

            // Map clamped position to movement values (-1 to 1)
            moveX = diffX / maxRadius;
            moveZ = diffY / maxRadius; 

            handle.style.transform = `translate(${diffX}px, ${diffY}px)`;
            
            // Send movement data to parent frame (map.html). In Three.js, -Z is usually forward.
            sendControlMessage('move', { x: moveX, z: -moveZ }); 
        });

        joystick.addEventListener("touchend", () => {
            moveX = 0;
            moveZ = 0;
            handle.style.transform = "translate(0px, 0px)";
            
            // Send stop movement command
            sendControlMessage('move', { x: 0, z: 0 });
        });
        
        // Keyboard control for Desktop (sends same messages as joystick)
        document.addEventListener('keydown', (event) => {
            const keyMap = {
                'KeyW': { axis: 'z', value: 1 },
                'KeyS': { axis: 'z', value: -1 },
                'KeyA': { axis: 'x', value: -1 },
                'KeyD': { axis: 'x', value: 1 },
            };
            
            if (keyMap[event.code]) {
                const key = keyMap[event.code];
                if (key.axis === 'x') moveX = key.value;
                if (key.axis === 'z') moveZ = key.value;
                sendControlMessage('move', { x: moveX, z: -moveZ });
            }
            
            if (event.code === 'Space') {
                 sendControlMessage('shoot', {});
            }
        });
        
        document.addEventListener('keyup', (event) => {
            const keyMap = {
                'KeyW': { axis: 'z' },
                'KeyS': { axis: 'z' },
                'KeyA': { axis: 'x' },
                'KeyD': { axis: 'x' },
            };
            
            if (keyMap[event.code]) {
                // If the key released is for an axis, stop movement on that axis
                if (keyMap[event.code].axis === 'x') moveX = 0;
                if (keyMap[event.code].axis === 'z') moveZ = 0;
                sendControlMessage('move', { x: moveX, z: -moveZ });
            }
        });
        
        // Listen for data updates from the parent/game frame (map.html)
        window.addEventListener('message', (event) => {
            if (event.data.type === 'gameData') {
                updateUI(event.data.score, event.data.health);
            } else if (event.data.type === 'notification') {
                showNotification(event.data.message, event.data.showRespawn);
            }
        });
        
        function updateUI(score, health) {
            const scoreElement = document.getElementById('scoreDisplay');
            const healthElement = document.getElementById('healthDisplay');
            if (scoreElement) scoreElement.textContent = `Score: ${score}`;
            if (healthElement) healthElement.textContent = `Health: ${health}`;
        }
        
        function showNotification(message, showRespawn = false) {
            const notificationElement = document.getElementById('notification');
            const respawnButton = document.getElementById('respawnButton');
            
            if (notificationElement) {
                notificationElement.textContent = message;
                notificationElement.style.display = 'block';
                
                if (showRespawn) {
                    respawnButton.style.display = 'block';
                    respawnButton.onclick = () => {
                        sendControlMessage('respawn', {});
                        respawnButton.style.display = 'none';
                        notificationElement.style.display = 'none';
                    }
                } else {
                    respawnButton.style.display = 'none';
                    // Hide after 3 seconds
                    setTimeout(() => {
                        notificationElement.style.display = 'none';
                    }, 3000);
                }
            }
        }

        setupOrbitToggle();
        
    </script>
 
</body>
</html>
