    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        
        .joystick-container {
            position: fixed;
            bottom: 50px;
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            touch-action: none;
            z-index: 10;
        }

        #joystick-left { left: 50px; }
        #joystick-right { right: 50px; }

        .handle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 255, 0.8);
            border-radius: 50%;
            left: 30px;
            top: 30px;
        }

        #handle-right { background: rgba(255, 0, 0, 0.8); }

        #fire-button {
            position: fixed;
            bottom: 180px;
            right: 70px;
            width: 70px;
            height: 70px;
            background: rgba(255, 69, 0, 0.8);
            border: 3px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-family: Arial;
            z-index: 15;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #orbit-controls-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 100;
        }

        .lil-gui { z-index: 2 !important; }

        @media all and ( max-width: 640px ) {
            .lil-gui.root { 
                right: 0px;
                top: auto;
                max-height: 100%;
                max-width: 30%;
                bottom: 0px;
            }
        }
    </style>
	
	
    <script>
    (function () {
      function showError(msg) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = '#ff4c4c';
        errorDiv.style.color = 'white';
        errorDiv.style.fontFamily = 'Arial, sans-serif';
        errorDiv.style.padding = '15px';
        errorDiv.style.zIndex = '9999';
        errorDiv.style.textAlign = 'center';
        errorDiv.textContent = msg;
        document.body.appendChild(errorDiv);
      }

      const canvas = document.createElement('canvas');
      const webgl = !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
      if (!webgl) {
        document.addEventListener('DOMContentLoaded', () => showError('WebGL not supported.'));
      }
      if (!navigator.gpu) {
        document.addEventListener('DOMContentLoaded', () => showError('WebGPU not supported.'));
      }
    })();
    </script>	
	
	  <script src="./a.js" defer></script>  

</head>

<body>  
    <div id="info"></div>
    <div id="orbit-controls-info">
        <a href="./index.html#search" target="_blank" rel="noopener"><button class="infobox">home</button></a>
    </div>
        
    <div id="joystick-left" class="joystick-container"><div id="handle-left" class="handle"></div></div>
    <div id="joystick-right" class="joystick-container"><div id="handle-right" class="handle"></div></div>
    <button id="fire-button">FIRE</button>
	
    <script type="importmap">
        {
            "imports": {
                "three": "./examples/build/three.module.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import Stats from 'three/addons/libs/stats.module.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let container, clock, gui, mixer, actions, activeAction, previousAction, camera, scene, renderer, model;
        let moveX = 0, moveZ = 0, lookX = 0, lookY = 0, characterRotationY = 0; 
        let orbitControls, orbitMode = false;
        let playerScore = 0, playerHealth = 3, playerSize = 1.0;
        let bullets = [], boss = null, bossHealth = 5, bossAttackTimer = 0, gameActive = true;

        const api = { state: 'Walking' };

        function loadout() {
            window.location.href = './css.html';
        }
		
function createUsername(text, color) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 256; canvas.height = 64;
    ctx.font = 'Bold 40px Arial';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 45);
    const texture = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
    sprite.scale.set(4, 1, 1);
    return sprite;
}
		

        function createBoss() {
            const geometry = new THREE.BoxGeometry(5, 5, 5);
            const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            boss = new THREE.Mesh(geometry, material);
            boss.position.set(0, 5, -20);
			
    const label = createUsername('a.js', '#ff0000');
    label.position.y = 4; // Positions it above the cube
    boss.add(label);
			
            scene.add(boss);
            bossHealth = 5;
        }

  		
		
        function createBullet(position, direction) {
            const geometry = new THREE.SphereGeometry(0.5, 8, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const bullet = new THREE.Mesh(geometry, material);
            bullet.position.set(position.x, position.y + 2, position.z);
            bullet.direction = direction.normalize();
            bullet.speed = 2.0;
            bullet.isPlayerBullet = true;
            scene.add(bullet);
            bullets.push(bullet);
        }

        function createBossBullet() {
            if (!boss || !gameActive || !model) return;
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff4500 }));
            bullet.position.copy(boss.position);
            const direction = new THREE.Vector3().subVectors(model.position, boss.position).normalize();
            bullet.direction = direction;
            bullet.speed = 1.0;
            bullet.isPlayerBullet = false;
            scene.add(bullet);
            bullets.push(bullet);
        }

function updateBullets(deltaTime) {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.position.addScaledVector(bullet.direction, bullet.speed);
        
        if (model && bullet.position.distanceTo(model.position) > 100) {
            scene.remove(bullet);
            bullets.splice(i, 1);
            continue;
        }
        
        if (bullet.isPlayerBullet) {
            if (boss && bullet.position.distanceTo(boss.position) < 3) {
                bossHealth--;
                scene.remove(bullet);
                bullets.splice(i, 1);
                
                if (bossHealth <= 0) {
                    // Start Win Sequence
                    gameActive = false; 
                    scene.remove(boss);
                    boss = null;
                    
                    playerScore += 10;
                    updateUI(); // Ensure final score is displayed
                    
                    showNotification("Victory! Redirecting...");
                    
                    // Redirect to index.html
                    setTimeout(() => {
                        window.location.href = './index.html#search';
                    }, 2000); 
                }
            }
        } else {
            if (model && bullet.position.distanceTo(model.position) < 2) {
                playerHealth--;
                scene.remove(bullet);
                bullets.splice(i, 1);
                if (playerHealth <= 0) {
                    gameActive = false;
                    loadout(); 
                }
            }
        }
    }
}

        function updateBoss(deltaTime) {
            if (!boss || !gameActive || !model) return;
            boss.position.y = 5 + Math.sin(Date.now() * 0.001) * 2;
            boss.position.x = Math.sin(Date.now() * 0.0005) * 10;
            boss.lookAt(model.position);
            bossAttackTimer += deltaTime;
            if (bossAttackTimer > 2) { 
                createBossBullet();
                bossAttackTimer = 0;
            }
        }

        function updatePlayerSize() {
            if (model) model.scale.set(playerSize, playerSize, playerSize);
        }

        function createUI() {
            const uiStyle = "position:absolute; color:white; font-family:Arial; font-weight:bold;";
            const score = document.createElement('div');
            score.id = 'scoreDisplay'; score.style = uiStyle + "top:10px; left:10px; font-size:18px;";
            document.body.appendChild(score);
            
            const health = document.createElement('div');
            health.id = 'healthDisplay'; health.style = uiStyle + "top:40px; left:10px; font-size:18px;";
            document.body.appendChild(health);
            
            const notify = document.createElement('div');
            notify.id = 'notification'; notify.style = uiStyle + "top:50%; left:50%; transform:translate(-50%,-50%); display:none; background:rgba(0,0,0,0.7); padding:20px; border-radius:10px;";
            document.body.appendChild(notify);
        }

        function updateUI() {
            document.getElementById('scoreDisplay').textContent = `Score: ${playerScore}`;
            document.getElementById('healthDisplay').textContent = `Health: ${playerHealth}`;
        }

        function showNotification(message) {
            const el = document.getElementById('notification');
            el.textContent = message; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function handlePlayerShoot() {
            if (gameActive && model) {
                const direction = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
                createBullet(model.position.clone(), direction);
            }
        }

        function createCity() {
            const buildingMaterial = new THREE.MeshPhongMaterial({ color: 0x555555 });
            for (let i = 0; i < 50; i++) {
                const h = Math.random() * 10 + 5;
                const b = new THREE.Mesh(new THREE.BoxGeometry(Math.random()*2+1, h, Math.random()*2+1), buildingMaterial);
                b.position.set(Math.random()*100-50, h/2, Math.random()*100-50);
                scene.add(b);
            }
        }

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.25, 100);
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e0e0);
            scene.fog = new THREE.Fog(0xe0e0e0, 20, 100);
            clock = new THREE.Clock();

            const hemi = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 3);
            hemi.position.set(0, 20, 0);
            scene.add(hemi);
            const dir = new THREE.DirectionalLight(0xffffff, 3);
            dir.position.set(0, 20, 10);
            scene.add(dir);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0xcbcbcb, depthWrite: false }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            scene.add(new THREE.GridHelper(200, 40, 0x000000, 0x000000));
            
            createCity();
            new GLTFLoader().load('./examples/models/gltf/RobotExpressive/RobotExpressive.glb', (gltf) => {
                model = gltf.scene;
                scene.add(model);
                createGUI(model, gltf.animations);
                orbitControls = new OrbitControls(camera, renderer.domElement);
                orbitControls.enabled = false;
	
			// ADD THIS:
    const label = createUsername('Guest', '#0033ff');
    label.position.y = 6; // Positions it above the robot's head
    model.add(label);
	
				
            });




		

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            container.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
            createUI();
            createBoss();
            setupDualJoysticks();

            document.addEventListener('keydown', (e) => { if(e.code === 'Space') handlePlayerShoot(); });
            document.addEventListener('mousedown', (e) => {
                if (e.target.tagName !== 'BUTTON' && !e.target.closest('.joystick-container')) handlePlayerShoot();
            });
        }

        function setupDualJoysticks() {
            const leftJoy = document.getElementById('joystick-left'), rightJoy = document.getElementById('joystick-right');
            const leftH = document.getElementById('handle-left'), rightH = document.getElementById('handle-right');

            leftJoy.addEventListener("touchmove", (e) => {
                const r = leftJoy.getBoundingClientRect();
                moveX = (e.touches[0].clientX - (r.left + 50)) / 50;
                moveZ = (e.touches[0].clientY - (r.top + 50)) / 50;
                leftH.style.transform = `translate(${moveX * 25}px, ${moveZ * 25}px)`;
            });

            rightJoy.addEventListener("touchmove", (e) => {
                const r = rightJoy.getBoundingClientRect();
                lookX = (e.touches[0].clientX - (r.left + 50)) / 50;
                lookY = (e.touches[0].clientY - (r.top + 50)) / 50;
                rightH.style.transform = `translate(${lookX * 25}px, ${lookY * 25}px)`;
            });

            document.getElementById('fire-button').addEventListener("touchstart", (e) => { e.preventDefault(); handlePlayerShoot(); });

            const stop = () => { moveX = 0; moveZ = 0; lookX = 0; lookY = 0; leftH.style.transform = rightH.style.transform = "translate(0,0)"; };
            leftJoy.addEventListener("touchend", stop);
            rightJoy.addEventListener("touchend", stop);
        }

        function createGUI(model, animations) {
            gui = new GUI();
            mixer = new THREE.AnimationMixer(model);
            actions = {};
            const states = ['Idle', 'Walking', 'Running', 'Dance', 'Death', 'Sitting', 'Standing'];
            const emotes = ['Jump', 'Yes', 'No', 'Wave', 'Punch', 'ThumbsUp'];
            
            animations.forEach(clip => {
                const action = mixer.clipAction(clip);
                actions[clip.name] = action;
                if (emotes.includes(clip.name) || states.indexOf(clip.name) >= 4) {
                    action.clampWhenFinished = true;
                    action.loop = THREE.LoopOnce;
                }
            });

            const sf = gui.addFolder('States');
            sf.add(api, 'state').options(states).onChange(() => fadeToAction(api.state, 0.5));
            const ef = gui.addFolder('Emotes');
            emotes.forEach(name => {
                api[name] = () => { fadeToAction(name, 0.2); mixer.addEventListener('finished', function restore() {
                    mixer.removeEventListener('finished', restore); fadeToAction(api.state, 0.2);
                });};
                ef.add(api, name);
            });
            activeAction = actions['Walking']; activeAction.play();
        }

        function fadeToAction(name, duration) {
            previousAction = activeAction; activeAction = actions[name];
            if (previousAction !== activeAction) previousAction.fadeOut(duration);
            activeAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(duration).play();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);
            if (model && !orbitMode && gameActive) {
                characterRotationY -= lookX * dt * 3;
                model.rotation.y = characterRotationY;
                const fwd = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
                const side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
                model.position.add(fwd.multiplyScalar(moveZ * dt * -15)).add(side.multiplyScalar(moveX * dt * -15));
                
                const offset = new THREE.Vector3(0, 5, -15).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
                camera.position.lerp(model.position.clone().add(offset), 0.1);
                camera.lookAt(model.position.x, model.position.y + 2, model.position.z);
            }
            updateBullets(dt);
            updateBoss(dt);
            updateUI();
            renderer.render(scene, camera);
        }

        init();
    </script>
	
    



</body>
