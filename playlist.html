<!DOCTYPE html>
<html lang="en" id="playlist">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge;chrome=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="private, no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' blob: https://www.youtube.com; frame-src 'self' https://www.youtube.com; object-src 'none'; style-src 'self' 'unsafe-inline';">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
    }

    /* Standard View (Internal Brain) */
    .conscious-view {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
    }

    /* Playlist View (Triggered by #playlist) */
    .subconscious-playlist {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 999;
    }

    /* CSS Switch Logic */
    #playlist:target .subconscious-playlist {
        display: block;
    }
    #playlist:target .conscious-view {
        display: none;
    }

    .embed-frame {
        width: 100%;
        height: 90%; /* Leaves room for the edit link at bottom */
        border: none;
    }

    .footer-nav {
        height: 10%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        gap: 20px;
    }

    a {
        color: #00d4ff;
        text-decoration: none;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }

    .btn-main {
        padding: 10px 20px;
        border: 1px solid #00d4ff;
        border-radius: 5px;
    }
</style>
<title>AI Subconscious Playlist</title>
</head>
<body>

    <div class="conscious-view">
        <h2>AI Internal Brain</h2>
        <p>The vibe music is currently docked in the subconscious.</p>
        <br>
        <a href="#playlist" class="btn-main">Activate #playlist Vibe</a>
    </div>

    <div class="subconscious-playlist">
        <iframe 
            class="embed-frame"
            src="https://www.youtube.com/embed/videoseries?list=PLwMe8hyy9osI6Ikv_WpwwC9lqGsUABDLv&autoplay=1"
            title="Vibe music I chose For my AI" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
        </iframe>

        <div class="footer-nav">
            <a href="/mev/">⬅ Return to Brain</a>
            <span style="color:#444;">|</span>
            <a href="https://www.youtube.com/playlist?list=PLwMe8hyy9osI6Ikv_WpwwC9lqGsUABDLv&jct=Z6-5a92tjWzb9TneJL3p1w" 
               target="_blank" 
               rel="noopener noreferrer">
               ➕ Add/Edit Videos
            </a>
        </div>
    </div>

</body>
</html>
