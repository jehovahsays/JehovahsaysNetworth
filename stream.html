<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: black;
      font-family: sans-serif;
      overflow: hidden;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    /* Top-left close button */
    .close-button {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 8px 12px;
      font-size: 1.2rem;
      border: none;
      border-radius: 6px;
      z-index: 100;
      text-decoration: none;
    }

    /* Top-center LIVE indicator */
    .live-indicator {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: red;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 6px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 100;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: red;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <a href="./index.html#search" class="close-button">✖</a>

  <div class="live-indicator">
    <div class="dot"></div>
    LIVE
  </div>

  <video id="camera" autoplay playsinline muted></video>

  <script>
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        document.getElementById("camera").srcObject = stream;
      } catch (err) {
        alert("Camera access failed: " + err.message);
      }
    }

    window.addEventListener("load", startCamera);
  </script>

</body>
</html>
