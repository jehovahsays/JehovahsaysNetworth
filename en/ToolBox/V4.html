<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="MEV Wiki – Offline Encyclopedia">
<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
<title>MEV Wiki - Main Page</title>

<script type="text/javascript" src="TagCloud.js"></script>

<style>
    /* =========================================
       GLOBAL RESET & SHARED STYLES (NOW DEFAULT APP STYLES)
       ========================================= */
    * { box-sizing: border-box; }
    /* Default Body now matches the App View look */
    html, body { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        font-family: system-ui, sans-serif; /* Default font */
        background-color: #fff; /* Default background */
        color: #000; /* Default text color */
        overflow: hidden; 
        transition: background 0.3s ease;
    }
    
    /* Dark Mode Body */
    body.dark { background-color: #121212; color: #e0e0e0; }

    /* Helper Classes */
    .hidden { display: none !important; }
    .js-only { display: none; }
    html.js .js-only { display: block; }
    
    /* Removed all styles related to #landing-view */

    /* =========================================
       WIKI APP (The Application)
       ========================================= */
    #app-view {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; /* Displayed by default now */
        flex-direction: column;
        z-index: 50;
    }

    /* Header */
    header {
        background: #3366cc; color: white; padding: 10px 15px;
        display: flex; align-items: center; justify-content: space-between; height: 60px;
        flex-shrink: 0;
    }
    body.dark header { background: #1f1f1f; }

    #app-search-bar { flex-grow: 1; margin: 0 15px; display: flex; max-width: 600px; }
    #app-input { flex: 1; padding: 8px; border: none; border-radius: 4px 0 0 4px; }
    #app-search-btn { padding: 8px 15px; background: #ffcc00; border: none; border-radius: 0 4px 4px 0; cursor: pointer; color: black; font-weight: bold; }

    /* Layout */
    #app-container { display: flex; flex: 1; overflow: hidden; position: relative; }
    
    /* Sidebar */
    #sidebar {
        width: 250px; background: #f8f9fa; border-right: 1px solid #ccc;
        padding: 10px; overflow-y: auto; display: block; /* Ensure sidebar is visible by default on desktop */
        flex-shrink: 0;
    }
    body.dark #sidebar { background: #1c1c1c; border-right: 1px solid #444; }
    #sidebar a { display: block; padding: 5px; color: #3366cc; text-decoration: none; }
    body.dark #sidebar a { color: #80bfff; }

    /* Main Content */
    #main-content { flex: 1; padding: 20px; overflow-y: auto; background-color: inherit; }
    
    /* Content Styling */
    .page h2 { border-bottom: 2px solid #ccc; padding-bottom: 5px; }
    .edit-btn, .delete-btn { padding: 8px 12px; border: none; border-radius: 4px; color: white; cursor: pointer; margin-top: 10px; margin-right: 5px; }
    .edit-btn { background: #3366cc; }
    .delete-btn { background: #cc3333; }
    
    textarea.editor { width: 100%; height: 300px; padding: 10px; font-family: monospace; border: 1px solid #ccc; background: inherit; color: inherit; }

    /* Footer */
    footer { background: #f1f1f1; padding: 5px 10px; font-size: 12px; display: flex; justify-content: space-between; border-top: 1px solid #ccc; }
    body.dark footer { background: #1f1f1f; border-top: 1px solid #444; }

    /* Responsive */
    @media (max-width: 700px) {
        /* Hide sidebar by default on mobile */
        #sidebar { position: absolute; top: 0; left: 0; height: 100%; z-index: 200; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: none;} 
    }
</style>

<script>
    // JS Detection immediately
    document.documentElement.className = document.documentElement.className.replace("no-js", "js");
</script>
</head>

<body>

    <div id="app-view">
        <header>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
            <div id="app-search-bar">
                <input id="app-input" type="text" placeholder="Search Wiki or Create New Page..." x-webkit-speech onkeyup="if(event.key==='Enter') answerAI(this.value)">
                <button id="app-search-btn" onclick="answerAI(document.getElementById('app-input').value)">Go</button>
            </div>
        </header>

        <div id="app-container">
            <nav id="sidebar">
                <div style="margin-bottom:15px; font-weight:bold; color:#3366cc;">MEV Wiki Nav</div>
                <a href="#Main Page" onclick="openApp('#Main Page')">🏠 Home / Main Page</a>
                <a href="#recent" onclick="openApp('#recent')">🕒 Recent Changes</a>
                <a href="#settings" onclick="openApp('#settings')">⚙️ Settings</a>
                <a href="#about" onclick="openApp('#about')">ℹ️ About</a>
                <hr>
                <div id="sidebar-page-list"></div>
                <button class="edit-btn" style="width:100%; margin-top:10px;" onclick="createPage()">+ New Page</button>
            </nav>

            <main id="main-content">
                </main>
        </div>

        <footer>
            <span id="status-indicator">🟢 Online</span>
            <span>MEV Wiki v2.1</span>
        </footer>
    </div>

    <script>
        const DB_KEY = "mev_wiki_pages";
        const HIST_KEY = "mev_wiki_history";
        
        // --- TAG CLOUD GLOBAL/INIT ---
        
        // Main TagCloud word list
        const TAG_CLOUD_WORDS = [
            "Main Page", "Recent", "Settings", "About", "New Page", 
            "MEV Wiki", "Local Storage", "Offline First", "TagCloud.js"
        ];
        
        function initTagCloud() {
            try {
                // Check if the container exists (it's created dynamically in showPage)
                const container = document.getElementById('tagcloud-container');
                if (container && typeof TagCloud !== 'undefined') {
                    // Initialize the cloud with the static words
                    TagCloud(container, TAG_CLOUD_WORDS, { 
                        radius: 80,
                        itemClass: 'wiki-tag', 
                        maxSpeed: 'fast',
                        containerClass: 'tagcloud-wrapper'
                    });
                    
                    // Add interactive behavior to the TagCloud items
                    container.querySelectorAll('.wiki-tag').forEach(tag => {
                        tag.onclick = function(e) {
                            e.preventDefault();
                            // Tags are plain text, so we convert to a hash link
                            openApp('#' + this.innerText);
                        }
                    });
                }
            } catch(e) { console.error("TagCloud init failed:", e); }
        }


        // --- INITIALIZATION ---
        function init() {
            ensureMainPage(); 
            loadTheme();
            
            // The app view is now the default and only view.
            document.getElementById('app-view').style.display = 'flex';
            document.body.classList.add('app-active'); // Keep class for theme/styles
            
            // Handle routing, defaulting to Main Page
            const hash = window.location.hash || "#Main Page";
            handleRouting(hash);

            updateSidebarList();
        }

        // --- VIEW CONTROLLER (Simplified) ---
        
        // openApp is now the main way to navigate the wiki
        function openApp(hashDestination) {
            window.location.hash = hashDestination;
        }

        // Removed showLanding, switchView, handleLandingSubmit, renderLandingContent.

        // --- CORE DATA LOGIC ---
        function loadDB() {
            return JSON.parse(localStorage.getItem(DB_KEY)) || {};
        }

        function saveDB(db) {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            updateSidebarList();
        }

        // SET DEFAULT CONTENT AS REQUESTED
        function ensureMainPage() {
            const db = loadDB();
            if (!db["Main Page"]) {
                db["Main Page"] = {
                    title: "Main Page",
                    // Enhanced Main Page content for guidance
                    content: "== Welcome to MEV Wiki ==\n\nThis is your private, offline encyclopedia.\n\nType a word in the search bar above to **create a new page** or navigate to an existing one. Use the links in the sidebar to view **Recent** changes or access **Settings**.\n\n'''Architecture'''\n* **Local-First:** All data is stored in your browser's Local Storage.\n* **Offline-First:** The Service Worker allows the entire app to function with zero network connection.\n\n'''Quick Links'''\n* [What is Local-First?](#Local-First)\n* [Markdown Guide](#Markdown Guide)\n* [Example Page](#Example Page)",
                    lastMod: new Date().toLocaleString()
                };
                saveDB(db);
            }
        }
        
        // --- APP LOGIC ---
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            handleRouting(hash);
        });

        function handleRouting(hash) {
            const cleanHash = decodeURIComponent(hash.substring(1));
            if(cleanHash === 'recent') showRecent();
            else if(cleanHash === 'settings') showSettings();
            else if(cleanHash === 'about') showAbout();
            // Default to 'Main Page' if hash is empty or invalid
            else showPage(cleanHash || 'Main Page'); 
            
            // Close sidebar on mobile after navigating
            if(window.innerWidth < 700) document.getElementById('sidebar').style.display = 'none';
        }

        function performSearch() {
            const query = document.getElementById('app-input').value.trim();
            if(query) answerAI(query);
        }

        function showPage(title) {
            const db = loadDB();
            const container = document.getElementById('main-content');
            
            // --- MAIN PAGE LOGIC: Render content and the TagCloud ---
            if (title === "Main Page" && db[title]) {
                const page = db[title];
                
                container.innerHTML = `
                    <article class="page">
                        <h2>${title}</h2>
                        <div class="content">${parseWiki(page.content)}</div>
                        <br><hr>
                        <h3>Interactive Wiki Guide (Tag Cloud)</h3>
                        <div id="tagcloud-container" style="color:#3366cc; font-size:10px; margin-top:20px; opacity:0.8; height: 180px; width: 100%;"></div>
                        <br>
                        <small>Last edited: ${page.lastMod}</small><br>
                        <button class="edit-btn" onclick="editPage('${title}')">Edit</button>
                    </article>
                `;
                // Initialize the TagCloud inside the newly rendered container
                initTagCloud(); 
            // --- END MAIN PAGE LOGIC ---

            } else if (db[title]) {
                // Logic for existing regular pages
                container.innerHTML = `
                    <article class="page">
                        <h2>${title}</h2>
                        <div class="content">${parseWiki(db[title].content)}</div>
                        <br><hr>
                        <small>Last edited: ${db[title].lastMod}</small><br>
                        <button class="edit-btn" onclick="editPage('${title}')">Edit</button>
                        <button class="delete-btn" onclick="deletePage('${title}')">Delete</button>
                    </article>
                `;
            } else {
                // Logic for page not found (prompt to create)
                container.innerHTML = `
                    <div class="page">
                        <h2>Page Not Found: "${title}"</h2>
                        <button class="edit-btn" onclick="createPage('${title}')">Create Page "${title}"</button>
                    </div>
                `;
            }
        }

        function answerAI(query) {
            const db = loadDB();
            const lowerQ = query.toLowerCase();
            const exact = Object.keys(db).find(k => k.toLowerCase() === lowerQ);
            
            if(exact) {
                openApp('#' + exact);
            } else {
                const results = Object.keys(db).filter(k => k.toLowerCase().includes(lowerQ));
                if(results.length > 0) {
                    let html = `<h2>Results for "${query}"</h2><ul>`;
                    results.forEach(r => html += `<li><a href="#${r}" onclick="openApp('#${r}')">${r}</a></li>`);
                    html += `</ul><button class="edit-btn" onclick="createPage('${query}')">Create "${query}"</button>`;
                    document.getElementById('main-content').innerHTML = html;
                } else {
                    // If no results, treat it as a new page creation prompt
                    showPage(query);
                }
            }
        }

        function editPage(title) {
            const db = loadDB();
            const content = db[title] ? db[title].content : "";
            document.getElementById('main-content').innerHTML = `
                <h2>Editing: ${title}</h2>
                <textarea id="editor" class="editor">${content}</textarea>
                <button class="edit-btn" onclick="savePage('${title}')">Save Changes</button>
                <button class="delete-btn" onclick="openApp('#${title}')">Cancel</button>
            `;
        }

        function savePage(title) {
            const content = document.getElementById('editor').value;
            const db = loadDB();
            db[title] = { title, content, lastMod: new Date().toLocaleString() };
            saveDB(db);
            openApp('#' + title);
        }

        function createPage(suggested) {
            const title = suggested || prompt("Enter page title:");
            if(title) editPage(title);
        }

        function deletePage(title) {
            if(confirm("Delete " + title + "?")) {
                const db = loadDB();
                delete db[title];
                saveDB(db);
                // After deleting, go to the main page
                openApp('#Main Page'); 
            }
        }

        function showRecent() {
            // Simple mockup of recent changes based on existing pages
            const db = loadDB();
            let html = `<h2>All Pages (Recent)</h2><ul>`;
            // Convert object to array, sort by lastMod (simplistic sort)
            const sortedPages = Object.values(db).sort((a, b) => new Date(b.lastMod) - new Date(a.lastMod));
            
            sortedPages.forEach(page => {
                 html += `<li><a href="#${page.title}" onclick="openApp('#${page.title}')">${page.title}</a> <small>${page.lastMod}</small></li>`;
            });
            html += `</ul>`;
            document.getElementById('main-content').innerHTML = html;
        }

        function showSettings() {
            document.getElementById('main-content').innerHTML = `
                <h2>Settings</h2>
<a href="../#about"><button class="edit-btn"> default design</button></a>
<a href="V1.html#settings"><button class="edit-btn"> V1 design</button></a>
<a href="V2.html#about"><button class="edit-btn"> V2 design</button></a>
<a href="V3.html#settings"><button class="edit-btn"> V3 design</button></a>
<a href="V4.html#settings"><button class="edit-btn"> V4 design</button></a>
<a href="V5.html#settings"><button class="edit-btn"> V5 design</button></a>
<a href="V6.html#settings"><button class="edit-btn"> V6 design</button></a>
<a href="V7.html#settings" onclick="closeSidebar()"><button class="edit-btn"> V7 design</button></a>
<a href="V8.html#settings" onclick="closeSidebar()"><button class="edit-btn"> V8 design</button></a>

<a href="search.html#search" onclick="closeSidebar()"><button class="edit-btn"> #search design</button></a>
<a href="index.htm#settings" onclick="closeSidebar()"><button class="edit-btn"> htm design</button></a>

                <button class="edit-btn" onclick="toggleTheme()">Toggle Dark Mode</button>
                <button class="delete-btn" onclick="if(confirm('WARNING: This will delete ALL pages from your local storage. Are you sure?')){localStorage.clear();location.reload();}">Factory Reset (Delete All Data)</button>
            `;
        }

        function showAbout() {
            document.getElementById('main-content').innerHTML = `<h2>About</h2><p>MEV Wiki v2.1</p>`;
        }

        // --- UTILS ---
        function parseWiki(text) {
            let safe = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safe = safe.replace(/^== (.*?) ==$/gm, '<h3>$1</h3>');
            safe = safe.replace(/^=== (.*?) ===$/gm, '<h4>$1</h4>');
            safe = safe.replace(/'''(.*?)'''/g, '<b>$1</b>');
            // Convert wiki links [Link Text](#Target Page) to HTML links
            safe = safe.replace(/\[(.*?)\]\(\#(.*?)\)/g, '<a href="#$2" onclick="openApp(\'#$2\')">$1</a>');
            safe = safe.replace(/\* (.*?)$/gm, '<li>$1</li>'); // Lists
            safe = safe.replace(/\n/g, '<br>');
            return safe;
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.style.display = (sb.style.display === 'block') ? 'none' : 'block';
        }

        function updateSidebarList() {
            const db = loadDB();
            const list = document.getElementById('sidebar-page-list');
            list.innerHTML = "";
            Object.keys(db).sort().forEach(k => {
                if(k !== "Main Page") list.innerHTML += `<a href="#${k}" onclick="openApp('#${k}')">${k}</a>`;
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            // Update header colors on theme change
            const header = document.querySelector('header');
            if(document.body.classList.contains('dark')) {
                header.style.backgroundColor = '#1f1f1f';
            } else {
                header.style.backgroundColor = '#3366cc';
            }
        }
        function loadTheme() {
            if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
            // Ensure header color is set correctly on load
            const header = document.querySelector('header');
            if(document.body.classList.contains('dark')) {
                header.style.backgroundColor = '#1f1f1f';
            } else {
                header.style.backgroundColor = '#3366cc';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
