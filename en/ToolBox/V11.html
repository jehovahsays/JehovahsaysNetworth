<br>
<div id="inputWrapper">
<form
id=""
action="./#search" 
method="get"
>	
<div id="inputWrapper">
<input
style="position:absolute;top:25px;left:90px;width:150px;"
id="filterInput"
onkeyup="titleInput()"
autocomplete="true"
autocorrect="off"  
autocapitalize="off" 
spellcheck="true"
type="text" 
name=""
maxlength="524288" 
value=""
aria-label="search"  
placeholder="search database" 
x-webkit-speech
required>
</div>		


</form>



<script>
function titleInput() {
	
  let input = document.getElementById('filterInput').value;

  input = input.toLowerCase();

  let x = document.getElementsByClassName('titleInput');
 
  for (i = 0; i < x.length; i++) {

    if (!x[i].innerHTML.toLowerCase().includes(input)) {

      x[i].style.display = "none";

    }

    else {

      x[i].style.display = "list-item";

    }

  }
  
let msg = new SpeechSynthesisUtterance(input); 
window.speechSynthesis.speak(msg);   

  
}
</script>



<ul id="filterInput">
