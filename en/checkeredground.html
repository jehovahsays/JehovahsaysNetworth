<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> checkered ground</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "../examples/build/three.module.js",
            "three/addons/": "../examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let camera, scene, renderer, controls, model, mixer;
    let moveX = 0, moveZ = 0;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe0e0e0);
        scene.fog = new THREE.Fog(0xe0e0e0, 20, 100);

        camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.25, 100);
        camera.position.set(-1, 8, -25);
        camera.lookAt(0, -2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 3);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 3);
        dirLight.position.set(0, 20, 10);
        scene.add(dirLight);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000),
            new THREE.MeshPhongMaterial({ color: 0xcbcbcb, depthWrite: false })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Add a grid for better visibility
        const grid = new THREE.GridHelper(200, 40, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // Initialize OrbitControls for touchscreen support
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.minDistance = 2;
        controls.maxDistance = 100;
        controls.maxPolarAngle = Math.PI / 2;

        // Enable touch gestures
        controls.enableZoom = true; // Pinch-to-zoom
        controls.enableRotate = true; // Drag to rotate
        controls.enablePan = true; // Two-finger drag to pan

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Move character based on joystick input
        if (model) {
            model.position.x += moveX * 0.1;
            model.position.z += moveZ * 0.1;
            updateCamera();
        }

        controls.update(); // Allow smooth touchscreen camera controls
        renderer.render(scene, camera);
    }

    function updateCamera() {
        if (model) {
            const offset = new THREE.Vector3(0, 5, -15);
            const newCameraPos = model.position.clone().add(offset);
            camera.position.lerp(newCameraPos, 0.1);
            camera.lookAt(model.position);
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Joystick Control
    let joystick = document.createElement('div');
    joystick.id = "joystick";
    document.body.appendChild(joystick);

    let handle = document.createElement('div');
    handle.id = "joystick-handle";
    joystick.appendChild(handle);

    let touchStartX = 0, touchStartY = 0;

    joystick.addEventListener("touchstart", (event) => {
        const touch = event.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
    });

    joystick.addEventListener("touchmove", (event) => {
        event.preventDefault();
        const touch = event.touches[0];
        moveX = (touch.clientX - touchStartX) / -50;
        moveZ = (touch.clientY - touchStartY) / -50;
        handle.style.transform = `translate(${moveX * 20}px, ${moveZ * 20}px)`;
    });

    joystick.addEventListener("touchend", () => {
        moveX = 0;
        moveZ = 0;
        handle.style.transform = "translate(0px, 0px)";
    });

    init();
</script>

</body>
</html>
