	<style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        
        /* Joystick */
        #joystick {
            position: fixed;
            bottom: 50px;
            left: 50px;
            width: 100px;
            height: 100px;
            background: black;
            border-radius: 50%;
            touch-action: none;
        }

        #joystick-handle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 255, 0.8);
            border-radius: 50%;
            left: 30px;
            top: 30px;
            transition: 0.1s;
        }

</head>

<body>

		<div id="info">
		<a href="./player.html" style="position:fixed;bottom:190px;left:300px;"><button>jump</button></a>

			<!--<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> webgl - skinning and morphing<br />

				The animation system allows clips to be played individually, looped, or crossfaded with other clips. This example shows a character looping in one of several base animation states, then transitioning smoothly to one-time actions. Facial expressions are controlled independently with morph targets.

    <script type="importmap">
        {
            "imports": {
                "three": "../examples/build/three.module.js",
                "three/addons/": "../examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import Stats from 'three/addons/libs/stats.module.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let container, stats, clock, mixer, actions, activeAction, previousAction, camera, scene, renderer, model;
        let moveX = 0, moveZ = 0; // Movement variables
		//let camera, scene, renderer, model, face;

        init();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.25, 100);
            camera.position.set(-5, 13, -25);
            camera.lookAt(0, -2, 0);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e0e0);
            scene.fog = new THREE.Fog(0xe0e0e0, 20, 100);

            clock = new THREE.Clock();

            // Lights
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 3);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 3);
            dirLight.position.set(0, 20, 10);
            scene.add(dirLight);

            // Ground
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0xcbcbcb, depthWrite: false }));
            mesh.rotation.x = -Math.PI / 2;
            scene.add(mesh);

            const grid = new THREE.GridHelper(200, 40, 0x000000, 0x000000);
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);

            // Load Model
            const loader = new GLTFLoader();
            loader.load('../examples/models/gltf/RobotExpressive/RobotExpressive.glb', function (gltf) {
                model = gltf.scene;
                scene.add(model);
                setupAnimation(gltf.animations);
            });

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            container.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function setupAnimation(animations) {
            mixer = new THREE.AnimationMixer(model);
            const action = mixer.clipAction(animations.find(anim => anim.name === 'Walking'));
            action.play();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            const dt = clock.getDelta();

            if (mixer) mixer.update(dt);

            // Move character based on joystick input
            if (model) {
                model.position.x += moveX * dt * 5; // Adjust speed factor
                model.position.z += moveZ * dt * 5;
            }

            renderer.render(scene, camera);
        }

        // Joystick Control
        let joystick = document.createElement('div');
        joystick.id = "joystick";
        document.body.appendChild(joystick);

        let handle = document.createElement('div');
        handle.id = "joystick-handle";
        joystick.appendChild(handle);

        let touchStartX = 0, touchStartY = 0;

        joystick.addEventListener("touchstart", (event) => {
            const touch = event.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        });

        joystick.addEventListener("touchmove", (event) => {
            event.preventDefault(); // Prevent scrolling while using joystick
            const touch = event.touches[0];
            moveX = (touch.clientX - touchStartX) / -50;
            moveZ = (touch.clientY - touchStartY) / -50;

            handle.style.transform = `translate(${moveX * 20}px, ${moveZ * 20}px)`;
        });

        joystick.addEventListener("touchend", () => {
            moveX = 0;
            moveZ = 0;
            handle.style.transform = "translate(0px, 0px)";
        });

    </script>
</body>
</html>
