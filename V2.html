<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEV Wiki</title>
  <meta name="description" content="MEV Wiki – Offline Encyclopedia. Learn, edit, explore." />
  <meta name="theme-color" content="#3366cc" />
  <meta name="color-scheme" content="light dark" />

  <!-- Embedded CSS -->
  <style>
  html, body {
  overflow: hidden;
  height: 100%;
  width: 100%;
  font-family: 'Inter', system-ui, "Segoe UI", Arial, sans-serif;
}

#main {
  overflow-y: auto;
  overflow-x: hidden;
  height: 100%; /* Changed from 80% to fit container */
  width: 100%;
}

#page-container {
  overflow: auto;
  height: 100%;
  width: 100%;
}
    /* ========== MEV Wiki Style (Hardened) ========== */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", Arial, sans-serif;
      background: #fff;
      color: #000;
      transition: background 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    header {
      background: #3366cc;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between; /* Adjusted for better alignment */
      border-radius: 0 0 8px 8px;
    }
    #menu-btn {
      font-size: 28px;
      background: transparent;
      color: white;
      border: none;
      margin-right: 15px;
      cursor: pointer;
      border-radius: 4px;
      padding: 5px 8px;
      transition: background-color 0.2s;
    }
    #menu-btn:hover { background-color: rgba(255, 255, 255, 0.1); }

    #menu-btn:focus, button:focus, input:focus, textarea:focus {
      outline: 2px solid #ffcc00;
      outline-offset: 2px;
    }
    [hidden],[aria-hidden="true"],.invisible,.offscreen {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
      height: 0 !important;
      width: 0 !important;
      overflow: hidden !important;
    }
    .noselect { user-select: none; }
    .readonly { pointer-events: none; user-select: none; opacity: 0.6; }
    header h1 { margin: 0; font-size: 1.5rem; }

    #banner {
      background: #ffcc00;
      color: #000;
      padding: 10px;
      text-align: center;
      display: none;
      font-weight: bold;
    }

    #container {
      display: flex;
      flex-direction: row;
      /* Adjust height to account for header and footer */
      height: calc(100vh - 120px); 
    }
    #sidebar {
      width: 250px;
      background: #f8f9fa;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      display: none;
      flex-shrink: 0;
    }
    #sidebar h3 { margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    #sidebar ul { list-style: none; padding: 0; }
    #sidebar li { margin: 5px 0; border-radius: 4px; padding: 2px 0; }
    #sidebar a {
      color: #3366cc;
      text-decoration: none;
      word-break: break-word;
      display: block;
      padding: 4px 6px;
    }
    #sidebar a:hover { background-color: #e9ecef; border-radius: 4px; }
    
    /* Main Content Area */
    #main {
      flex: 1 1 100%;
      padding: 20px;
      overflow-y: auto;
    }
    #ai-bar {
      /* Search/Voice bar integrated into header */
      flex-grow: 1; 
      margin-left: 15px; 
      display: flex;
      align-items: center;
    }
#ai-input {
  flex: 1;
  padding: 8px 12px;
  font-size: 1rem;
  border-radius: 6px;
  border: 1px solid #ccc;
  min-width: 150px;
}

#ai-button {
  margin-left: 8px;
  padding: 8px 15px;
  font-size: 1rem;
  border-radius: 6px;
  border: none;
  background: #ffcc00;
  color: #000;
  cursor: pointer;
  font-weight: bold;
  transition: background-color 0.2s;
}
    #ai-button:hover { background: #e0b300; }

    section.page { margin-bottom: 40px; padding: 10px; border-radius: 8px; background-color: #fefefe; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    section.page h2 {
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }
    section.page .content {
      margin-top: 10px;
      white-space: pre-wrap;
    }
    textarea.editor {
      width: 100%;
      height: 200px;
      padding: 10px;
      font-size: 16px;
      font-family: monospace;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      margin-top: 10px;
    }
    .edit-btn, .delete-btn {
      background: #3366cc;
      color: white;
      border: none;
      padding: 8px 15px;
      margin-top: 15px;
      margin-right: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      transition: background-color 0.2s;
    }
    .edit-btn:hover { background-color: #254a9e; }
    .delete-btn { background-color: #cc3333; }
    .delete-btn:hover { background-color: #a60000; }

    footer {
      height: 60px;
      background: #f1f1f1;
      border-top: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-radius: 8px 8px 0 0;
    }

    #status-indicator { font-size: 14px; color: #555; font-weight: 600;}
    #ticker { white-space: nowrap; overflow: hidden; width: 100%; position: relative; margin: 0 15px; }
    #ticker span {
      display: inline-block; padding-left: 100%; animation: scroll-left 20s linear infinite;
    }
    @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }

    #storage-bar {
      margin-top: 15px;
      background: #e9ecef;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
    }
    #storage-bar-inner {
      height: 10px;
      background: #3366cc;
      width: 0%;
      transition: width 0.5s;
    }

    /* Modal Styling */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      backdrop-filter: blur(5px);
    }
    .modal-box {
      background: white;
      max-width: 90%;
      width: 400px;
      margin: 10vh auto;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      text-align: left;
    }
    .modal-actions { margin-top: 20px; text-align: right; }
    .modal-actions button { margin-left: 10px; }

    /* Dark Mode */
    body.dark {
      background: #121212;
      color: #e0e0e0;
    }
    body.dark header { background: #1f1f1f; }
    body.dark #sidebar {
      background: #1c1c1c;
      border-right: 1px solid #444;
    }
    body.dark #sidebar h3 { border-bottom-color: #333; }
    body.dark #sidebar a { color: #80bfff; }
    body.dark #sidebar a:hover { background-color: #2c2c2c; }
    body.dark #main { background: #181818; }
    body.dark #ai-input {
      background: #2c2c2c; color: #e0e0e0; border: 1px solid #555;
    }
    body.dark #ai-button {
      background: #665500;
      color: #fff;
    }
    body.dark #ai-button:hover {
      background: #776600;
    }
    body.dark section.page { background-color: #1f1f1f; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    body.dark textarea, body.dark input {
      background: #2c2c2c; color: #e0e0e0; border: 1px solid #555;
    }
    body.dark .modal-box { background: #1f1f1f; }
    body.dark .edit-btn, body.dark .delete-btn {
      background: #444;
    }
    body.dark #storage-bar {
      background: #333; border-color: #555;
    }
    body.dark #storage-bar-inner {
      background: #80bfff;
    }
    body.dark footer {
      background: #181818; border-top: 1px solid #444;
    }

    #page-container {
      display: block;
      width: 100%;
      height: auto;
      min-height: calc(100vh - 160px);
      padding: 0 10px 30px 10px;
      overflow-x: hidden;
      overflow-y: auto;
      word-break: break-word;
      background-color: inherit;
      color: inherit;
    }
    body.dark #page-container {
      background-color: #181818;
      color: #e0e0e0;
    }
    #offline-message {
      display: none;
      background: #ffcc00;
      color: #000;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-family: inherit;
      z-index: 9999;
      border-bottom: 1px solid #aaa;
      position: relative;
    }
    body.dark #offline-message {
      background: #665500;
      color: #fff;
      border-bottom-color: #333;
    }
    .semantic-status {
      margin-top: 15px;
      color: green;
      font-weight: bold;
      font-size: 0.95em;
    }

    /* Styles for Quick Filter Buttons (New Component) */
    #quick-filters {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }
    /* .titleInput class is used by JS for filtering, applying to the LI */
    .titleInput button {
      background: #e9ecef; 
      border: 1px solid #ccc;
      padding: 6px 10px;
      margin-top: 5px;
      border-radius: 4px;
      cursor: pointer;
      display: block; 
      width: 100%;
      text-align: left;
      color: #3366cc;
      font-weight: 500;
      transition: background-color 0.2s, color 0.2s;
    }
    .titleInput button:hover {
      background: #d4d8db;
    }
    body.dark .titleInput button {
      background: #2c2c2c;
      color: #80bfff;
      border-color: #555;
    }
    body.dark .titleInput button:hover {
      background: #3c3c3c;
    }

    @media (max-width: 600px) {
      header {
        padding: 10px;
      }
      #ai-bar {
        margin-left: 10px;
      }
      #ai-input {
        font-size: 0.9rem;
        padding: 6px 10px;
      }
      #ai-button {
        padding: 6px 10px;
        font-size: 0.9rem;
      }
      #sidebar {
        width: 100%;
        position: fixed;
        height: calc(100vh - 50px);
        top: 50px;
        left: 0;
        z-index: 900;
      }
      #container {
        height: calc(100vh - 120px);
      }
      #main {
        padding: 10px;
      }
    }
  </style>
  
</head>
<body>

<div id="banner" class="banner"></div>

<div id="offline-message">
  ⚠️ You’re offline. Some features may be unavailable.
</div>

<header>
  <button id="menu-btn" aria-label="Toggle menu navigation">☰</button>
  <div id="ai-bar">
    <!-- Voice recognition enabled via x-webkit-speech attribute -->
    <input 
      type="text" 
      id="ai-input" 
      placeholder="search or speak your query…" 
      aria-label="Search or question input"
      onkeyup="titleInput()" 
      x-webkit-speech 
    >

</header>

<!-- No-JS Fallback is simple text since the app is JS-heavy -->
<noscript>
<p style="text-align: center; color: red;">
  This application requires JavaScript. <br>
  For basic links without JavaScript, try refreshing without JS enabled if supported by your browser environment.
</p>
</noscript>

<div id="container">
  <nav id="sidebar">
    <div id="auth-links">
      <div id="user-status">Not logged in</div>

<!-- Embedded JS -->
<script>
  // ====== MEV SECURITY LAYER ======
  (function secureClientApp() {
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("dragstart", e => e.preventDefault());
    document.addEventListener("selectstart", e => e.preventDefault());

    // Basic function overriding for security (though this is often circumventable)
    window.eval = () => console.warn('eval blocked');
    window.Function = function() { console.warn('Function constructor blocked'); };

    const originalSetTimeout = window.setTimeout;
    window.setTimeout = function(fn, delay) {
      if (typeof fn === 'string') {
        console.warn('setTimeout(string) blocked');
        return;
      }
      return originalSetTimeout(fn, delay);
    };

    document.head.insertAdjacentHTML("beforeend", `
      <meta http-equiv="X-Content-Type-Options" content="nosniff">
      <meta http-equiv="X-Frame-Options" content="DENY">
      <meta http-equiv="Referrer-Policy" content="no-referrer">
      <meta http-equiv="Permissions-Policy" content="microphone=(), camera=(), geolocation=()">
    `);

    if (!location.hostname.includes('localhost')) {
      // console.log = console.warn = console.error = () => {}; 
    }
  })();

  const STORAGE_KEYS = {
    pages: 'wiki_pages',
    users: 'wiki_users',
    currentUser: 'wiki_current_user',
    changes: 'wiki_changes',
    theme: 'wiki_theme',
    sidebar: 'wiki_sidebar',
    knowledge: 'wiki_knowledge'
  };

  function loadData(key, defaultVal) {
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : defaultVal;
    } catch {
      return defaultVal;
    }
  }
  function saveData(key, data) {
    try {
      localStorage.setItem(key, JSON.stringify(data));
      updateStorageBar();
    } catch(e) {
      console.error("Failed to save data:", e);
    }
  }
  function getCurrentUser() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.currentUser) || 'null');
    } catch {
      return null;
    }
  }
  function speak(text) {
    if ('speechSynthesis' in window) {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'en-US';
      msg.pitch = 1;
      msg.rate = 1;
      window.speechSynthesis.speak(msg);
    }
  }
  
  /**
   * Dynamically generates the list of wiki pages in the sidebar,
   * applying an optional filter based on user input.
   */
  function updatePageList(filter = '') {
      const listEl = document.getElementById('page-list');
      if (!listEl) return;
      listEl.innerHTML = '';
      const pages = loadData(STORAGE_KEYS.pages, {});
      // Exclude system pages from the main list unless explicitly searched
      const titles = Object.keys(pages)
        .filter(t => t !== "Formatting Examples")
        .sort();
      const filterLower = filter.toLowerCase();

      let resultsCount = 0;

      titles.forEach(title => {
          if (filterLower === '' || title.toLowerCase().includes(filterLower)) {
              const li = document.createElement('li');
              const link = document.createElement('a');
              // Use a hash link to enable non-JS fallback, though controlled by JS here
              link.href = `#${encodeURIComponent(title)}`; 
              link.textContent = title;
              link.addEventListener('click', e => {
                  e.preventDefault();
                  showPage(title);
              });
              li.appendChild(link);
              listEl.appendChild(li);
              resultsCount++;
          }
      });
      
      // If filtering, add a small status message
      if (filterLower !== '') {
        const statusLi = document.createElement('li');
        statusLi.style.cssText = 'font-size: 0.85rem; color: #666; padding: 5px;';
        statusLi.textContent = `(${resultsCount} pages found)`;
        listEl.prepend(statusLi);
      }
  }
  
  // ==========================================================
  // MODIFIED GLOBAL FUNCTION FOR VOICE/FILTER COMPONENT
  // This function handles filtering for both Quick Filters AND Wiki Pages
  // ==========================================================
  function titleInput() {
      // 1. Get the input value
      let input = document.getElementById('ai-input').value;
      input = input.toLowerCase().trim();

      // 2. Filter the Quick Filters (static navigation buttons)
      let quickFilters = document.querySelectorAll('#quick-filters .titleInput');
      quickFilters.forEach(li => {
          if (!li.innerText.toLowerCase().includes(input)) {
              li.style.display = "none";
          } else {
              li.style.display = "list-item";
          }
      });
      
      // 3. Filter the dynamic Page List
      updatePageList(input);
      
      // 4. Text-to-Speech part for voice recognition feedback
      if (input.length > 2 && !window.speechSynthesis.speaking) { 
        // Only speak the last few words to prevent overwhelming TTS
        const words = input.split(/\s+/).slice(-5).join(' ');
        let msg = new SpeechSynthesisUtterance(words); 
        window.speechSynthesis.speak(msg);
      }
  }
  // Expose the function globally for the onkeyup attribute to work
  window.titleInput = titleInput;
  window.showRecent = showRecent; // Expose global nav functions for quick filters
  window.showSettings = showSettings;
  window.showAbout = showAbout;


  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, match => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[match]));
  }
  function linkify(content) {
    const safe = escapeHTML(content);
    return safe.replace(/\[\[([^\]]+)\]\]/g, (_, t) => `<a href="#" onclick="showPage('${t}')">${t}</a>`);
  }
  function parseWiki(text) {
    if (!text) return '';
    // Ensure all parsing is done on the RAW text (not the sanitized version)
    // The linkify step handles HTML escaping for the content outside of wiki syntax
    let result = escapeHTML(text);

    // Headings
    result = result.replace(/^={2,6}\s*(.+?)\s*={2,6}$/gm, (m, p1) => {
      const lvl = m.match(/^=+/)[0].length;
      return `<h${lvl}>${p1}</h${lvl}>`;
    });
    // Bold and Italic
    result = result.replace(/'''(.*?)'''/g, '<strong>$1</strong>');
    result = result.replace(/''(.*?)''/g, '<em>$1</em>');
    // Wiki Links (re-apply linkify after other formatting is done on raw text)
    result = result.replace(/\[\[([^\]]+)\]\]/g, (_, t) =>
      `<a href="#" onclick="showPage('${t}')">${escapeHTML(t)}</a>`
    );
    // Code blocks (preserve spacing and escape within <pre>)
    result = result.replace(/```([\s\S]*?)```/g, (m, p1) => 
        `<pre style="background: #eee; padding: 10px; border-radius: 4px; overflow-x: auto;">${escapeHTML(p1).trim()}</pre>`
    );
    // Inline code
    result = result.replace(/`([^`]+)`/g, '<code>$1</code>');

    // List parsing
    let finalHtml = '';
    let inUL = false;
    let inOL = false;

    result.split('\n').forEach(line => {
      if (/^\*\s+/.test(line)) {
        if (inOL) { finalHtml += '</ol>'; inOL = false; }
        if (!inUL) { finalHtml += '<ul>'; inUL = true; }
        finalHtml += `<li>${line.replace(/^\*\s+/, '')}</li>`;
      } else if (/^\#\s+/.test(line)) {
        if (inUL) { finalHtml += '</ul>'; inUL = false; }
        if (!inOL) { finalHtml += '<ol>'; inOL = true; }
        finalHtml += `<li>${line.replace(/^\#\s+/, '')}</li>`;
      } else {
        if (inUL) { finalHtml += '</ul>'; inUL = false; }
        if (inOL) { finalHtml += '</ol>'; inOL = false; }
        if (line.trim() !== '') {
            finalHtml += line + '<br>';
        } else {
            finalHtml += '<br>'; // Preserve some line breaks
        }
      }
    });

    if (inUL) finalHtml += '</ul>';
    if (inOL) finalHtml += '</ol>';

    finalHtml += `<div class="semantic-status">✔️ Semantic HTML Enabled</div>`;
    return finalHtml;
  }

  function updateStorageBar() {
    const bar = document.getElementById('storage-bar-inner');
    if (!bar) return;
    if (navigator.storage && navigator.storage.estimate) {
      navigator.storage.estimate().then(est => {
        const usage = est.usage || 0;
        const quota = est.quota || 1;
        const percent = Math.min((usage / quota) * 100, 100).toFixed(1);
        bar.style.width = percent + '%';
        bar.title = `Used: ${(usage / 1024).toFixed(1)} KB / ${(quota / 1024).toFixed(1)} KB`;
      });
    } else {
      let totalBytes = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const value = localStorage.getItem(key) || '';
        totalBytes += (key.length + value.length) * 2;
      }
      bar.style.width = '100%';
      bar.title = `Approx. ${(totalBytes / 1024).toFixed(1)} KB used`;
    }
  }
  function applyThemeFromStorage() {
    const mode = localStorage.getItem(STORAGE_KEYS.theme);
    document.body.classList.toggle('dark', mode === 'dark');
  }
  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem(STORAGE_KEYS.theme, isDark ? 'dark' : 'light');
  }
  function restoreSidebarState() {
    const open = localStorage.getItem(STORAGE_KEYS.sidebar) === 'open';
    const sidebar = document.getElementById('sidebar');
    if (sidebar) {
      sidebar.style.display = open ? 'block' : 'none';
    }
  }
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    const isOpen = sidebar.style.display === 'block';
    if (isOpen) {
      sidebar.style.display = 'none';
      localStorage.setItem(STORAGE_KEYS.sidebar, 'closed');
    } else {
      sidebar.style.display = 'block';
      localStorage.setItem(STORAGE_KEYS.sidebar, 'open');
    }
  }
  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) {
      sidebar.style.display = 'none';
      localStorage.setItem(STORAGE_KEYS.sidebar, 'closed');
    }
  }

  function setupAuth() {
    const s = {
      modal: 'auth-modal', username: 'auth-username',
      title: 'auth-modal-title', createLink: 'create-account-link',
      loginLink: 'login-link', logoutLink: 'logout-link', userStatus: 'user-status',
      submitBtn: 'submit-auth', cancelBtn: 'cancel-auth'
    };
    function getAllUsers() { return loadData(STORAGE_KEYS.users, []); }
    function saveAllUsers(users) { saveData(STORAGE_KEYS.users, users); }
    function updateUserStatus() {
      const user = getCurrentUser();
      const el = document.getElementById(s.userStatus);
      if (el) el.textContent = user ? `Logged in as ${user.name}` : 'Not logged in';
    }
    function updateAuthUI() {
      const user = getCurrentUser();
      document.getElementById(s.createLink).style.display = user ? 'none' : 'block';
      document.getElementById(s.loginLink).style.display = user ? 'none' : 'block';
      document.getElementById(s.logoutLink).style.display = user ? 'block' : 'none';
      const profileLink = document.getElementById('profile-link');
      if (profileLink) profileLink.style.display = user ? 'block' : 'none';
    }
    function showModal(isLogin = false) {
      const modal = document.getElementById(s.modal);
      const usernameInput = document.getElementById(s.username);
      document.getElementById(s.title).textContent = isLogin ? "Log In" : "Create Account";
      if (usernameInput) usernameInput.value = "";
      if (modal) modal.style.display = 'block';
      setTimeout(() => document.getElementById(s.username)?.focus(), 50);
    }
    function closeModal() {
      const modal = document.getElementById(s.modal);
      if (modal) modal.style.display = 'none';
    }
    function submitAuth() {
      const input = document.getElementById(s.username);
      const name = input ? input.value.trim() : '';
      if (!name) { console.error("Please enter a username."); speak("Please enter a username."); return; }
      let users = getAllUsers();
      let user = users.find(u => u.name.toLowerCase() === name.toLowerCase());
      if (!user) {
        user = { name, joined: new Date().toISOString(), edits: [] };
        users.push(user);
        saveAllUsers(users);
        console.log(`✅ Account created for ${name}`);
      } else {
        console.log(`👋 Welcome back, ${user.name}`);
      }
      localStorage.setItem(STORAGE_KEYS.currentUser, JSON.stringify(user));
      closeModal();
      updateAuthUI();
      updateUserStatus();
      updateStorageBar();
      showPage("Main Page"); // Navigate home after auth
    }
    function logout() {
      localStorage.removeItem(STORAGE_KEYS.currentUser);
      console.log("Logged out.");
      updateAuthUI();
      updateUserStatus();
      updateStorageBar();
      showAbout();
    }
    document.getElementById(s.createLink)?.addEventListener('click', e => { e.preventDefault(); showModal(false); });
    document.getElementById(s.loginLink)?.addEventListener('click', e => { e.preventDefault(); showModal(true); });
    document.getElementById(s.logoutLink)?.addEventListener('click', e => { e.preventDefault(); logout(); });
    document.getElementById(s.submitBtn)?.addEventListener('click', e => { e.preventDefault(); submitAuth(); });
    document.getElementById(s.cancelBtn)?.addEventListener('click', e => { e.preventDefault(); closeModal(); });
    document.addEventListener('keydown', e => { 
        if (e.key === 'Escape' && document.getElementById(s.modal)?.style.display === 'block') closeModal(); 
    });

    updateUserStatus();
    updateAuthUI();
  }

  function showSettings() {
    console.log("Navigating to Settings");
    closeSidebar();
    const c = document.getElementById('page-container');
    if (!c) return;
    const section = document.createElement('section');
    section.className = 'page';
    section.innerHTML = '<h2>Settings</h2>';
    
    // Theme Toggle
    const themeToggle = document.createElement('button'); 
    themeToggle.textContent = '🌗 Toggle Dark Mode'; 
    themeToggle.onclick = toggleTheme;
    themeToggle.className = 'edit-btn';
    themeToggle.style.marginRight = '10px';
    section.appendChild(themeToggle);

    // Export Button
    const exportBtn = document.createElement('button'); 
    exportBtn.textContent = '🡇 Export Backup'; 
    exportBtn.className = 'edit-btn';
    exportBtn.onclick = () => {
      const data = { pages: loadData(STORAGE_KEYS.pages, {}), users: loadData(STORAGE_KEYS.users, []), currentUser: getCurrentUser(), changes: loadData(STORAGE_KEYS.changes, []), knowledge: loadData(STORAGE_KEYS.knowledge, {}) };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob); 
      const a = document.createElement('a'); 
      a.href = url; 
      a.download = `mev-backup-${Date.now()}.mev.json`; 
      a.click(); 
      URL.revokeObjectURL(url);
    };
    section.appendChild(exportBtn);

    // Import Input (hidden)
    const importInput = document.createElement('input'); 
    importInput.type = 'file'; 
    importInput.accept = 'application/json'; 
    importInput.style.display = 'none';
    importInput.onchange = e => { 
        const file = e.target.files[0]; 
        if (!file) return; 
        const reader = new FileReader(); 
        reader.onload = () => {
            try { 
                const d = JSON.parse(reader.result); 
                saveData(STORAGE_KEYS.pages, d.pages || {}); 
                saveData(STORAGE_KEYS.users, d.users || []); 
                localStorage.setItem(STORAGE_KEYS.currentUser, d.currentUser ? JSON.stringify(d.currentUser) : 'null'); 
                saveData(STORAGE_KEYS.changes, d.changes || []); 
                saveData(STORAGE_KEYS.knowledge, d.knowledge || {}); 
                console.log("✅ Backup imported successfully. Reloading..."); 
                speak("Backup imported successfully. Reloading application.");
                setTimeout(() => location.reload(), 500);
            } catch { 
                console.error("❌ Invalid JSON file."); 
                speak("Error: Invalid JSON file.");
            }
        }; 
        reader.readAsText(file); 
    };

    // Import Button
    const importBtn = document.createElement('button'); 
    importBtn.textContent = '🡅 Import Backup'; 
    importBtn.className = 'edit-btn';
    importBtn.style.backgroundColor = '#6c757d';
    importBtn.onclick = () => importInput.click();
    section.appendChild(importBtn); 
    section.appendChild(importInput);
    
    // Storage Stats
    const storageStats = document.createElement('pre'); 
    storageStats.style.marginTop = '20px';
    section.appendChild(storageStats);

    // Clear AI Memory Button
    const clearBtn = document.createElement('button'); 
    clearBtn.textContent = '🧠 Clear AI Memory'; 
    clearBtn.className = 'delete-btn';
    clearBtn.onclick = () => { 
        localStorage.removeItem(STORAGE_KEYS.knowledge); 
        console.log('AI memory cleared.'); 
        speak("AI memory cleared.");
        updateStats(); 
    };
    section.appendChild(clearBtn);

    function updateStats() { 
        let totalBytes = 0; 
        for (let i = 0; i < localStorage.length; i++) { 
            const key = localStorage.key(i); 
            const value = localStorage.getItem(key) || ''; 
            totalBytes += (key.length + value.length)*2; 
        } 
        storageStats.textContent = `--- Local Storage Usage ---\nTotal Used: ${Math.round(totalBytes/1024)} KB\nTypical Quota: ~5120 KB (5MB)`; 
    }
    updateStats();

    c.innerHTML = '';
    c.appendChild(section);
    location.hash = "#settings";
  }
  function showRecent() {

    const changes = loadData(STORAGE_KEYS.changes, []);

          link.addEventListener('click', e => { e.preventDefault(); showPage(ch.title); });

  function createPage(titleFromSearch = null) {
    console.log("Creating page:", titleFromSearch);
    const title = titleFromSearch || prompt("Enter new page title:");
    if (!title || title.trim() === '') return;
    const cleanTitle = title.trim();
    const pages = loadData(STORAGE_KEYS.pages, {});
    const changes = loadData(STORAGE_KEYS.changes, []);
    const user = getCurrentUser();
    if (pages[cleanTitle]) { console.error("Page already exists."); speak(`Page ${cleanTitle} already exists.`); showPage(cleanTitle); return; }
    
    pages[cleanTitle] = { 
        title: cleanTitle, 
        content: `== ${cleanTitle} ==\n\nThis is your new page. Click Edit to customize it.`, 
        lastEdited: new Date().toISOString(), 
        createdBy: user ? user.name : 'Guest' 
    };
    saveData(STORAGE_KEYS.pages, pages);
    changes.unshift({ type:'create', title: cleanTitle, time:new Date().toISOString(), user:user?user.name:'Guest' });
    saveData(STORAGE_KEYS.changes, changes);
    updatePageList();
    console.log(`✅ Page "${cleanTitle}" created!`);
    speak(`Page ${cleanTitle} created.`);
    showPage(cleanTitle);
  }
  function deletePage(title) {
    console.log("Deleting page:", title);
    const pages = loadData(STORAGE_KEYS.pages, {});
    const changes = loadData(STORAGE_KEYS.changes, []);
    const user = getCurrentUser();
    if (!pages[title]) { console.error("Page not found."); return; }
    
    // Use a simple custom modal replacement since alert/confirm are forbidden
    if (!window.confirm(`Are you sure you want to delete the page "${title}"? This cannot be undone.`)) { return; }
    
    delete pages[title];
    saveData(STORAGE_KEYS.pages, pages);
    changes.unshift({ type:'delete', title, time:new Date().toISOString(), user:user?user.name:'Guest' });
    saveData(STORAGE_KEYS.changes, changes);
    updatePageList();
    console.log(`✅ Page "${title}" deleted.`);
    speak(`Page ${title} deleted.`);
    showRecent(); // Navigate away after deletion
  }
  function showPage(title) {
    console.log("Showing page:", title);
    closeSidebar();
    const pages = loadData(STORAGE_KEYS.pages, {});
    const page = pages[title];
    const c = document.getElementById('page-container');
    if (!c) return;
    
    if (!page) {
      const all = Object.keys(pages);
      const suggest = all.filter(t => t.toLowerCase().includes(title.toLowerCase()));
      let html = `<section class="page"><h2>No page found for "${escapeHTML(title)}"</h2>`;
      if (suggest.length) {
        html += `<p>Did you mean: ${suggest.map(t => `<a href="#" onclick="showPage('${t}')">${escapeHTML(t)}</a>`).join(', ')}</p>`;
      }
      html += `<p>Would you like to create it?</p><button class="edit-btn" onclick="createPage('${escapeHTML(title)}')">Create Page "${escapeHTML(title)}"</button></section>`;
      c.innerHTML = html;
      speak(`No page found for ${title}.`);
      location.hash = "#notfound";
      return;
    }
    
    c.innerHTML = `
      <article class="page" itemscope itemtype="https://schema.org/Article">
        <h2 itemprop="headline">${escapeHTML(page.title)}</h2>
        <p style="font-size: 0.85rem; color: #6c757d;">Last edited: ${new Date(page.lastEdited).toLocaleString()} by ${escapeHTML(page.createdBy)}</p>
        <div class="content" itemprop="articleBody">${parseWiki(page.content)}</div>
        <button class="edit-btn" id="edit-btn">Edit</button>
        <button class="delete-btn" id="delete-btn">Delete Page</button>
        <div class="semantic-status">✔️ Semantic HTML Loaded for ${escapeHTML(title)}</div>
      </article>
    `;
    document.getElementById('edit-btn')?.addEventListener('click', () => editPage(title));
    document.getElementById('delete-btn')?.addEventListener('click', () => deletePage(title));
    location.hash = `#${encodeURIComponent(title)}`;
  }
  function editPage(title) {
    console.log("Editing page:", title);
    const user = getCurrentUser();
    if (!user) { console.error("You must be logged in to edit sections."); speak("You must be logged in to edit pages."); return; }
    const pages = loadData(STORAGE_KEYS.pages, {});
    const page = pages[title];
    const c = document.getElementById('page-container');
    if (!c) return;
    c.innerHTML = `<section class="page">
      <h2>Editing: ${escapeHTML(title)}</h2>
      <p style="font-size: 0.85rem; color: #6c757d;">Using simple wiki markup. See Formatting Examples for help.</p>
      <textarea class="editor">${escapeHTML(page.content)}</textarea>
      <button class="edit-btn" id="save-page-btn">Save Changes</button>
      <button class="delete-btn" id="cancel-edit-btn">Cancel</button>
    </section>`;
    document.getElementById('save-page-btn')?.addEventListener('click', () => savePage(title));
    document.getElementById('cancel-edit-btn')?.addEventListener('click', () => showPage(title));
    document.querySelector('.editor')?.focus();
  }
  function savePage(title) {
    console.log("Saving page:", title);
    const pages = loadData(STORAGE_KEYS.pages, {});
    const changes = loadData(STORAGE_KEYS.changes, []);
    const user = getCurrentUser();
    const editor = document.querySelector('.editor');
    if (!editor) { console.error("Editor not found."); return; }
    
    const rawContent = editor.value;

    pages[title].content = rawContent; // Save raw content
    pages[title].lastEdited = new Date().toISOString();
    pages[title].createdBy = user ? user.name : 'Guest';
    
    saveData(STORAGE_KEYS.pages, pages);
    changes.unshift({ type:'edit', title, time:new Date().toISOString(), user:user?user.name:'Guest'});
    saveData(STORAGE_KEYS.changes, changes);
    
    console.log("✅ Page saved.");
    speak(`Page ${title} saved.`);
    updatePageList();
    showPage(title);
  }

function answerAI(query) {
    console.log("Search query:", query);
    const txt = query.trim();
    if (!txt) return;
    
    const pages = loadData(STORAGE_KEYS.pages, {});
    const titles = Object.keys(pages);
    const queryLower = txt.toLowerCase();

    // 1. Exact match check
    if (pages[txt]) {
        showPage(txt);
        return;
    }
    
    // 2. Fuzzy match (filter existing pages)
    const suggestedTitles = titles.filter(t => t.toLowerCase().includes(queryLower));

    const c = document.getElementById('page-container');
    if (!c) return;

    if (suggestedTitles.length) {
      // If suggestions exist, show them
      c.innerHTML = `<section class="page">
        <h2>Closest matches for "${escapeHTML(txt)}"</h2>
        <p>Found ${suggestedTitles.length} pages matching your query:</p>
        <ul>${suggestedTitles.map(t => `<li><a href="#" class="suggest-link" data-title="${t}" onclick="showPage('${t}')">${escapeHTML(t)}</a></li>`).join('')}</ul>
        <p>Or you can create a new page.</p>
        <button class="edit-btn" onclick="createPage('${escapeHTML(txt)}')">Create Page "${escapeHTML(txt)}"</button>
      </section>`;
      speak(`Found ${suggestedTitles.length} similar pages for ${txt}.`);
    } else {
      // If no match, prompt creation
      c.innerHTML = `<section class="page">
        <h2>No page found for "${escapeHTML(txt)}"</h2>
        <p>There are no existing pages that match your search query. Would you like to create this page?</p>
        <button class="edit-btn" onclick="createPage('${escapeHTML(txt)}')">Create Page "${escapeHTML(txt)}"</button>
      </section>`;
      speak(`No local page found for ${txt}.`);
    }
    location.hash = "#search"; // Set hash to indicate a search result page
  }
  function updateConnectionStatus() {
    const el = document.getElementById('status-indicator');
    const banner = document.getElementById('offline-message');
    const online = navigator.onLine;
    if (el) el.textContent = online ? '🟢 Online' : '🔴 Offline';
    if (banner) banner.style.display = online ? 'none' : 'block';
  }

  function resetHashAndScroll(hash = "#main") {
    // Clear the hash first to prevent default scroll
    history.replaceState(null, null, ' ');
    location.hash = hash;
    // Force scroll to top
    setTimeout(() => {
      window.scrollTo(0, 0);
      document.body.scrollTop = 0;
      document.documentElement.scrollTop = 0;
      const main = document.getElementById("main");
      if (main) main.scrollTop = 0;
    }, 50);
  }

  document.addEventListener('DOMContentLoaded', () => {
    applyThemeFromStorage();
    setupAuth();
    restoreSidebarState(); // Call after setupAuth for proper element display
    updateConnectionStatus();
    updateStorageBar();
    createExampleWikiPage();
    ensureMainPage();
    updatePageList(); // CRITICAL: Populate the page list on load

    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('offline', updateConnectionStatus);
    window.addEventListener('hashchange', () => {
      const hash = decodeURIComponent(location.hash.slice(1));
      if (hash === "main") showPage("Main Page");
      else if (hash === "settings") showSettings();
      else if (hash === "about") showAbout();
      else if (hash === "recent") showRecent();
      else if (hash === "profile") showProfile();
      else if (hash && hash !== "search" && hash !== "notfound") { 
          showPage(hash); 
      } else {
          // Handle cases where hash is cleared or is a special state
      }
    });

    document.getElementById('menu-btn')?.addEventListener('click', toggleSidebar);
    
    // Search button listener
    document.getElementById('ai-button')?.addEventListener('click', () => {
      const inp = document.getElementById('ai-input');
      if (inp && inp.value.trim()) {
        answerAI(inp.value.trim());
        inp.value = '';
      }
    });
	
    // Enter key submission in search box
    document.getElementById('ai-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('ai-button')?.click();
      }
    });
	
    document.getElementById('create-page-btn')?.addEventListener('click', e => {
      e.preventDefault();
      createPage();
    });

    document.getElementById('profile-link')?.addEventListener('click', e => { e.preventDefault(); showProfile(); });

    // Initial page load based on hash or default
    const initialHash = decodeURIComponent(location.hash.slice(1));
    if (initialHash && initialHash !== "search" && initialHash !== "notfound") {
      if (initialHash === "main") showPage("Main Page");
      else if (initialHash === "settings") showSettings();
      else if (initialHash === "about") showAbout();
      else if (initialHash === "recent") showRecent();
      else if (initialHash === "profile") showProfile();
      else showPage(initialHash); 
    } else {
        showPage("Main Page");
    }

    // SW Registration (kept for completeness as the user provided the sw.js content)
    if ('serviceWorker' in navigator) {
      // sw.js is not provided in a separate file, so registration might fail if not manually created
      // Assuming a valid sw.js is available at the root for a full PWA experience
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('✅ Service Worker registered'))
        .catch(err => console.error('❌ SW registration failed:', err));
    }
  });
