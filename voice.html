<body style="background-color:black;">

<fieldset style="width:305px;">
<center>
<br>
<div id="inputWrapper">
<form
id="searchForm"
action="./#search" 
method="get"
>	
<div id="inputWrapper">
<input
style="position:absolute;top:25px;left:90px;width:150px;"
id="filterInput"
onkeyup="titleInput()"
autocomplete="true"
autocorrect="off"  
autocapitalize="off" 
spellcheck="true"
type="text" 
name="q"
maxlength="524288" 
value=""
aria-label="search"  
placeholder="type Map Scene and click new button" 
required>
</div>		

<button 
    id="micButton" 
    type="button" 
    style="position:absolute; top:25px; left:250px; width:30px; height:20px; font-size: 8px; cursor: pointer;"
>
    🎤
</button>

</form>

<script>
// I. Set Initial URL Hash
if (window.location.hash === '') {
    window.location.hash = '#search';
}

// II. Original titleInput function (for filtering and speech on keyup)
function titleInput() {
    
  let input = document.getElementById('filterInput').value;

  input = input.toLowerCase();

  let x = document.getElementsByClassName('titleInput');
 
  for (i = 0; i < x.length; i++) {
    const buttonText = x[i].querySelector('button').textContent.toLowerCase();

    if (!buttonText.includes(input)) {
      x[i].parentNode.style.display = "none";
    }
    else {
      x[i].parentNode.style.display = "list-item";
    }
  }
  
let msg = new SpeechSynthesisUtterance(input); 
window.speechSynthesis.speak(msg);   
}


// III. Function to add keyword button
function addKeywordButton(keyword) {
    if (keyword.trim() === '') return;

    // Check for dynamic page creation commands (Logic in voice.js)
    if (typeof handleMapSceneCommand === 'function' && handleMapSceneCommand(keyword, createLinkButton)) {
        return; 
    }
    
    // --- Standard Logic for creating a new keyword button ---
    const list = document.getElementById('filterInputList');
    
    const listItem = document.createElement('li');
    const link = document.createElement('a');
    link.href = `#${encodeURIComponent(keyword)}`;
    link.className = 'titleInput'; 
    
    const button = document.createElement('button');
    button.textContent = keyword.trim();
    
    link.appendChild(button);
    listItem.appendChild(link);
    list.appendChild(listItem);

    let msg = new SpeechSynthesisUtterance("Keyword added: " + keyword.trim()); 
    window.speechSynthesis.speak(msg); 
}

// IV. Event Listener for 'Enter' key on the search input
document.getElementById('searchForm').addEventListener('submit', function(event) {
    event.preventDefault(); 
    
    const inputElement = document.getElementById('filterInput');
    const keyword = inputElement.value;
    
    if (keyword.trim() !== '') {
        addKeywordButton(keyword);
        inputElement.value = ''; 
    }
});


// V. Web Speech API Implementation (Modern Standard)
let recognition = null;

// Check for browser compatibility
if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false; 
    recognition.maxAlternatives = 1;

    // --- Recognition Handlers ---

    recognition.onresult = function(event) {
        const inputElement = document.getElementById('filterInput');
        // Get the final transcript
        const speechResult = event.results[0][0].transcript;
        
        // 1. Set the input field value
        inputElement.value = speechResult;
        
        // 2. Automatically process the command (simulates hitting Enter)
        // Ensure this happens AFTER the value is set
        addKeywordButton(speechResult);
        
        // 3. Clear the input after processing the command
        inputElement.value = '';
    };

    recognition.onstart = function() {
        document.getElementById('micButton').textContent = '🔴';
    };

    recognition.onend = function() {
        document.getElementById('micButton').textContent = '🎤';
    };

    recognition.onerror = function(event) {
        console.error('Speech recognition error:', event.error);
        alert('Voice Error: ' + event.error + '. Check your browser permissions and ensure you are using a secure context (HTTPS or localhost).');
        document.getElementById('micButton').textContent = '🎤';
    };

    // --- Button Listener ---
    document.getElementById('micButton').addEventListener('click', () => {
        try {
            recognition.start();
        } catch (e) {
            if (e.name !== 'InvalidStateError') {
                console.error('Error starting recognition:', e);
            }
        }
    });

} else {
    // Fallback for incompatible browsers
    document.addEventListener('DOMContentLoaded', () => {
        const micButton = document.getElementById('micButton');
        if (micButton) {
            micButton.textContent = '❌';
            micButton.disabled = true;
            micButton.title = 'Speech Recognition not supported in this browser.';
        }
    });
}

</script>
