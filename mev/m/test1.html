<!DOCTYPE html>
<html lang="en">
<head>
    <title>MEV - Cosmic Depth Integration</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/mev/m/files/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        .content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        #time-ui { position: fixed; top: 20px; left: 20px; z-index: 1000; display: none; } /* Only visible at Earth level */
    </style>
</head>
<body>
    <div id="time-ui">
        <div id="time-container">
            <strong>AI INTERNAL CLOCK</strong>
            <input type="datetime-local" id="ai-datetime">
            <div id="display-time">Syncing...</div>
        </div>
        <div id="info"><button class="infobox" onclick="window.open('/mev/m/players.html')">PLAY</button></div>
    </div>

    <div class="content"></div> <script src="TagCloud.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "./examples/build/three.webgpu.js",
                "three/webgpu": "./examples/build/three.webgpu.js",
                "three/tsl": "./examples/build/three.tsl.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls;
        let sun, earth, blackHole, particles;
        const particleData = [];

        init();

        function init() {
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 500, 1500);
            scene = new THREE.Scene();

            // 1. THE BLACK HOLE (The Void)
            const bhGeom = new THREE.SphereGeometry(50, 32, 32);
            const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            blackHole = new THREE.Mesh(bhGeom, bhMat);
            scene.add(blackHole);

            // 2. THE SWIRLING DOTS (The Queue Physics)
            const starGeom = new THREE.BufferGeometry();
            const starCount = 5000;
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i<starCount; i++) {
                particleData.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: 200 + Math.random() * 1000,
                    speed: 0.002 + Math.random() * 0.005,
                    isFalling: true
                });
            }
            starGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particles = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 2 }));
            scene.add(particles);

            // 3. THE SUN (Yellow Sphere)
            sun = new THREE.Mesh(new THREE.SphereGeometry(40, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            scene.add(sun);

            // 4. THE EARTH (Green Glow Sphere)
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(15, 32, 32), 
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x003300 })
            );
            scene.add(earth);

            renderer = new THREE.WebGPURenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // --- INTERACTION ---
            window.addEventListener('mousedown', (e) => {
                const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                
                if (raycaster.intersectObject(sun).length > 0) zoomToEarth();
                if (raycaster.intersectObject(earth).length > 0) showOriginalScene();
            });
        }

        function zoomToEarth() {
            // Logic to move camera to view Earth orbiting Sun
            controls.minDistance = 200;
            controls.maxDistance = 600;
            camera.position.set(0, 100, 400);
        }

        function showOriginalScene() {
            // Reveal the UI and zoom into the "City" distance
            document.getElementById('time-ui').style.display = 'block';
            controls.minDistance = 50;
            camera.position.set(100, 50, 100);
        }

        function animate() {
            const time = Date.now() * 0.001;
            
            // Sun Orbits Black Hole
            sun.position.x = Math.cos(time * 0.1) * 800;
            sun.position.z = Math.sin(time * 0.1) * 800;

            // Earth Orbits Sun
            earth.position.x = sun.position.x + Math.cos(time) * 150;
            earth.position.z = sun.position.z + Math.sin(time) * 150;

            // Particles Swirl & Fall Queue Logic
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<particleData.length; i++) {
                let p = particleData[i];
                if(p.isFalling) {
                    p.radius -= 1.5; // Gravity pull
                    if(p.radius < 55) { // "Falls in"
                        p.isFalling = false;
                        p.radius = 1500; // Thrown away to back of the line
                    }
                } else {
                    p.radius = THREE.MathUtils.lerp(p.radius, 1200, 0.01);
                    if(p.radius < 1210) p.isFalling = true; // Wait turn
                }
                p.angle += p.speed;
                positions[i*3] = Math.cos(p.angle) * p.radius;
                positions[i*3+1] = (Math.random() - 0.5) * 10;
                positions[i*3+2] = Math.sin(p.angle) * p.radius;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.setAnimationLoop(() => {
                controls.update();
                renderer.render(scene, camera);
            });
        }
        animate();
    </script>
</body>
</html>
