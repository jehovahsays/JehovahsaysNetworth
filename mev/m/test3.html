<!DOCTYPE html>
<html lang="en">
<head>
    <title>MEV - Merged Cosmic Subconscious</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/mev/m/files/main.css">
    <style>
        /* Farthest distance is Gray as requested */
        body { margin: 0; overflow: hidden; background-color: #222; }
        
        #time-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        #nav-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            text-align: center;
        }

        .infobox-link {
            display: inline-block;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 12px 24px;
            border: 1px solid #0f0;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            text-decoration: none;
            margin: 5px;
            pointer-events: auto;
            text-transform: uppercase;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="time-container">
        <strong>AI INTERNAL CLOCK</strong>
        <input type="datetime-local" id="ai-datetime">
        <div id="display-time" style="margin-top:10px; font-size: 11px;">Syncing Subconscious...</div>
    </div>

    <div id="nav-overlay">
        <a href="#" id="zoom-sun-btn" class="infobox-link" style="display:none;">View Solar System</a>
        <a href="#" id="zoom-earth-btn" class="infobox-link" style="display:none;">Land on Earth</a>
        <a href="/mev/m/players.html" id="play-btn" class="infobox-link" style="display:none;">Play Scene</a>
    </div>

    <div class="content"></div> <script>
        (function () {
            if (!navigator.gpu) console.error('WebGPU not supported.');
        })();
    </script>

    <script src="TagCloud.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "./examples/build/three.webgpu.js",
                "three/webgpu": "./examples/build/three.webgpu.js",
                "three/tsl": "./examples/build/three.tsl.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls, clock;
        let sun, earth, blackHole, particles;
        const particleData = [];
        const texts = ["mercury", "venus", "earth", "mars", "jupiter", "saturn", "uranus", "neptune", "pluto"];

        init();

        function init() {
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 1500, 3000); // Start at Galaxy view

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); // Gray background

            // 1. BLACK HOLE (Milky Way Center)
            blackHole = new THREE.Mesh(
                new THREE.SphereGeometry(80, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x000000 })
            );
            scene.add(blackHole);

            // 2. SWIRLING DOTS (The Queue)
            const starCount = 4000;
            const starGeom = new THREE.BufferGeometry();
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i<starCount; i++) {
                particleData.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: 300 + Math.random() * 1500,
                    speed: 0.005 + Math.random() * 0.01,
                    isFalling: true
                });
            }
            starGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particles = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5 }));
            scene.add(particles);

            // 3. SUN (Yellow Sphere)
            sun = new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            scene.add(sun);

            // 4. EARTH (Green Glowing Sphere)
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(18, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 })
            );
            scene.add(earth);

            // 5. TAG CLOUD
            TagCloud('.content', texts, { radius: 350, keep: true });

            renderer = new THREE.WebGPURenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.addEventListener('change', updateUILayout);

            // Button Logic
            document.getElementById('zoom-sun-btn').onclick = () => { camera.position.set(0, 500, 1200); };
            document.getElementById('zoom-earth-btn').onclick = () => { camera.position.set(200, 100, 300); };
        }

        function updateUILayout() {
            const dist = camera.position.length();
            const tagCloud = document.querySelector('.content');
            
            // UI Visibility based on distance
            document.getElementById('zoom-sun-btn').style.display = (dist > 1800) ? 'inline-block' : 'none';
            document.getElementById('zoom-earth-btn').style.display = (dist <= 1800 && dist > 500) ? 'inline-block' : 'none';
            document.getElementById('play-btn').style.display = (dist <= 500) ? 'inline-block' : 'none';

            // TagCloud Fading
            if (tagCloud) tagCloud.style.opacity = (dist > 1000 || dist < 400) ? "0.2" : "1";
        }

        function animate() {
            const time = Date.now() * 0.0005;

            // Sun Orbits Black Hole
            sun.position.set(Math.cos(time * 0.2) * 1200, 0, Math.sin(time * 0.2) * 1200);

            // Earth Orbits Sun
            earth.position.set(
                sun.position.x + Math.cos(time * 2) * 250,
                0,
                sun.position.z + Math.sin(time * 2) * 250
            );

            // Black Hole Queue Physics
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<particleData.length; i++) {
                let p = particleData[i];
                if(p.isFalling) {
                    p.radius -= 2; 
                    if(p.radius < 90) { // Falls in
                        p.isFalling = false;
                        p.radius = 2000; // Thrown to back of queue
                    }
                } else {
                    p.radius -= 0.5;
                    if(p.radius < 1800) p.isFalling = true;
                }
                p.angle += p.speed;
                positions[i*3] = Math.cos(p.angle) * p.radius;
                positions[i*3+1] = (Math.sin(p.angle * 2) * 50); // Wave effect
                positions[i*3+2] = Math.sin(p.angle) * p.radius;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
