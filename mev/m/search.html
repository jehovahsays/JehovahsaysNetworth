<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge, chrome=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="private, no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Clear-Site-Data" content="*">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<link rel="icon" href="/mev/m/favicon.ico" />

<title>Search Wiki Pages</title>

<style>
body {
    background-color: black;
    color: white;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
}
#search-container {
    max-width: 600px;
    margin: 0 auto;
}
#filterInput {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 1em;
    border-radius: 5px;
    border: 1px solid #333;
    box-sizing: border-box;
    background-color: #222;
    color: peru;
}
#page-list {
    list-style: none;
    padding: 0;
    margin: 0;
}
.titleInput {
    margin: 5px 0;
    animation: fadeIn 0.5s ease-in-out;
}
.titleInput button {
    width: 100%;
    padding: 10px;
    text-align: left;
    background-color: #3366cc;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1.0em;
    transition: background-color 0.2s;
}
.titleInput button:hover {
    background-color: #254a9e;
}
@keyframes fadeIn {
   from { opacity: 0; transform: translateY(-10px); }
   to   { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>

<div id="search-container">
    <form action="#search">	
        <input
            id="filterInput"
            onkeyup="titleInput()"
            autocomplete="off"
            autocorrect="off"  
            autocapitalize="off" 
            spellcheck="false"
            type="text" 
            placeholder="Search wiki pages..." 
            aria-label="#search" 
            required>
    </form>
    
    <ul id="page-list"></ul>
    
    <div id="status-message" style="color: #ccc; margin-top: 10px;"></div>
</div>

<script>
    const STORAGE_KEYS = {
        pages: 'wiki_pages',
    };

    function loadData(key, defaultVal) {
        try {
            const v = localStorage.getItem(key);
            return v ? JSON.parse(v) : defaultVal;
        } catch {
            return defaultVal;
        }
    }

    function generatePageButtons() {
        const listEl = document.getElementById('page-list');
        listEl.innerHTML = '';
        const pages = loadData(STORAGE_KEYS.pages, {});
        
        const staticLinks = [
            { title: "Main Page", hash: "main" },
            { title: "Recent Changes", hash: "recent" },
            { title: "Settings", hash: "settings" },
            { title: "About", hash: "about" }
        ];

        staticLinks.forEach(link => {
            listEl.appendChild(createButtonElement(link.title, link.hash, true));
        });

        const titles = Object.keys(pages).sort();
        titles.forEach(title => {
            listEl.appendChild(createButtonElement(title, encodeURIComponent(title), false));
        });

        document.getElementById('status-message').textContent = 
            `Total Wiki Pages Found: ${titles.length}`;
        
        titleInput();
    }

    function createButtonElement(title, hash, isStatic) {
        const li = document.createElement('li');
        li.className = 'titleInput';
        li.setAttribute('data-static', isStatic); 

        const button = document.createElement('button');
        button.textContent = title;
        button.onclick = () => {
            window.location.href = `../mev/#${hash}`;
        };

        li.appendChild(button);
        return li;
    }

    function titleInput() {
        const input = document.getElementById('filterInput').value.toLowerCase().trim();
        const items = document.querySelectorAll('#page-list .titleInput');
        let visibleCount = 0;

        items.forEach(li => {
            const buttonText = li.querySelector('button').textContent.toLowerCase();
            
            if (buttonText.includes(input)) {
                li.style.display = "list-item";
                visibleCount++;
            } else {
                li.style.display = "none";
            }
        });

        document.getElementById('status-message').textContent = 
            `Pages Matching "${input}": ${visibleCount}`;
        
        if (window.location.hash !== '#search') {
            window.location.hash = '#search';
        }
    }

    window.titleInput = titleInput;

    document.addEventListener('DOMContentLoaded', () => {
        if (window.location.hash !== '#search') {
            history.replaceState(null, null, `${window.location.pathname}#search`);
        }

        generatePageButtons();

        // ✅ FIX: Handle "Enter" key / form submit
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault();

            const input = document.getElementById('filterInput').value.toLowerCase().trim();
            const items = document.querySelectorAll('#page-list .titleInput');

            for (const li of items) {
                const button = li.querySelector('button');
                if (!button) continue;

                const text = button.textContent.toLowerCase();
                if (text.includes(input)) {
                    const hash = encodeURIComponent(button.textContent.trim());
                    window.location.href = `../mev/#${hash}`;
                    return;
                }
            }

            alert('No matching page found.');
        });
    });
</script>


</body>
</html>
