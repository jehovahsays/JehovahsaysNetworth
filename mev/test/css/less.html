<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MEV Wiki – Offline Encyclopedia. Learn, edit, explore." />
    <meta name="theme-color" content="#3366cc" />
    <meta name="color-scheme" content="light dark" />

    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"> 

    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./assets/icons/icon-192.png" type="image/png">
	
    <title>index</title>
    
    <style>
        body { 
            background-color: black; 
            color: white; 
            font-family: monospace; 
            margin: 0; 
            padding: 20px;
        }

        /* --- UI NAVIGATION CONTROLS --- */
        .menu-container {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-align: center;
        }

        #searchBox {
            width: 250px;
            padding: 8px;
            background: #111;
            border: 1px solid #333;
            color: peru;
            font-family: monospace;
            font-size: 12px;
            text-transform: lowercase;
            margin-bottom: 5px;
            outline: none;
        }

        #menu-toggle { display: none; }
        .search-label {
            display: block;
            width: 266px; 
            padding: 5px;
            background: #111;
            border: 1px solid #333;
            color: #666; 
            cursor: pointer;
            font-size: 10px;
            text-transform: lowercase;
        }

        .dropdown-content {
            display: none;
            list-style: none;
            padding: 0;
            margin: 0;
            background: #111;
            border: 1px solid #333;
            width: 266px;
        }

        .dropdown-content li a {
            display: block;
            padding: 10px;
            color: peru;
            text-decoration: none;
            border-bottom: 1px solid #222;
        }

        #menu-toggle:checked ~ .dropdown-content { display: block; }

        /* --- ARTICLE DISPLAY LOGIC --- */
        #linkList {
            margin-top: 100px;
            padding: 0;
            list-style: none;
        }

        .titleInput {
            margin-bottom: 40px;
            display: none; 
        }

        .titleInput button {
            background: #222;
            color: peru;
            border: 1px solid #444;
            padding: 10px 20px;
            font-family: monospace;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .article-text {
            display: block;
            color: #aaa;
            line-height: 1.6;
            max-width: 600px;
        }

        /* Show only the targeted article via CSS Anchors */
        .titleInput:target, 
        body:not(:has(:target)) #main { 
            display: block !important;
            animation: fadeIn 0.8s forwards;
            border-left: 3px solid peru;
            padding-left: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
	
    <script>
        // The "Conscious" reporting function - FIXED: closed properly and independent
        (function() {
            const report = {
                path: window.location.pathname,
                type: window.location.pathname.endsWith('.html') ? 'html' : 'logic',
                timestamp: Date.now(),
                status: 'correct' 
            };
        })(); 
    </script>	
</head>
<body>


<script>
// Handle Search/Navigation
document.getElementById('searchBox').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const val = this.value.toLowerCase().replace('#', '');
        if (document.getElementById(val)) {
            window.location.hash = val;
            this.value = ''; 
        }
    }
});

function titleInput() {
    let input = document.getElementById('searchBox').value.toLowerCase();
    let items = document.getElementsByClassName('titleInput');
 
    for (let i = 0; i < items.length; i++) {
        // Search text content directly
        if (items[i].innerText.toLowerCase().includes(input)) {
            items[i].style.display = "block";
        } else {
            items[i].style.display = "none";
        }
    }
}

// Default to #main on load
if (!window.location.hash) {
    window.location.hash = 'main';
}
</script>

    <div class="menu-container">
        <input 
            id="searchBox" 
            type="text" 
            onkeyup="titleInput()" 
            placeholder="search database" 
            autocomplete="off"
            autocorrect="off" 
            autocapitalize="off">

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="search-label">click to browse keywords ▼</label>
        
        <ul class="dropdown-content">
            <li><a href="#main">#main</a></li>
            <li><a href="#about">#about</a></li>
        </ul>
    </div>

    <ul id="linkList">
        <li class="titleInput" id="main">
            <a href="#main"><button>#main</button></a>
            <span class="article-text">
                welcome to index. an offline‑first encyclopedia powered by your browser. 
                the external 'purify' library has been removed for maximum autonomy.
            </span>
        </li>

        <li class="titleInput" id="about">
            <a href="#about"><button>#about</button></a>
            <span class="article-text">
                index is an offline‑first encyclopedia. zero-trust logic ensures no 
                unauthorized blobs or external scripts can execute.
            </span>
        </li>
    </ul>


</body>
</html>
