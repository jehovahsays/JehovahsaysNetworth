<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole Database</title>
    <style>
        body { background-color: black; color: peru; font-family: monospace; }
        .titleInput { margin: 5px; display: inline-block; }
        input[type="text"] { font-family: monospace; font-size: 14px; color: peru; background: #222; border: 1px solid peru; padding: 5px; }
        fieldset { border: 1px solid peru; width: 320px; margin: 20px auto; padding: 20px; }
        button { cursor: pointer; background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 4px; }
        button:hover { background: #444; }
        ul#listContainer { list-style: none; padding: 0; text-align: center; }
    </style>
</head>
<body>
    <center>
        <fieldset>
            <legend>Blackhole System</legend>
            <!-- Updated action path to go up one level to reach action.php at localhost/action.php -->
            <form id="secure-form-answer" action="../action.php" method="post">	
                <input
                    id="filterInput"
                    onkeyup="titleInput()"
                    autocomplete="off"
                    type="text" 
                    name="secure-form-answer-Human"
                    placeholder="Search or add keyword" 
                    required>
                <p style="font-size: 0.8em;">Press Enter to add to database</p>
            </form>
        </fieldset>

        <ul id="listContainer">
            <a href="sun.html" class="titleInput"><button>sun</button></a>
            <a href="mercury.html" class="titleInput"><button>mercury</button></a>
            <a href="venus.html" class="titleInput"><button>venus</button></a>
            <a href="earth.html" class="titleInput"><button>earth</button></a>
            <a href="mars.html" class="titleInput"><button>mars</button></a>
            <a href="jupiter.html" class="titleInput"><button>jupiter</button></a>
            <a href="saturn.html" class="titleInput"><button>saturn</button></a>
            <a href="uranus.html" class="titleInput"><button>uranus</button></a>
            <a href="neptune.html" class="titleInput"><button>neptune</button></a>
            <a href="pluto.html" class="titleInput"><button>pluto</button></a>
        </ul>
    </center>

    <script>
        function titleInput() {
            let input = document.getElementById('filterInput').value.toLowerCase();
            let x = document.getElementsByClassName('titleInput');
            
            for (let i = 0; i < x.length; i++) {
                if (!x[i].innerText.toLowerCase().includes(input)) {
                    x[i].style.display = "none";
                } else {
                    x[i].style.display = "inline-block";
                }
            }
            
            // Speech synthesis for feedback
            if(input.length > 3) {
                var msg = new SpeechSynthesisUtterance(input); 
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
