<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEV Security Lab - Interactive Simulation</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0a0a0a; color: #00ff41; padding: 20px; }
        .lab-container { border: 2px solid #00ff41; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #00ff41; }
        .status-box { background: #1a1a1a; padding: 10px; margin: 15px 0; border-left: 5px solid #00ff41; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; width: 80%; }
        button { background: #00ff41; color: #000; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #ffffff; }
        .warning { color: #ff3e3e; border-color: #ff3e3e; }
    </style>
</head>
<body>
    <div class="lab-container">
        <h1>MEV SECURITY LAB</h1>
        <p>Simulation: Intercepting Fist vs. Next.js Vulnerabilities</p>

        <div class="status-box" id="status-display">
            STATUS: INITIALIZING SUBCONSCIOUS...
        </div>

        <h3>[03_HUMAN_GATE]</h3>
        <p>Enter the secret known only to the human:</p>
        <input type="text" id="gate-input" placeholder="Enter Secret Key...">
        <br>
        <button onclick="handleVerify()">UNLOCK GATE</button>

        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <h3>[04_ATTACK_SIMULATION]</h3>
        <p>Attempt to bypass the UI as a 'Bad Bot' would:</p>
        <button onclick="simulateBypass()" style="background: #ff3e3e;">TRIGGER BYPASS ATTACK</button>
    </div>

    <script src="./02_interceptor.js"></script>

    <script>
        const display = document.getElementById('status-display');

        function updateUI() {
            if (MEV_Interceptor.checkIdentity()) {
                display.innerText = "STATUS: VERIFIED HUMAN - GATE OPEN";
                display.style.borderColor = "#00ff41";
            } else {
                display.innerText = "STATUS: UNVERIFIED - INTERCEPTOR ACTIVE";
                display.style.borderColor = "#ff3e3e";
            }
        }

function handleVerify() {
    const input = document.getElementById('gate-input').value;
    const CORRECT_KEY = "MEV_PROTECTION_2026";

    if (input === CORRECT_KEY) {
        // Set the subconscious memory directly
        localStorage.setItem('mev_human_verified', 'true');
        alert("Identity Confirmed. Entering the Lab...");
        window.location.href = "./success.html"; 
    } else {
        alert("Incorrect Key. Interceptor remains on high alert.");
    }
}

        function simulateBypass() {
            // If the user isn't verified, the Interceptor reflects them
            if (!MEV_Interceptor.checkIdentity()) {
                alert("INTERCEPTION DETECTED! Redirecting force to localhost...");
                MEV_Interceptor.reflect();
            } else {
                alert("Success: You are already verified. The 'Fist' stands down.");
            }
        }

        // Run on load
        updateUI();
    </script>
</body>
</html>
