    errorDiv.style.width = '100%';
    errorDiv.style.backgroundColor = '#ff4c4c';

    errorDiv.style.fontFamily = 'Arial, sans-serif';

    errorDiv.style.zIndex = '9999';

    errorDiv.textContent = msg;
    document.body.appendChild(errorDiv);
  }

  // WebGL check
  const canvas = document.createElement('canvas');
  const webgl = !!(window.WebGLRenderingContext && (
    canvas.getContext('webgl') || canvas.getContext('experimental-webgl')
  ));
  if (!webgl) {
    document.addEventListener('DOMContentLoaded', function () {
      showError('WebGL is not supported or disabled in your browser. Please enable it or switch to a supported browser.');
    });
  }

  // WebGPU check
  if (!navigator.gpu) {
    document.addEventListener('DOMContentLoaded', function () {
      showError('WebGPU is not supported in your browser. Please use a browser like Chrome Canary with WebGPU enabled.');
    });
  }
})();
</script>

    <script type="module">
        import * as THREE from 'three';
        import Stats from 'three/addons/libs/stats.module.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let container, stats, clock, gui, mixer, actions, activeAction, previousAction, camera, scene, renderer, model, controls;
        let moveX = 0, moveZ = 0; 
        let lookX = 0, lookY = 0; 
        let characterRotationY = 0; 
        
        let orbitControls;
        let orbitMode = false;
        let cameraTarget = new THREE.Vector3(0, 0, 0);
        let cameraOffset = new THREE.Vector3(-1, 8, -25);

        let playerScore = 0;
        let playerHealth = 3;
        let playerSize = 1.0;
        let bullets = [];
        let boss = null;
        let bossHealth = 5;
        let bossAttackTimer = 0;
        let gameActive = true;

function createBoss() {
  const geometry = new THREE.BoxGeometry(5, 5, 5);
  const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
  boss = new THREE.Mesh(geometry, material);
  boss.position.set(0, 5, -20);
  scene.add(boss);
  bossHealth = 5;
}

// CORRECTED: createBullet logic
function createBullet(position, direction) {
  const geometry = new THREE.SphereGeometry(0.5, 8, 8);
  const material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
  const bullet = new THREE.Mesh(geometry, material);
  
  // Start bullet slightly higher (waist/chest height of the model)
  bullet.position.set(position.x, position.y + 2, position.z);
  
  bullet.direction = direction.normalize();
  bullet.speed = 2.0;
  bullet.isPlayerBullet = true;
  
  scene.add(bullet);
  bullets.push(bullet);
}

function createBossBullet() {
  if (!boss || !gameActive || !model) return;
  
  const geometry = new THREE.SphereGeometry(0.8, 8, 8);
  const material = new THREE.MeshBasicMaterial({ color: 0xff4500 });
  const bullet = new THREE.Mesh(geometry, material);
  
  bullet.position.copy(boss.position);
  
  const direction = new THREE.Vector3();
  // Boss targets the robot model, not the camera
  direction.subVectors(model.position, boss.position).normalize();
  
  bullet.direction = direction;
  bullet.speed = 1.0;
  bullet.isPlayerBullet = false;
  
  scene.add(bullet);
  bullets.push(bullet);
}

function updateBullets(deltaTime) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const bullet = bullets[i];
    
    bullet.position.x += bullet.direction.x * bullet.speed;
    bullet.position.y += bullet.direction.y * bullet.speed;
    bullet.position.z += bullet.direction.z * bullet.speed;
    
    // Check range based on robot position
    if (model && bullet.position.distanceTo(model.position) > 100) {
      scene.remove(bullet);
      bullets.splice(i, 1);
      continue;
    }
    
    if (bullet.isPlayerBullet) {
      if (boss && bullet.position.distanceTo(boss.position) < 3) {
        bossHealth--;
        scene.remove(bullet);
        bullets.splice(i, 1);
        
        if (bossHealth <= 0) {
          scene.remove(boss);
          boss = null;
          playerScore += 10;
          playerSize += 0.2;
          updatePlayerSize();
          showNotification("You defeated the boss! +10 points");
          setTimeout(createBoss, 5000);
        }
      }
    } else {
      // Robot hit detection
      if (model && bullet.position.distanceTo(model.position) < 2) {
        playerHealth--;
        scene.remove(bullet);
        bullets.splice(i, 1);
        
        if (playerHealth <= 0) {
          gameActive = false;
          playerScore -= 5;
          showNotification("You died! -5 points");
          showRespawnButton();
        }
      }
    }
  }
}

function updateBoss(deltaTime) {
  if (!boss || !gameActive || !model) return;
  
  boss.position.y = 5 + Math.sin(Date.now() * 0.001) * 2;
  boss.position.x = Math.sin(Date.now() * 0.0005) * 10;
  
  boss.lookAt(model.position);
  
  bossAttackTimer += deltaTime;
  if (bossAttackTimer > 2) { 
    createBossBullet();
    bossAttackTimer = 0;
  }
}

function updatePlayerSize() {
  if (model) {
    model.scale.set(playerSize, playerSize, playerSize);
  }
}

function createUI() {
  const scoreElement = document.createElement('div');
  scoreElement.id = 'scoreDisplay';
  scoreElement.style.position = 'absolute';
  scoreElement.style.top = '10px';
  scoreElement.style.left = '10px';
  scoreElement.style.color = 'white';
  scoreElement.style.fontFamily = 'Arial, sans-serif';
  scoreElement.style.fontSize = '18px';
  scoreElement.style.fontWeight = 'bold';
  document.body.appendChild(scoreElement);
  
  const healthElement = document.createElement('div');
  healthElement.id = 'healthDisplay';
  healthElement.style.position = 'absolute';
  healthElement.style.top = '40px';
  healthElement.style.left = '10px';
  healthElement.style.color = 'white';
  healthElement.style.fontFamily = 'Arial, sans-serif';
  healthElement.style.fontSize = '18px';
  healthElement.style.fontWeight = 'bold';
  document.body.appendChild(healthElement);
  
  const notificationElement = document.createElement('div');
  notificationElement.id = 'notification';
  notificationElement.style.position = 'absolute';
  notificationElement.style.top = '50%';
  notificationElement.style.left = '50%';
  notificationElement.style.transform = 'translate(-50%, -50%)';
  notificationElement.style.color = 'white';
  notificationElement.style.fontFamily = 'Arial, sans-serif';
  notificationElement.style.fontSize = '24px';
  notificationElement.style.fontWeight = 'bold';
  notificationElement.style.textAlign = 'center';
  notificationElement.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
  notificationElement.style.padding = '20px';
  notificationElement.style.borderRadius = '10px';
  notificationElement.style.display = 'none';
  document.body.appendChild(notificationElement);
}

function updateUI() {
  const scoreElement = document.getElementById('scoreDisplay');
  const healthElement = document.getElementById('healthDisplay');
  if (scoreElement) scoreElement.textContent = `Score: ${playerScore}`;
  if (healthElement) healthElement.textContent = `Health: ${playerHealth}`;
}

function showNotification(message) {
  const notificationElement = document.getElementById('notification');
  if (notificationElement) {
    notificationElement.textContent = message;
    notificationElement.style.display = 'block';
    setTimeout(() => {
      notificationElement.style.display = 'none';
    }, 3000);
  }
}

function showRespawnButton() {
  const respawnButton = document.createElement('button');
  respawnButton.id = 'respawnButton';
  respawnButton.textContent = 'Respawn';
  respawnButton.style.position = 'absolute';
  respawnButton.style.top = '60%';
  respawnButton.style.left = '50%';
  respawnButton.style.transform = 'translate(-50%, -50%)';
  respawnButton.style.padding = '10px 20px';
  respawnButton.style.fontSize = '20px';
  respawnButton.style.backgroundColor = '#4CAF50';
  respawnButton.style.color = 'white';
  respawnButton.style.border = 'none';
  respawnButton.style.borderRadius = '5px';
  respawnButton.style.cursor = 'pointer';
  respawnButton.addEventListener('click', respawnPlayer);
  document.body.appendChild(respawnButton);
}

function respawnPlayer() {
  playerHealth = 100;
  gameActive = true;
  const respawnButton = document.getElementById('respawnButton');
  if (respawnButton) respawnButton.remove();
}

// CORRECTED: Shooting logic uses character direction
function handlePlayerShoot() {
  if (gameActive && model) {
    // Get direction based on robot's rotation
    const direction = new THREE.Vector3(0, 0, 1); 
    direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
    
    createBullet(model.position.clone(), direction);
  }
}

document.addEventListener('keydown', (event) => {
  if (event.code === 'Space') handlePlayerShoot();
});

document.addEventListener('mousedown', (event) => {
    // Only fire if not clicking on GUI or joysticks
    if (event.target.tagName !== 'BUTTON' && !event.target.closest('.joystick-container')) {
        handlePlayerShoot();
    }
});

function initGameEnhancements() {
  createUI();
  createBoss();
  setupDualJoysticks();
}

const api = { state: 'Walking' };

function createCity() {
    const numBuildings = 50; 
    const buildingMaterial = new THREE.MeshPhongMaterial({ color: 0x555555 });
    for (let i = 0; i < numBuildings; i++) {
        const width = Math.random() * 2 + 1;
        const height = Math.random() * 10 + 5;
        const depth = Math.random() * 2 + 1;
        const buildingGeometry = new THREE.BoxGeometry(width, height, depth);
        const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
        building.position.set(Math.random() * 100 - 50, height / 2, Math.random() * 100 - 50);
        scene.add(building);
    }
}

function init() {
    container = document.createElement('div');
    document.body.appendChild(container);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.25, 100);
    camera.position.set(-1, 8, -25);
    camera.lookAt(0, -2, 0);

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe0e0e0);
    scene.fog = new THREE.Fog(0xe0e0e0, 20, 100);

    clock = new THREE.Clock();

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 3);
    hemiLight.position.set(0, 20, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(0, 20, 10);
    scene.add(dirLight);

    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0xcbcbcb, depthWrite: false }));
    mesh.rotation.x = -Math.PI / 2;
    scene.add(mesh);

    const grid = new THREE.GridHelper(200, 40, 0x000000, 0x000000);
    grid.material.opacity = 0.2;
    grid.material.transparent = true;
    scene.add(grid);
    
    createCity();

    const loader = new GLTFLoader();
    loader.load('./examples/models/gltf/RobotExpressive/RobotExpressive.glb', function (gltf) {
        model = gltf.scene;
        scene.add(model);
        createGUI( model, gltf.animations );
        setupOrbitControls();
    });

    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setAnimationLoop(animate);
    container.appendChild(renderer.domElement);

    window.addEventListener('resize', onWindowResize);
    setupOrbitToggle();
    initGameEnhancements(); 
}

function setupOrbitControls() {
    orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.05;
    orbitControls.minDistance = 5;
    orbitControls.maxDistance = 50;
    orbitControls.enabled = false;
    if (model) orbitControls.target.copy(model.position);
}

function setupOrbitToggle() {
    const toggleButton = document.getElementById('orbit-toggle');
    const infoPanel = document.getElementById('orbit-controls-info');
    if(!toggleButton) return;
    
    toggleButton.addEventListener('click', () => {
        orbitMode = !orbitMode;
        toggleButton.textContent = `Orbit Mode: ${orbitMode ? 'ON' : 'OFF'}`;
        
        const controlsUI = [document.getElementById('joystick-left'), document.getElementById('joystick-right'), document.getElementById('fire-button')];
        
        if (orbitMode) {
            if (model) orbitControls.target.copy(model.position);
            orbitControls.enabled = true;
            infoPanel.style.display = 'block';
            controlsUI.forEach(el => el.style.display = 'none');
        } else {
            orbitControls.enabled = false;
            infoPanel.style.display = 'none';
            controlsUI.forEach(el => el.style.display = 'flex');
        }
    });
}

function setupDualJoysticks() {
    const leftJoy = document.getElementById('joystick-left');
    const rightJoy = document.getElementById('joystick-right');
    const fireBtn = document.getElementById('fire-button');
    const leftHandle = document.getElementById('handle-left');
    const rightHandle = document.getElementById('handle-right');

    leftJoy.addEventListener("touchmove", (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = leftJoy.getBoundingClientRect();
        moveX = (touch.clientX - (rect.left + 50)) / 50;
        moveZ = (touch.clientY - (rect.top + 50)) / 50;
        leftHandle.style.transform = `translate(${moveX * 25}px, ${moveZ * 25}px)`;
    });

    rightJoy.addEventListener("touchmove", (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = rightJoy.getBoundingClientRect();
        lookX = (touch.clientX - (rect.left + 50)) / 50;
        lookY = (touch.clientY - (rect.top + 50)) / 50;
        rightHandle.style.transform = `translate(${lookX * 25}px, ${lookY * 25}px)`;
    });

    fireBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        handlePlayerShoot();
    });

    const stop = () => { 
        moveX = 0; moveZ = 0; lookX = 0; lookY = 0;
        leftHandle.style.transform = "translate(0,0)";
        rightHandle.style.transform = "translate(0,0)";
    };
    leftJoy.addEventListener("touchend", stop);
    rightJoy.addEventListener("touchend", stop);
}

function createGUI( model, animations ) {
    const states = [ 'Idle', 'Walking', 'Running', 'Dance', 'Death', 'Sitting', 'Standing' ];
    const emotes = [ 'Jump', 'Yes', 'No', 'Wave', 'Punch', 'ThumbsUp' ];
    gui = new GUI();
    mixer = new THREE.AnimationMixer( model );
    actions = {};
    for ( let i = 0; i < animations.length; i ++ ) {
        const clip = animations[ i ];
        const action = mixer.clipAction( clip );
        actions[ clip.name ] = action;
        if ( emotes.indexOf( clip.name ) >= 0 || states.indexOf( clip.name ) >= 4 ) {
            action.clampWhenFinished = true;
            action.loop = THREE.LoopOnce;
        }
    }
    const statesFolder = gui.addFolder( 'States' );
    const clipCtrl = statesFolder.add( api, 'state' ).options( states );
    clipCtrl.onChange( () => fadeToAction( api.state, 0.5 ) );
    statesFolder.close();
    const emoteFolder = gui.addFolder( 'Emotes' );
    function createEmoteCallback( name ) {
        api[ name ] = function () {
            fadeToAction( name, 0.2 );
            mixer.addEventListener( 'finished', restoreState );
        };
        emoteFolder.add( api, name );
    }
    function restoreState() {
        mixer.removeEventListener( 'finished', restoreState );
        fadeToAction( api.state, 0.2 );
    }
    for ( let i = 0; i < emotes.length; i ++ ) createEmoteCallback( emotes[ i ] );
    emoteFolder.close();
    activeAction = actions[ 'Walking' ];
    activeAction.play();
}

function fadeToAction( name, duration ) {
    previousAction = activeAction;
    activeAction = actions[ name ];
    if ( previousAction !== activeAction ) previousAction.fadeOut( duration );
    activeAction.reset().setEffectiveTimeScale( 1 ).setEffectiveWeight( 1 ).fadeIn( duration ).play();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    const dt = clock.getDelta();
    if (mixer) mixer.update(dt);

    if (model && !orbitMode && gameActive) {
        characterRotationY -= lookX * dt * 3;
        model.rotation.y = characterRotationY;

        const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
        const side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
        
        model.position.add(forward.multiplyScalar(moveZ * dt * -15));
        model.position.add(side.multiplyScalar(moveX * dt * -15));
        
        updateCamera();
    }
    
    if (orbitMode && orbitControls) orbitControls.update();

    updateBullets(dt);
    updateBoss(dt);
    updateUI();

    renderer.render(scene, camera);
}

function updateCamera() {
    if (model && !orbitMode) {
        const offset = new THREE.Vector3(0, 5, -15).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterRotationY);
        const newCameraPos = model.position.clone().add(offset);
        camera.position.lerp(newCameraPos, 0.1);
        camera.lookAt(model.position.x, model.position.y + 2, model.position.z);
    }
}

init();

    </script>
