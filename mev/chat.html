<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure P2P Chat – MEV</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <style>
    body { background: #000; color: #fff; font-family: monospace; padding: 1em; max-width: 600px; margin: auto; }
    textarea, input { width: 100%; margin: 0.5em 0; padding: 0.5em; background: #111; border: 1px solid #333; color: peru; }
    #messages { border: 1px solid #333; height: 200px; overflow-y: scroll; padding: 0.5em; background: #050505; color: #0f0; }
    .close-button { color: #f00; text-decoration: none; font-weight: bold; }
    button { background: #222; color: peru; border: 1px solid #444; padding: 0.5em 1em; cursor: pointer; }
  </style>
</head>
<body>
  <a href="./index.html#search" class="close-button">✖ - CLOSE</a>

  <h2>🔐 Secure Peer-to-Peer Chat</h2>
  
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type a message..." disabled>
  <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>

  <div id="step1">
    <button onclick="startOffer()">1. Create Chat Offer</button>
    <div id="offerBox" style="display:none;">
      <textarea id="offer" readonly rows="4"></textarea>
    </div>
  </div>
  
  <script src="chat.js"></script>
</body>
</html>
