<!DOCTYPE html>
<html lang="en">
	<head>
		<title>map - AI Day or Night Perception</title>
		<meta charset="utf-8">
		<http-equiv="X-UA-Compatible" content="IE=Edge;chrome=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

 <link rel="icon" href="/mev/favicon.ico" />

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    
    #time-container {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: #0f0;
        padding: 15px;
        border: 1px solid #0f0;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        z-index: 1000;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
    }
    #time-container input {
        background: #111;
        border: 1px solid #0f0;
        color: #0f0;
        margin-top: 5px;
        padding: 5px;
        width: 100%;
        cursor: pointer;
    }
    .infobox { position: fixed; top: 250px; left: 50%; transform: translateX(-50%); z-index: 10; }
</style>
<script>
(function () {
  function showError(msg) {
    const errorDiv = document.createElement('div');
    errorDiv.style.position = 'fixed';
    errorDiv.style.top = '0';
    errorDiv.style.left = '0';
    errorDiv.style.width = '100%';
    errorDiv.style.backgroundColor = '#ff4c4c';
    errorDiv.style.color = 'white';
    errorDiv.style.fontFamily = 'Arial, sans-serif';
    errorDiv.style.padding = '15px';
    errorDiv.style.zIndex = '9999';
    errorDiv.style.textAlign = 'center';
    errorDiv.textContent = msg;
    document.body.appendChild(errorDiv);
  }

  const canvas = document.createElement('canvas');
  const webgl = !!(window.WebGLRenderingContext && (
    canvas.getContext('webgl') || canvas.getContext('experimental-webgl')
  ));
  if (!webgl) {
    document.addEventListener('DOMContentLoaded', function () {
      showError('WebGL is not supported or disabled. Please enable it.');
    });
  }

  if (!navigator.gpu) {
    document.addEventListener('DOMContentLoaded', function () {
      showError('WebGPU is not supported. Please use a WebGPU-enabled browser.');
    });
  }
})();
</script>
<script>
    // The "Conscious" reporting to the "Subconscious" Radar
    (function() {
        const report = {
            path: window.location.pathname,
            type: window.location.pathname.endsWith('.html') ? 'html' : 'logic',
            timestamp: Date.now(),
            status: 'correct' 
        };
        // If the user tries to access a hidden folder or missing nuance
        if(window.location.hash.includes('admin') || !document.title) {
            report.status = 'incorrect';
        }
        localStorage.setItem('mev_radar_ping', JSON.stringify(report));
    })();
</script>

	</head>
	<body>
        <div id="time-container">
            <strong>GAME CLOCK</strong>
            <input type="datetime-local" id="ai-datetime">
            <div id="display-time" style="margin-top:10px; font-size: 11px;">Syncing data...</div>
        </div>

		<div id="info">
		    <a href="/mev/mev/3.html" target="_blank" rel="noopener"><button class="infobox">play</button></a>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "./examples/build/three.webgpu.js",
					"three/webgpu": "./examples/build/three.webgpu.js",
					"three/tsl": "./examples/build/three.tsl.js",
					"three/addons/": "./examples/jsm/"
				}
			}
		</script>

		<script type="module">
			import * as THREE from 'three';
			import { color, fog, float, positionWorld, triNoise3D, positionView, normalWorld, uniform, mix } from 'three/tsl';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			let camera, scene, renderer, controls, clock;
            let simulationTime = new Date();
            const timeInput = document.getElementById('ai-datetime');
            const timeDisplay = document.getElementById('display-time');

            // Fireworks State
            let fireworks = [];

            // --- FIREWORK CLASS ---
            class Firework {
                constructor(targetScene, isFinale = false) {
                    this.scene = targetScene;
                    this.done = false;
                    this.dest = new THREE.Vector3(
                        (Math.random() - 0.5) * 800, 
                        Math.random() * 150 + 50, 
                        (Math.random() - 0.5) * 800
                    );
                    
                    const count = isFinale ? 600 : 150;
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(count * 3);
                    const velocities = new Float32Array(count * 3);
                    const particleColor = new THREE.Color().setHSL(Math.random(), 1, 0.6);
                    
                    for(let i=0; i<count*3; i+=3) {
                        positions[i] = this.dest.x;
                        positions[i+1] = this.dest.y;
                        positions[i+2] = this.dest.z;
                        
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const speed = (Math.random() * 0.9 + 0.3) * (isFinale ? 2.5 : 1);
                        
                        velocities[i] = Math.sin(phi) * Math.cos(theta) * speed;
                        velocities[i+1] = Math.sin(phi) * Math.sin(theta) * speed;
                        velocities[i+2] = Math.cos(phi) * speed;
                    }
                    
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    this.particles = new THREE.Points(geometry, new THREE.PointsMaterial({
                        color: particleColor,
                        size: isFinale ? 1.0 : 0.5,
                        transparent: true,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false
                    }));
                    
                    this.scene.add(this.particles);
                    this.velocities = velocities;
                    this.life = 1.0;
                    this.playPop();
                }

                playPop() {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(100 + Math.random() * 100, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.02, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                }

                update() {
                    this.life -= 0.015;
                    const positions = this.particles.geometry.attributes.position.array;
                    for(let i=0; i<positions.length; i+=3) {
                        positions[i] += this.velocities[i];
                        positions[i+1] += this.velocities[i+1] - 0.01; // Gravity
                        positions[i+2] += this.velocities[i+2];
                    }
                    this.particles.geometry.attributes.position.needsUpdate = true;
                    this.particles.material.opacity = this.life;
                    if(this.life <= 0) {
                        this.scene.remove(this.particles);
                        this.done = true;
                    }
                }
            }

			init();

			function init() {
                clock = new THREE.Clock();
				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 1500 );
				camera.position.set( 150, 100, 150 );

				scene = new THREE.Scene();

                const nightFactor = uniform( 0 );

				const daySky = color( 0xf0f5f5 );
				const nightSky = color( 0x000005 );
                const currentSkyColor = mix( daySky, nightSky, nightFactor );

				const dayGround = color( 0xd0dee7 );
				const nightGround = color( 0x050505 );
                const currentGroundColor = mix( dayGround, nightGround, nightFactor );

				const fogNoiseDistance = positionView.z.negate().smoothstep( 0, camera.far - 300 );
				const distance = fogNoiseDistance.mul( 20 ).max( 4 );
				const alpha = .98;
				const groundFogArea = float( distance ).sub( positionWorld.y ).div( distance ).pow( 3 ).saturate().mul( alpha );
				
				const timer = uniform( 0 ).onFrameUpdate( ( frame ) => frame.time );
				const fogNoiseA = triNoise3D( positionWorld.mul( .005 ), 0.2, timer );
				const fogNoiseB = triNoise3D( positionWorld.mul( .01 ), 0.2, timer.mul( 1.2 ) );
				const fogNoise = fogNoiseA.add( fogNoiseB ).mul( currentGroundColor );

				scene.fogNode = fog( fogNoiseDistance.oneMinus().mix( currentGroundColor, fogNoise ), groundFogArea );
				scene.backgroundNode = normalWorld.y.max( 0 ).mix( currentGroundColor, currentSkyColor );

				const windowGlow = mix( color( 0x000066 ), color( 0xffffff ), nightFactor );
				const buildWindows = positionWorld.y.mul( 10 ).floor().mod( 4 ).sign().mix( windowGlow.add( fogNoiseDistance ), color( 0xffffff ) );
				
				const buildGeometry = new THREE.BoxGeometry( 1, 1, 1 );
				const buildMaterial = new THREE.MeshPhongNodeMaterial( { colorNode: buildWindows } );
				const buildMesh = new THREE.InstancedMesh( buildGeometry, buildMaterial, 4000 );
				scene.add( buildMesh );

				const dummy = new THREE.Object3D();
				for ( let i = 0; i < 4000; i ++ ) {
					const scaleY = Math.random() * 7 + .5;
					dummy.position.x = Math.random() * 800 - 400;
					dummy.position.z = Math.random() * 800 - 400;
					const d = Math.max( dummy.position.distanceTo( new THREE.Vector3() ) * .012, 1 );
					dummy.position.y = .5 * scaleY * d;
					dummy.scale.set(Math.random() * 3 + .5, scaleY * d, Math.random() * 3 + .5);
					dummy.updateMatrix();
					buildMesh.setMatrixAt( i, dummy.matrix );
				}

				scene.add( new THREE.HemisphereLight( 0xffffff, 0x444444, 0.5 ) );
                
				const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
				scene.add(sunLight);
                window.sunLight = sunLight;

				const visibleSun = new THREE.Mesh( new THREE.SphereGeometry(20, 32, 32), new THREE.MeshBasicMaterial({ color: 0xFFFF00, fog: false }) );
				scene.add( visibleSun );
                window.visibleSun = visibleSun;

                const visibleMoon = new THREE.Mesh( new THREE.SphereGeometry(12, 32, 32), new THREE.MeshBasicMaterial({ color: 0xeeeeee, fog: false }) );
                scene.add(visibleMoon);
                window.visibleMoon = visibleMoon;

                const starGeometry = new THREE.BufferGeometry();
                const starVertices = [];
                for (let i = 0; i < 2000; i++) {
                    starVertices.push((Math.random()-0.5)*2000, Math.random()*1000, (Math.random()-0.5)*2000);
                }
                starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
                const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true }));
                scene.add(stars);
                window.stars = stars;

                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                timeInput.value = now.toISOString().slice(0, 16);
                timeInput.addEventListener('change', (e) => { simulationTime = new Date(e.target.value); });

                window.nightFactorNode = nightFactor;

				renderer = new THREE.WebGPURenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				document.body.appendChild( renderer.domElement );

				controls = new OrbitControls( camera, renderer.domElement );
                window.addEventListener( 'resize', onWindowResize );
			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			function animate() {
                const dt = clock.getDelta();
                simulationTime.setSeconds(simulationTime.getSeconds() + dt);
                timeDisplay.innerText = "AI BRAIN CLOCK: " + simulationTime.toLocaleString();

                const h = simulationTime.getHours();
                const m = simulationTime.getMinutes();
                const s = simulationTime.getSeconds();
                const month = simulationTime.getMonth();
                const date = simulationTime.getDate();
                const dayProgress = (h * 3600 + m * 60 + s) / 86400;

                const theta = (dayProgress * Math.PI * 2) + (Math.PI / 2) + Math.PI;
                const radius = 600; 

                window.visibleSun.position.set(Math.cos(theta) * radius, Math.sin(theta) * radius, 0);
                window.sunLight.position.copy(window.visibleSun.position);
                window.visibleMoon.position.set(Math.cos(theta + Math.PI) * radius, Math.sin(theta + Math.PI) * radius, 0);

                const sunHeightFactor = window.visibleSun.position.y / radius; 
                window.nightFactorNode.value = THREE.MathUtils.lerp(window.nightFactorNode.value, sunHeightFactor < 0 ? 1 : 0, 0.05);
                window.sunLight.intensity = Math.max(0, sunHeightFactor) * 2.0;
                window.stars.material.opacity = Math.max(0, -sunHeightFactor);

                // --- FIREWORKS LOGIC ---
                const isNYEClimax = (month === 11 && date === 31 && h === 23 && m >= 59);
                const isNewYear = (month === 0 && date === 1 && h === 0 && m < 5);
                
                let spawnChance = 0.008; // Normal random pops
                let isFinale = false;
                
                if (isNYEClimax) spawnChance = 0.2;
                if (isNewYear) { spawnChance = 0.5; isFinale = true; }

                if (Math.random() < spawnChance) {
                    fireworks.push(new Firework(scene, isFinale));
                }

                for (let i = fireworks.length - 1; i >= 0; i--) {
                    fireworks[i].update();
                    if (fireworks[i].done) fireworks.splice(i, 1);
                }

				controls.update();
				renderer.render( scene, camera );
			}
		</script>
	</body>
</html>
