                window.location.replace('../index.html#search'); // Send bots back to app start
                return;
            }

            // 2. Identify the AI's State Keys
            const BREACH_KEY = 'mev_breach_detected';
            const HUMAN_KEY = 'mev_human_verified';
            const BANNED_PAGE = '../index.html?reason=perimeter_breach'; 

            // 3. Log the Breach in the Local Mind
            try {
                localStorage.setItem(BREACH_KEY, 'true');
                localStorage.removeItem(HUMAN_KEY); // Reset any existing human status
                
                console.error("PERIMETER BREACH: Unauthorized access. Redirecting to recovery sentinel.");

                // 4. Execute the Jump
                setTimeout(() => {
                    window.location.replace(BANNED_PAGE); 
                }, 1500);
            } catch (e) {

                window.location.replace(BANNED_PAGE);
