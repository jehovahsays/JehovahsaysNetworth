<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 – MEV Wiki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f9fafb;
      color: #333;
      padding: 4rem 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #3366cc;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #3366cc;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    a:hover {
      background: #254ba5;
    }
  </style>
  <script>
    // The "Conscious" reporting to the "Subconscious" Radar
    (function() {
        const report = {
            path: window.location.pathname,
            type: window.location.pathname.endsWith('.html') ? 'html' : 'logic',
            timestamp: Date.now(),
            status: 'incorrect' 
        };
        // If the user tries to access a hidden folder or missing nuance
        if(window.location.hash.includes('admin') || !document.title) {
            report.status = 'incorrect';
        }
        localStorage.setItem('mev_radar_ping', JSON.stringify(report));
    })();
</script>

</head>
<body>
  <h1>404 – Page Not Found</h1>

</body>
